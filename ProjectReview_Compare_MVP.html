    const tbw = mk('div','task-body');

    // ── Simulated per-task activity log (would come from real data) ──
    const TASK_ACTIVITY_MAP = {
      '50001': [
        { time:'Feb 3, 2026',   who:'Sarah M.',  init:'SM', action:'Approved task — demolition complete, site clean', type:'close' },
        { time:'Feb 2, 2026',   who:'Marcus W.', init:'MW', action:'Uploaded 3 final demolition photos', type:'photo' },
        { time:'Feb 2, 2026',   who:'Marcus W.', init:'MW', action:'Confirmed plumbing behind east wall is intact — no damage', type:'note' },
        { time:'Jan 28, 2026',  who:'Inspector', init:'IN', action:'Added note: exercise caution around east wall — active plumbing supply line behind drywall', type:'note' },
        { time:'Jan 20, 2026',  who:'Marcus W.', init:'MW', action:'Uploaded 4 progress photos — cabinets removed, subfloor exposed', type:'photo' },
        { time:'Jan 18, 2026',  who:'Marcus W.', init:'MW', action:'Marked task in progress', type:'status' },
        { time:'Jan 15, 2026',  who:'Sarah M.',  init:'SM', action:'Confirmed demolition scope with homeowner — approved full strip-out', type:'status' },
        { time:'Jan 8, 2026',   who:'Sarah M.',  init:'SM', action:'Task created during initial walkthrough', type:'create' },
      ],
      '50002': [
        { time:'Mar 14, 2026',  who:'James K.',  init:'JK', action:'Reviewed change order — approved additional subfloor repair scope', type:'change' },
        { time:'Mar 10, 2026',  who:'Diana R.',  init:'DR', action:'Submitted change order: subfloor repair required before cabinetry can proceed', type:'change' },
        { time:'Mar 5, 2026',   who:'Marcus W.', init:'MW', action:'Uploaded 5 photos documenting water damage extent', type:'photo' },
        { time:'Mar 4, 2026',   who:'Inspector', init:'IN', action:'Added note: water damage appears limited to 3 sq ft — recommend targeted repair, not full replacement', type:'note' },
        { time:'Mar 3, 2026',   who:'Diana R.',  init:'DR', action:'Flagged water damage found behind sink cabinet — subfloor soft, may need repair', type:'issue' },
        { time:'Feb 28, 2026',  who:'Marcus W.', init:'MW', action:'Uploaded 3 progress photos — cabinet carcasses installed, doors pending', type:'photo' },
        { time:'Feb 20, 2026',  who:'Marcus W.', init:'MW', action:'Marked task in progress — cabinetry delivery received', type:'status' },
        { time:'Feb 10, 2026',  who:'Sarah M.',  init:'SM', action:'Confirmed cabinet spec with homeowner — custom shaker in SW Alabaster', type:'note' },
        { time:'Jan 8, 2026',   who:'Sarah M.',  init:'SM', action:'Task created during initial walkthrough', type:'create' },
      ],
    };
    const TASK_ACTIVITY = TASK_ACTIVITY_MAP[task.id] || [
      { time:'Mar 15, 2026', who:'Sarah M.', init:'SM', action:'Completed final inspection and closed task', type:'close' },
      { time:'Feb 17, 2026',  who:'Diana R.', init:'DR', action:'Submitted change order for review', type:'change' },
      { time:'Feb 24, 2026', who:'Marcus W.', init:'MW', action:'Uploaded 4 progress photos', type:'photo' },
      { time:'Feb 14, 2026', who:'Diana R.', init:'DR', action:'Flagged issue: ' + (task.issue||'See change order'), type:'issue' },
      { time:'Feb 3, 2026',  who:'Marcus W.', init:'MW', action:'Marked task in progress', type:'status' },
      { time:'Jan 8, 2026',  who:'Sarah M.',  init:'SM', action:'Task created during initial walkthrough', type:'create' },
    ];

    // ── LAYER MODULES (above timeline) ──
    const anyLayerOn = Object.values(LAYERS).some(v=>v);

    if(anyLayerOn){
      const modulesWrap = mk('div','');
      modulesWrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;margin-bottom:22px';

      // Budget module
      if(LAYERS.budget){
        const m = mk('div','');
        m.style.cssText = 'background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--rl);overflow:hidden';
        m.innerHTML = `
          <div style="padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px">
            <span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green)">Budget</span>
          </div>
          <div style="padding:10px 14px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
            <div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">Unit cost</div><div style="font-size:18px;font-weight:300;font-family:var(--mono);color:var(--t1);letter-spacing:-.02em">${fmt(task.cost)}</div></div>
            <div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">Quantity</div><div style="font-size:18px;font-weight:300;font-family:var(--mono);color:var(--t1);letter-spacing:-.02em">1 ea</div></div>
            <div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">Total</div><div style="font-size:18px;font-weight:300;font-family:var(--mono);color:var(--green);letter-spacing:-.02em">${fmt(task.cost)}</div></div>
          </div>`;
        modulesWrap.appendChild(m);
      }

      // Contractor module
      // Contractor module — shown when contractor OR unassigned layer is on
      if(LAYERS.contractor || LAYERS.unassigned){
        const ctTasks = room.taskList.filter(t=>t.assign===task.assign);
        const ctTotal = ctTasks.reduce((s,t)=>s+t.cost,0);
        const isUnassigned = task.assign === 'Unassigned';
        const m = mk('div','');
        m.style.cssText = `background:var(--bg-card);border:1px solid var(--border);border-left:3px solid ${isUnassigned && LAYERS.unassigned ? '#b34d00' : 'var(--blue)'};border-radius:var(--rl);overflow:hidden`;
        m.innerHTML = `
          <div style="padding:10px 14px 8px;border-bottom:1px solid var(--border)">
            <span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue)">Contractor</span>
          </div>
          ${LAYERS.contractor ? `
          <div style="padding:10px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
            <div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">Assigned to</div><div style="font-size:14px;font-weight:500;color:${isUnassigned?'#b34d00':'var(--t1)'}">${task.assign}</div></div>
            <div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">Tasks in group</div><div style="font-size:14px;font-weight:500;color:var(--t1)">${ctTasks.length} task${ctTasks.length>1?'s':''} · ${ctTasks.filter(t=>t.done).length} done</div></div>
            <div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">Scope value</div><div style="font-size:14px;font-weight:500;color:var(--green);font-family:var(--mono)">${fmt(ctTotal)}</div></div>
          </div>` : ''}
          ${isUnassigned && LAYERS.unassigned ? `
          <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;background:rgba(179,77,0,.06);border-top:1px solid rgba(179,77,0,.15)">
            <span style="color:#b34d00;display:flex;align-items:center;flex-shrink:0">${ICON_HARDHAT.replace('width="12" height="12"','width="13" height="13"')}</span>
            <span style="font-size:12px;color:#b34d00;font-weight:500;flex:1">No contractor assigned — action required</span>
          </div>` : ''}`;
        modulesWrap.appendChild(m);
      }

      // Modifier module
      if(LAYERS.modifier){
        const m = mk('div','');
        m.style.cssText = 'background:var(--bg-card);border:1px solid var(--border);border-left:3px solid #D4A017;border-radius:var(--rl);overflow:hidden';
        m.innerHTML = `
          <div style="padding:10px 14px 8px;border-bottom:1px solid var(--border)">
            <span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8a6200">Modifier</span>
          </div>
          <div style="padding:10px 14px">
            ${task.modifier
              ? `<div style="display:flex;align-items:flex-start;gap:10px">
                  <span style="padding:3px 10px;border-radius:var(--rm);background:rgba(212,160,23,.15);color:#7a5a00;font-size:12px;font-weight:600;flex-shrink:0">${task.modifier}</span>
                  <div style="font-size:12px;color:var(--t2);line-height:1.5">${task.modifier==='Deferred'?'This task has been moved to a later phase and is not included in the current billing cycle.':'Cost is excluded from owner scope. Tracked separately for tenant billing.'}<br><span style="font-size:11px;color:var(--t3)">Set by Admin · 5 days ago</span></div>
                </div>`
              : `<span style="font-size:12px;color:var(--t3)">No modifier applied to this task.</span>`}
          </div>`;
        modulesWrap.appendChild(m);
      }

      // Materials module — shown when materials OR onhold layer is on
      if(LAYERS.materials || LAYERS.onhold){
        const mats = (TASK_MATERIALS[task.id]||[]);
        const products = mats.filter(m=>m.type==='material');
        const labor    = mats.filter(m=>m.type==='labor');
        const m = mk('div','');
        m.style.cssText = 'border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:var(--rl);overflow:hidden';

        const statusColor = s => s==='Ordered'||s==='Delivered'||s==='Completed' ? '#e8f5e9,#2e7d32'
          : s==='Pending'||s==='Scheduled' ? '#fff8e1,#9a5000'
          : s==='On hold'||s==='Deferred' ? 'var(--bg-2),var(--t3)'
          : 'var(--bg-2),var(--t2)';

        let rows = '';
        products.forEach(p => {
          const isOos = LAYERS.onhold && p.status === 'On hold';
          const [bg,fg] = isOos ? 'rgba(177,69,65,.08),var(--red)' : statusColor(p.status).split(',');
          // Only show row if: materials layer on (show all), or onhold layer on and this is oos
          if(!LAYERS.materials && !isOos) return;
          rows += `<tr style="border-bottom:1px solid var(--border)${isOos?';background:rgba(177,69,65,.04)':''}">
            <td style="padding:10px 12px;font-size:12px;color:${isOos?'var(--red)':'var(--t1)'};font-weight:500">${isOos?`${ICON_TAG.replace('12','11')} `:''}${p.name}</td>
            <td class="dt-mono" style="padding:10px 12px;text-align:right;color:var(--t2)">${p.qty} ${p.unit}</td>
            <td class="dt-mono" style="padding:10px 12px;text-align:right;color:var(--t2)">${p.unitPrice>=1?'$'+p.unitPrice.toLocaleString():'$'+p.unitPrice.toFixed(2)}</td>
            <td style="padding:10px 12px;text-align:right;color:var(--t3);font-size:11px">${p.vendor||'—'}</td>
            <td style="padding:10px 12px;text-align:right"><span style="padding:2px 7px;border-radius:10px;background:${isOos?'rgba(177,69,65,.12)':bg};color:${isOos?'var(--red)':fg};font-size:10px;font-weight:600;white-space:nowrap">${isOos?'Out of stock':p.status}</span></td>
          </tr>`;
        });
        if(LAYERS.materials && labor.length){
          rows += `<tr style="background:var(--bg-2)"><td colspan="5" style="padding:6px 12px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)">Labor</td></tr>`;
          labor.forEach(l => {
            const [bg,fg] = statusColor(l.status).split(',');
            rows += `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px 12px;font-size:12px;color:var(--t2);font-style:italic">${l.name}</td>
              <td class="dt-mono" style="padding:10px 12px;text-align:right;color:var(--t2)">${l.qty} ${l.unit}</td>
              <td class="dt-mono" style="padding:10px 12px;text-align:right;color:var(--t2)">$${l.unitPrice}/hr</td>
              <td style="padding:10px 12px;text-align:right;color:var(--t3);font-size:11px">—</td>
              <td style="padding:10px 12px;text-align:right"><span style="padding:2px 7px;border-radius:10px;background:${bg};color:${fg};font-size:10px;font-weight:600;white-space:nowrap">${l.status}</span></td>
            </tr>`;
          });
        }

        m.innerHTML = `
          <div style="padding:10px 14px 8px;border-bottom:1px solid var(--border);background:var(--bg)">
            <span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--orange)">Materials & Labor</span>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:12px">
            <thead><tr style="background:var(--bg-2)">
              <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)">Product</th>
              <th style="padding:8px 12px;text-align:right;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)">Qty</th>
              <th style="padding:8px 12px;text-align:right;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)">Unit price</th>
              <th style="padding:8px 12px;text-align:right;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)">Vendor</th>
              <th style="padding:8px 12px;text-align:right;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)">Status</th>
            </tr></thead>
            <tbody>${rows || '<tr><td colspan="5" style="padding:12px;font-size:12px;color:var(--t3);text-align:center">No out of stock items</td></tr>'}</tbody>
          </table>`;
        modulesWrap.appendChild(m);
      }

      tbw.appendChild(modulesWrap);
    }

    // ── TIMELINE label ──
    const tlLabel = mk('div','');
    tlLabel.style.cssText = 'font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:14px';
    tlLabel.textContent = 'Timeline · newest first';
    tbw.appendChild(tlLabel);

    // ── Build walk timeline entries — reverse chronological (newest first) ──
    // Sort walks newest → oldest using their dates
    const WALK_ORDER = ['close_out','progress_2','change_order','progress_1','initial_scope'];
    const sortedWalks = [...WALKS].sort((a,b)=>{
      return WALK_ORDER.indexOf(a.id) - WALK_ORDER.indexOf(b.id);
    });

    // Timeline container
    const tl = mk('div','');
    tl.style.cssText = 'position:relative;padding-left:28px';
    // Vertical line
    const tlLine = mk('div','');
    tlLine.style.cssText = 'position:absolute;left:7px;top:8px;bottom:8px;width:1.5px;background:var(--border-mid);border-radius:1px';
    tl.appendChild(tlLine);

    sortedWalks.forEach((w, wi) => {
      const photos = getWalkPhotos(selRoomId, task.id, w.id);
      const isInitial = w.id === 'initial_scope';
      const isFinal   = w.id === 'close_out';

      // Dot color
      const dotBg = isFinal ? 'var(--green)' : isInitial ? 'var(--charcoal)' : w.id==='change_order' ? 'var(--red)' : 'var(--blue)';

      // Walk entry
      const entry = mk('div','');
      entry.style.cssText = 'position:relative;margin-bottom:28px';

      // Timeline dot
      const dot = mk('div','');
      dot.style.cssText = `position:absolute;left:-24px;top:3px;width:10px;height:10px;border-radius:50%;background:${dotBg};border:2px solid var(--bg-card);box-shadow:0 0 0 1.5px ${dotBg}`;
      entry.appendChild(dot);

      // Walk header
      const wHdr = mk('div','');
      wHdr.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:10px';
      let statusBadge = '';
      if(w.id === 'change_order') statusBadge = `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;background:#fde8e8;color:#a03030;font-size:10px;font-weight:600">${ICON_CO} Change order · ${w.conductor}</span>`;
      if(isFinal) statusBadge = `<span style="padding:2px 8px;border-radius:10px;background:#e8f5e9;color:#2e7d32;font-size:10px;font-weight:600">Completed</span>`;
      wHdr.innerHTML = `
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--t1)">${w.date} · ${w.label}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:1px">${w.conductor}${photos.length ? ' · '+photos.length+' photo'+(photos.length>1?'s':'') : ''}</div>
        </div>
        ${statusBadge}`;
      entry.appendChild(wHdr);

      // Notes — shown if layer on OR always on initial/final
      if(LAYERS.notes && task.notes){
        const noteCard = mk('div','');
        noteCard.style.cssText = 'background:var(--bg-2);border-left:3px solid var(--purple);border-radius:var(--r) var(--rm) var(--rm) var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--t1);line-height:1.5';
        noteCard.innerHTML = `<span style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--purple);display:block;margin-bottom:3px">Notes</span>${task.notes}`;
        entry.appendChild(noteCard);
      }

      // Change order — shown if this is change_order walk or if layer on
      if((LAYERS.changes && task.issue && w.id==='change_order') || (task.issue && w.id==='change_order')){
        const coCard = mk('div','');
        coCard.style.cssText = 'background:#fef2f2;border-left:3px solid var(--red);border-radius:var(--r) var(--rm) var(--rm) var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--t1);line-height:1.5';
        coCard.innerHTML = `<span style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--red);display:block;margin-bottom:3px">Change Order</span>${task.issue}<div style="font-size:10px;color:var(--red);opacity:.75;margin-top:4px">Open · High priority · Flagged ${w.date}</div>`;
        entry.appendChild(coCard);
      }

      // Activity events for this walk (if layer on)
      if(LAYERS.activity){
        const walkActs = TASK_ACTIVITY.filter(a => {
          if(w.id==='initial_scope') return a.type==='create';
          if(w.id==='close_out') return a.type==='close';
          if(w.id==='change_order') return a.type==='change'||a.type==='issue';
          if(w.id==='progress_1') return a.type==='status';
          if(w.id==='progress_2') return a.type==='photo';
          return false;
        });
        if(walkActs.length){
          const actWrap = mk('div','');
          actWrap.style.cssText = 'margin-bottom:10px';
          walkActs.forEach(a=>{
            const row = mk('div','');
            row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--t2)';
            row.innerHTML = `<div style="width:22px;height:22px;border-radius:50%;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--t2);flex-shrink:0">${a.init}</div><div style="flex:1"><strong style="color:var(--t1);font-weight:500">${a.who}</strong> ${a.action}</div><div style="font-size:11px;color:var(--t3);font-family:var(--mono);white-space:nowrap">${a.time}</div>`;
            actWrap.appendChild(row);
          });
          entry.appendChild(actWrap);
        }
      }

      // Photos — fixed 3-column grid using img tags
      if(photos.length){
        const photoGrid = mk('div','');
        photoGrid.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-top:4px';
        photos.forEach((url, idx) => {
          const attr = getAttr(selRoomId, task.id, w.id);
          const wrapper = mk('div','');
          wrapper.style.cssText = 'flex:0 0 calc(33.333% - 3px);height:120px;border-radius:var(--r);cursor:pointer;background:var(--bg-2);position:relative';
          const inner = mk('div','');
          inner.style.cssText = 'width:100%;height:100%;border-radius:var(--r);overflow:hidden;position:absolute;inset:0';
          const img = document.createElement('img');
          img.src = url;
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;transition:filter .15s';
          img.alt = '';
          inner.appendChild(img);
          wrapper.appendChild(inner);
          const badge = attrBadge(attr);
          if(badge) wrapper.insertAdjacentHTML('beforeend', badge);
          wrapper.onmouseenter = () => img.style.filter='brightness(.88)';
          wrapper.onmouseleave = () => img.style.filter='';
          wrapper.onclick = () => openPhotoDetail(selRoomId, task.id, w.id, idx);
          photoGrid.appendChild(wrapper);
        });
        entry.appendChild(photoGrid);
      } else {
        // Placeholder color tiles for walks without real photos in this demo
        const WALK_PALETTES = {
          initial_scope: ['#8B7355','#9A7E5A','#7D6649'],
          progress_1:    ['#6B7A5E','#7A8B6A','#5E6E52'],
          progress_2:    ['#4A7A7A','#5A8E8E','#3E6A6A'],
          change_order:  ['#8B5A5A','#9C6868','#7A4E4E'],
          close_out:     ['#6B7580','#7A8590','#5E6870'],
        };
        const pal = WALK_PALETTES[w.id] || ['#8B7355','#9A7E5A','#7D6649'];
        const photoGrid = mk('div','');
        photoGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px';
        for(let i=0;i<3;i++){
          const tile = mk('div','');
          tile.style.cssText = `aspect-ratio:4/3;background:${pal[i]};border-radius:var(--r);cursor:pointer;transition:filter .15s`;
          tile.onmouseenter = () => tile.style.filter='brightness(.88)';
          tile.onmouseleave = () => tile.style.filter='';
          photoGrid.appendChild(tile);
        }
        entry.appendChild(photoGrid);
      }

      tl.appendChild(entry);
    });

    tbw.appendChild(tl);
    body.appendChild(tbw);

    // ── STACKED "NEXT TASKS" FEED ─────────────────────────────────────────
    // After the full task view, append every other task as a compact preview
    // card so the right panel reads as one continuous, scrollable list of all
    // tasks. Group boundaries get a labeled divider with a thicker rule so
    // it's obvious when scrolling crosses into a new room. Clicking any card
    // makes it the new "current" task — the heavy budget/contractor/timeline
    // panels only render for the active task, which is the progressive-load
    // strategy keeping this performant even with 50+ tasks.
    if(typeof appendStackedTasksFeed === 'function'){
      appendStackedTasksFeed(body, selRoomId, selTask);
    }
  }
}

// Build & append the stacked preview list of every other task. Used by the
// zoom=2 task render so the right panel feels like an infinite scroll of all
// tasks (current task = full detail, everything else = compact card).
function appendStackedTasksFeed(body, currentRoomId, currentTask){
  // Flat slot list across every room.
  const slots = [];
  Object.keys(ROOMS).forEach(rid => {
    const room = ROOMS[rid];
    if(!room || !Array.isArray(room.taskList)) return;
    room.taskList.forEach((t, i) => {
      slots.push({ roomId:rid, roomName:room.name, task:t, isFirstInGroup:i===0 });
    });
  });
  if(!slots.length) return;
  const curIdx = slots.findIndex(s => s.roomId === currentRoomId && s.task && s.task.id === currentTask.id);

  const wrap = mk('div','');
  wrap.style.cssText = 'margin:48px 0 24px;display:flex;flex-direction:column;gap:0';

  // Section heading so the user knows the rest of the page is a continuation.
  const heading = mk('div','');
  heading.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:0 4px';
  heading.innerHTML =
    '<span style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)">Continue scrolling — all tasks</span>' +
    '<div style="flex:1;height:1px;background:var(--border)"></div>' +
    '<span style="font-size:11px;color:var(--t3);font-family:var(--mono)">'+slots.length+' tasks total</span>';
  wrap.appendChild(heading);

  let lastRenderedRoom = currentRoomId;
  slots.forEach((slot, i) => {
    if(i === curIdx) return; // skip the currently-displayed task
    // Group divider: thicker treatment when crossing into a different room
    // than the previous card we rendered. Each divider shows the room name in
    // a chip plus the room's color dot so the boundary is unmistakable.
    if(slot.roomId !== lastRenderedRoom){
      // Big, prominent group separator — color-band on top, room name as a
      // large heading, "New group" caption underneath. Generous vertical
      // breathing room so it feels like the start of a new section, not
      // just a divider line.
      const div = mk('div','');
      div.style.cssText = 'margin:40px 0 18px;padding:0';
      const dotColor = (typeof RC === 'object' && RC[slot.roomId]) ? RC[slot.roomId] : 'var(--charcoal)';
      div.innerHTML =
        '<div style="height:5px;background:'+dotColor+';border-radius:3px;margin-bottom:12px;opacity:.85"></div>' +
        '<div style="display:flex;align-items:baseline;gap:10px;padding:0 2px">' +
          '<span style="font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:'+dotColor+'">▸ New group</span>' +
          '<div style="flex:1;height:1px;background:var(--border)"></div>' +
        '</div>' +
        '<h2 style="font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.02em;line-height:1.2;margin:6px 0 0;padding:0 2px">'+slot.roomName+'</h2>';
      wrap.appendChild(div);
      lastRenderedRoom = slot.roomId;
    }

    // Task preview card — the task name reads as a proper heading so each
    // card unmistakably marks the start of a new task. The status pill +
    // category + cost meta sit in a quiet row beneath it; the chevron sits
    // on the right edge for "view full detail" affordance.
    const card = mk('div','');
    const _color = (typeof RC === 'object' && RC[slot.roomId]) ? RC[slot.roomId] : 'var(--border-mid)';
    card.style.cssText = 'background:var(--bg-card);border:1px solid var(--border);border-left:4px solid '+_color+';border-radius:var(--rl);padding:18px 18px 16px;margin-bottom:12px;cursor:pointer;transition:box-shadow .12s,transform .05s;display:flex;flex-direction:column;gap:14px;position:relative';
    card.onmouseenter = () => { card.style.boxShadow = '0 2px 14px rgba(0,0,0,.08)'; };
    card.onmouseleave = () => { card.style.boxShadow = ''; };
    card.dataset.roomId = slot.roomId;
    card.dataset.taskId = slot.task.id;
    card.onclick = () => {
      pickTask(slot.roomId, slot.task);
      // After re-render, scroll the right panel back to top so the new
      // current-task view starts at its header.
      requestAnimationFrame(() => {
        const rb = document.getElementById('rp-body');
        if(rb) rb.scrollTop = 0;
      });
    };

    // Heading block — task name as h3, with status pill + category + cost
    // meta line below. Chevron is absolutely-positioned to the right.
    const _st = (typeof getTaskStatus === 'function') ? getTaskStatus(slot.task) : { label:'In progress', key:'progress' };
    const _stColors = {
      rework:     'background:rgba(212,90,40,.15);color:#a04020',
      completed:  'background:rgba(96,146,108,.15);color:#1f6e3f',
      notstarted: 'background:rgba(140,140,140,.18);color:#555',
      progress:   'background:rgba(46,125,143,.15);color:#1f5b6b',
    };
    const _icon = (typeof ICON_STATUS === 'function') ? ICON_STATUS(_st.key, 11) : '';
    const heading = mk('div','');
    heading.style.cssText = 'display:flex;flex-direction:column;gap:6px;padding-right:24px';
    heading.innerHTML =
      '<h3 style="font-size:17px;font-weight:600;color:var(--t1);letter-spacing:-.015em;line-height:1.3;margin:0">'+slot.task.name+'</h3>' +
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
        '<span style="display:inline-flex;align-items:center;gap:5px;'+(_stColors[_st.key]||_stColors.progress)+';padding:3px 9px;border-radius:11px;font-size:11px;font-weight:600;line-height:1">'+_icon+' '+_st.label+'</span>' +
        (slot.task.category ? '<span style="font-size:11.5px;color:var(--t3)">'+slot.task.category+'</span>' : '') +
        (slot.task.cost ? '<span style="font-size:11.5px;color:var(--t3)">·</span><span style="font-size:12px;color:var(--green);font-family:var(--mono);font-weight:600">'+fmt(slot.task.cost)+'</span>' : '') +
      '</div>';
    card.appendChild(heading);
    // Chevron — absolutely positioned so the heading text can wrap freely.
    const chev = mk('div','');
    chev.style.cssText = 'position:absolute;top:18px;right:16px;color:var(--t3);display:flex;align-items:center';
    chev.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    card.appendChild(chev);

    // Tiny photo strip — pull up to 4 photos from any walk that has them.
    const photoUrls = [];
    for(const w of WALKS){
      const ps = (typeof getWalkPhotos === 'function') ? getWalkPhotos(slot.roomId, slot.task.id, w.id) : [];
      ps.forEach(u => { if(photoUrls.length < 4) photoUrls.push(u); });
      if(photoUrls.length >= 4) break;
    }
    if(photoUrls.length){
      const strip = mk('div','');
      strip.style.cssText = 'display:flex;gap:3px';
      photoUrls.forEach(url => {
        const t = mk('div','');
        t.style.cssText = 'flex:1;aspect-ratio:4/3;background:var(--bg-2) url("'+url+'") center/cover no-repeat;border-radius:var(--r);min-width:0';
        strip.appendChild(t);
      });
      card.appendChild(strip);
    }

    wrap.appendChild(card);
  });

  body.appendChild(wrap);

  // Scroll-driven scrubber sync — when a preview card crosses the middle of
  // the viewport, light up its tick on the side scrubber and slide the thumb
  // there. Pure visual update, no re-render. The secondary menu bar title is
  // intentionally NOT synced from scroll for tasks: it stays pinned to the
  // currently-selected task so the breadcrumb and the "Continue scrolling"
  // feed read consistently (breadcrumb = current task, feed = upcoming).
  if(typeof IntersectionObserver === 'function'){
    const rb = document.getElementById('rp-body');
    if(rb){
      const scrubSlots = (typeof __buildScrubSlots === 'function') ? __buildScrubSlots() : [];
      const idxOf = {};
      scrubSlots.forEach((s, i) => { idxOf[s.roomId+'|'+s.task.id] = i; });
      const denom = Math.max(1, scrubSlots.length - 1);
      let __syncRaf = 0;
      function __scrollSync(idx){
        const ticks = document.querySelectorAll('.rp-scrub-tick');
        ticks.forEach(t => t.classList.remove('is-active'));
        const tick = ticks[idx];
        if(tick) tick.classList.add('is-active');
        const thumb = document.getElementById('rp-scrub-thumb');
        if(thumb) thumb.style.top = ((idx / denom) * 100) + '%';
      }
      const obs = new IntersectionObserver(entries => {
        let best = null;
        entries.forEach(e => {
          if(!e.isIntersecting) return;
          if(!best || e.intersectionRatio > best.intersectionRatio) best = e;
        });
        if(!best) return;
        const el = best.target;
        const key = (el.dataset.roomId||'')+'|'+(el.dataset.taskId||'');
        const idx = idxOf[key];
        if(typeof idx !== 'number') return;
        if(__syncRaf) cancelAnimationFrame(__syncRaf);
        __syncRaf = requestAnimationFrame(() => __scrollSync(idx));
      }, { root: rb, threshold: [0.35, 0.7], rootMargin: '-30% 0px -45% 0px' });
      wrap.querySelectorAll('[data-task-id]').forEach(el => obs.observe(el));
    }
  }
}

// Build & append the stacked preview list of every other group. Used by the
// zoom=1 group view so the right panel feels like one continuous scroll
// across all groups (current group = full task list, every other group =
// compact preview card with its photos + task summary). When a card scrolls
// into view, the secondary menu bar title updates to that group's name.
function appendStackedGroupsFeed(body, currentRoomId){
  const roomIds = Object.keys(ROOMS).filter(id => id !== currentRoomId && ROOMS[id]);
  if(!roomIds.length) return;

  const wrap = mk('div','');
  wrap.style.cssText = 'margin:48px 0 24px;display:flex;flex-direction:column;gap:0';

  const heading = mk('div','');
  heading.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:0 4px';
  heading.innerHTML =
    '<span style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)">Continue scrolling — all groups</span>' +
    '<div style="flex:1;height:1px;background:var(--border)"></div>' +
    '<span style="font-size:11px;color:var(--t3);font-family:var(--mono)">'+(roomIds.length+1)+' groups total</span>';
  wrap.appendChild(heading);

  roomIds.forEach(rid => {
    const room = ROOMS[rid];
    const dotColor = (typeof RC === 'object' && RC[rid]) ? RC[rid] : 'var(--charcoal)';

    // Big group divider — same look as the per-task feed's "New group" header
    // so users can tell instantly when the scroll has moved to a new room.
    const div = mk('div','');
    div.style.cssText = 'margin:32px 0 16px;padding:0';
    div.innerHTML =
      '<div style="height:5px;background:'+dotColor+';border-radius:3px;margin-bottom:12px;opacity:.85"></div>' +
      '<div style="display:flex;align-items:baseline;gap:10px;padding:0 2px">' +
        '<span style="font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:'+dotColor+'">▸ Next group</span>' +
        '<div style="flex:1;height:1px;background:var(--border)"></div>' +
        '<span style="font-size:11px;color:var(--t3);font-family:var(--mono)">'+(room.taskList ? room.taskList.length : 0)+' tasks · '+(room.budget?fmt(room.budget):'—')+'</span>' +
      '</div>' +
      '<h2 style="font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.02em;line-height:1.2;margin:6px 0 0;padding:0 2px">'+room.name+'</h2>';
    wrap.appendChild(div);

    // Group card — wraps the group photos strip + a quick task list.
    const card = mk('div','');
    card.style.cssText = 'background:var(--bg-card);border:1px solid var(--border);border-left:4px solid '+dotColor+';border-radius:var(--rl);padding:16px 18px;cursor:pointer;transition:box-shadow .12s';
    card.onmouseenter = () => { card.style.boxShadow = '0 2px 14px rgba(0,0,0,.08)'; };
    card.onmouseleave = () => { card.style.boxShadow = ''; };
    card.dataset.roomId = rid;
    card.onclick = () => {
      selRoom(rid);
      requestAnimationFrame(() => {
        const rb = document.getElementById('rp-body');
        if(rb) rb.scrollTop = 0;
      });
    };

    // Group photos strip — pull the first photo from each task that has one.
    const groupPhotos = [];
    (room.taskList||[]).forEach(t => {
      for(const w of WALKS){
        const ps = (typeof getWalkPhotos === 'function') ? getWalkPhotos(rid, t.id, w.id) : [];
        if(ps.length){ groupPhotos.push(ps[0]); break; }
      }
    });
    if(groupPhotos.length){
      const strip = mk('div','');
      strip.style.cssText = 'display:flex;gap:3px;margin-bottom:14px;overflow:hidden';
      const tilesToShow = Math.min(6, groupPhotos.length);
      for(let i = 0; i < tilesToShow; i++){
        const url = groupPhotos[i];
        const t = mk('div','');
        t.style.cssText = 'flex:1;aspect-ratio:4/3;background:var(--bg-2) url("'+url+'") center/cover no-repeat;border-radius:var(--r);min-width:0;position:relative;overflow:hidden';
        if(i === tilesToShow - 1 && groupPhotos.length > tilesToShow){
          t.innerHTML = '<div style="position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff">+'+(groupPhotos.length - tilesToShow + 1)+'</div>';
        }
        strip.appendChild(t);
      }
      card.appendChild(strip);
    }

    // Task summary — show first 4 tasks with status pill, then "+ N more".
    const tasksWrap = mk('div','');
    tasksWrap.style.cssText = 'display:flex;flex-direction:column;gap:8px';
    const taskList = room.taskList || [];
    const showCount = Math.min(4, taskList.length);
    for(let i = 0; i < showCount; i++){
      const t = taskList[i];
      const _st = (typeof getTaskStatus === 'function') ? getTaskStatus(t) : { label:'In progress', key:'progress' };
      const _stColors = {
        rework:     'background:rgba(212,90,40,.15);color:#a04020',
        completed:  'background:rgba(96,146,108,.15);color:#1f6e3f',
        notstarted: 'background:rgba(140,140,140,.18);color:#555',
        progress:   'background:rgba(46,125,143,.15);color:#1f5b6b',
      };
      const _icon = (typeof ICON_STATUS === 'function') ? ICON_STATUS(_st.key, 10) : '';
      const row = mk('div','');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--t1);padding:4px 0';
      row.innerHTML =
        '<span style="display:inline-flex;align-items:center;gap:4px;'+(_stColors[_st.key]||_stColors.progress)+';padding:2px 7px;border-radius:9px;font-size:10.5px;font-weight:600;line-height:1;flex-shrink:0">'+_icon+' '+_st.label+'</span>' +
        '<span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+t.name+'</span>' +
        (t.cost ? '<span style="font-size:11px;color:var(--green);font-family:var(--mono);font-weight:600;flex-shrink:0">'+fmt(t.cost)+'</span>' : '');
      tasksWrap.appendChild(row);
    }
    if(taskList.length > showCount){
      const more = mk('div','');
      more.style.cssText = 'font-size:11.5px;color:var(--t3);padding:6px 0 2px;font-style:italic';
      more.textContent = '+ '+(taskList.length - showCount)+' more task'+(taskList.length - showCount === 1?'':'s')+' — click to view all';
      tasksWrap.appendChild(more);
    }
    card.appendChild(tasksWrap);
    wrap.appendChild(card);
  });

  body.appendChild(wrap);

  // Scroll-driven sync — when a group preview card crosses the middle of
  // the viewport, update the secondary menu bar title to that group's name.
  // Pure visual update on the breadcrumb element, no full re-render, so the
  // user's scroll position is preserved.
  if(typeof IntersectionObserver === 'function'){
    const rb = document.getElementById('rp-body');
    if(!rb) return;
    function setHeaderName(name){
      const el = document.getElementById('rp-breadcrumb');
      if(!el) return;
      const lbl = el.querySelector('.__rp-bc-label');
      if(lbl){ lbl.textContent = name; lbl.title = name; return; }
      el.innerHTML = '';
      const wrapEl = mk('div','');
      wrapEl.style.cssText = 'display:flex;align-items:center;min-width:0;max-width:100%;overflow:hidden;font-family:var(--font)';
      const labEl = mk('div','__rp-bc-label');
      labEl.style.cssText = 'font-size:14px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;letter-spacing:-.005em';
      labEl.textContent = name;
      labEl.title = name;
      wrapEl.appendChild(labEl);
      el.appendChild(wrapEl);
    }
    const obs = new IntersectionObserver(entries => {
      let best = null;
      entries.forEach(e => {
        if(!e.isIntersecting) return;
        if(!best || e.intersectionRatio > best.intersectionRatio) best = e;
      });
      if(!best) return;
      const rid = best.target.dataset.roomId;
      const room = rid && ROOMS[rid];
      if(room) setHeaderName(room.name);
    }, { root: rb, threshold: [0.3, 0.6], rootMargin: '-25% 0px -50% 0px' });
    wrap.querySelectorAll('[data-room-id]').forEach(el => obs.observe(el));

    // Also restore the original group's title when the user scrolls back to
    // the top — observe the original task list container if accessible.
    const origRoom = ROOMS[currentRoomId];
    if(origRoom){
      // Pin the original room as the "default" if no preview is in view.
      // We attach a sentinel at the top of the body to detect that case.
      const sentinel = mk('div','');
      sentinel.style.cssText = 'position:absolute;top:0;left:0;width:1px;height:1px;pointer-events:none';
      sentinel.dataset.originalRoom = '1';
      // body is the rp-body's child; insert sentinel as the very first child.
      body.insertBefore(sentinel, body.firstChild);
      const topObs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if(e.isIntersecting && origRoom) setHeaderName(origRoom.name);
        });
      }, { root: rb, threshold: 0.01 });
      topObs.observe(sentinel);
    }
  }
}

// ── RESIZER DRAG ─────────────────────────────────────────────────────────────
(function(){
  const resizer   = document.getElementById('resizer');
  const bp        = document.querySelector('.bp');
  const main      = document.querySelector('.main');
  const expandBtn = document.getElementById('bp-expand-btn');
  if(!resizer || !bp || !main) return;

  const SNAP_THRESHOLD = 80;   // px — snap to collapsed if dragged within this
  const DEFAULT_W = 400;       // px — width to restore when expanding
  let lastOpenW = DEFAULT_W;   // remember last open width
  let startX = 0, startW = 0, dragging = false;

  function setWidth(w, animate){
    if(animate) bp.style.transition = 'width .2s ease';
    bp.style.width = w + 'px';
    if(animate) setTimeout(()=>{ bp.style.transition=''; }, 220);
  }

  // Keep any open Compare-walks-(2) view's compact class in sync with the
  // current bp width. When collapsed the task thumbs flip vertical/next-to-
  // hero; when expanded they return to the original horizontal rail.
  function syncSrCompact(){
    const collapsed = bp.offsetWidth <= 1;
    document.querySelectorAll('.sr-body').forEach(el => {
      el.classList.toggle('sr-compact', collapsed);
    });
  }
  window.__syncSrCompact = syncSrCompact;

  // Collapse hides the whole left panel (width→0); a small > pill appears on
  // the left edge to re-open it. Mirrors the earlier hide/expand behaviour.
  function collapse(animate){
    lastOpenW = bp.offsetWidth > SNAP_THRESHOLD ? bp.offsetWidth : lastOpenW;
    bp.classList.remove('bp-body-hidden');
    setWidth(0, animate);
    resizer.style.display = 'none';
    if(expandBtn) expandBtn.classList.add('visible');
    syncSrCompact();
  }

  function expand(animate){
    bp.classList.remove('bp-body-hidden');
    resizer.style.display = '';
    if(expandBtn) expandBtn.classList.remove('visible');
    setWidth(lastOpenW, animate);
    syncSrCompact();
  }

  window.expandFloorplan   = () => expand(true);
  window.collapseFloorplan = () => collapse(true);
  window.toggleFloorplan   = () => {
    if(bp.offsetWidth <= 1) expand(true); else collapse(true);
  };

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = bp.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    const dx = e.clientX - startX;
    const mainW = main.offsetWidth;
    const raw = startW + dx;
    // Allow dragging down to 0 smoothly
    const newW = Math.min(Math.max(raw, 0), mainW * 0.65);
    bp.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', e => {
    if(!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // Snap to collapsed or stay open
    if(bp.offsetWidth < SNAP_THRESHOLD){
      collapse(true);
    } else {
      lastOpenW = bp.offsetWidth;
      syncSrCompact();
    }
  });

  // Touch
  resizer.addEventListener('touchstart', e => {
    dragging = true;
    startX = e.touches[0].clientX;
    startW = bp.offsetWidth;
    resizer.classList.add('dragging');
    e.preventDefault();
  }, { passive:false });

  document.addEventListener('touchmove', e => {
    if(!dragging) return;
    const dx = e.touches[0].clientX - startX;
    const mainW = main.offsetWidth;
    const newW = Math.min(Math.max(startW + dx, 0), mainW * 0.65);
    bp.style.width = newW + 'px';
  }, { passive:false });

  document.addEventListener('touchend', () => {
    if(!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    if(bp.offsetWidth < SNAP_THRESHOLD) collapse(true);
    else { lastOpenW = bp.offsetWidth; syncSrCompact(); }
  });
})();

let bpView = 'groups';

  bpView = view;

  document.querySelectorAll('.bp-view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));

// v5: Build the expandable "details" panel for a single task row. Mirrors the
// .task-details-card layout from scope-review-floorplan.html: Contractor,
// Qty, Unit Price, Modifier (as pills), optional Product info, plus notes or
// issues when the task has them. Returns an HTML string.
function __gfTaskDetailsHtml(task, roomName){
  // Prefer real fields when present; fall back to the old defaults so older
  // task records keep rendering the same way.
  const qty      = (typeof task.qty === 'number')       ? task.qty       : 1;
  const unitName = task.unit || 'each';
  const unit     = (typeof task.unitPrice === 'number') ? task.unitPrice : ((typeof task.cost === 'number') ? task.cost : 0);
  const total    = (typeof task.cost === 'number')      ? task.cost      : (unit * qty);
  const contractor = task.assign || 'Unassigned';
  const contractorClass = (contractor === 'Unassigned') ? 'gf-td-value muted' : 'gf-td-value';
  // Derive a modifier pill class from the name, so different modifiers read
  // differently at a glance.
  function pillClass(m){
    const s = String(m || '').toLowerCase();
    if(s.indexOf('defer') >= 0)   return 'gf-td-pill deferred';
    if(s.indexOf('resident') >= 0 || s.indexOf('tenant') >= 0) return 'gf-td-pill resident';
    if(s.indexOf('future')  >= 0) return 'gf-td-pill future';
    return 'gf-td-pill';
  }
  const modHtml = task.modifier
    ? '<span class="'+pillClass(task.modifier)+'">'+ task.modifier +'</span>'
    : '';
  const moneyFn = (typeof money === 'function') ? money : (typeof fmt === 'function' ? fmt : (n => '$'+n));
  let html = '<div class="gf-td-grid">';
  html += '<div class="gf-td-item full-row"><span class="gf-td-label">Contractor</span>'+
            '<div class="'+contractorClass+'">'+ contractor +'</div></div>';
  html += '<div class="gf-td-item"><span class="gf-td-label">Qty</span>'+
            '<div class="gf-td-value">'+ qty +' '+ unitName +'</div></div>';
  html += '<div class="gf-td-item"><span class="gf-td-label">Rate</span>'+
            '<div class="gf-td-value mono">'+ moneyFn(unit) +' '+ unitName +'</div></div>';
  html += '<div class="gf-td-item full-row"><span class="gf-td-label">Modifier</span>'+
            '<div class="gf-td-modifier-row">'+
              (modHtml || '<span class="gf-td-value muted">None</span>')+
              '<button type="button" class="gf-td-add" data-gf-td-add="1">+ Add</button>'+
            '</div></div>';
  html += '<div class="gf-td-item"><span class="gf-td-label">Task ID</span>'+
            '<div class="gf-td-value mono">'+ (task.id || '—') +'</div></div>';
  html += '<div class="gf-td-item"><span class="gf-td-label">Total</span>'+
            '<div class="gf-td-value mono">'+ moneyFn(total) +'</div></div>';
  // Product block — if the task carries real product metadata, use it
  // verbatim. Otherwise fall back to the old "task name + stand-in SKU"
  // placeholder so older records keep rendering a product card.
  if(task.product){
    const metaBits = [];
    if(task.sku)   metaBits.push('sku: ' + task.sku);
    if(task.brand) metaBits.push('brand: ' + task.brand);
    html += '<div class="gf-td-product">'+
              '<div class="gf-td-product-title">'+ task.product +'</div>'+
              (metaBits.length ? '<div class="gf-td-product-meta">'+ metaBits.join(' · ') +'</div>' : '')+
            '</div>';
  } else {
    const photoRef = Array.isArray(task.photos) && task.photos.length ? task.photos[0] : null;
    if(photoRef !== null){
      const fakeSku = (1000 + parseInt(String(task.id).slice(-3) || '0', 10)) % 999999;
      html += '<div class="gf-td-product">'+
                '<div class="gf-td-product-title">'+ (roomName ? roomName+' · ' : '') + task.name +'</div>'+
                '<div class="gf-td-product-meta">SKU: '+ fakeSku +'</div>'+
              '</div>';
    }
  }
  if(task.notes){
    html += '<div class="gf-td-notes">'+ task.notes +'</div>';
  }
  if(task.issue){
    html += '<div class="gf-td-issue">Issue: '+ task.issue +'</div>';
  }
  // Per-task action row inside the expanded card — Approve / Request edit /
  // Delete. Wired by the row click handler via data-gf-task-action.
  const _appLabel = task.done ? 'Approved' : 'Approve';
  html += '<div class="gf-task-actions">'+
    '<button type="button" class="gf-task-action approve" data-gf-task-action="approve">'+
      '<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5 7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      _appLabel+
    '</button>'+
    '<button type="button" class="gf-task-action edit" data-gf-task-action="edit">'+
      '<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2-7 7H2.5v-2l7-7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      'Request edit'+
    '</button>'+
    '<button type="button" class="gf-task-action delete" data-gf-task-action="delete" aria-label="Delete task" title="Delete task">'+
      '<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M2 3.5h10M5.5 3.5V2.5h3v1M6 6v4M8 6v4M3.5 3.5l.5 8h6l.5-8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
    '</button>'+
  '</div>';
  html += '</div>';
  return html;
}

// Build the collapsible group/task card list in the left panel.
// Uses the ROOMS data so it mirrors what the table view shows.
function renderBpGroupFeed(){
  const host = document.getElementById('bp-groups-inner');
  if(!host) return;
  // Track expanded group IDs in a JS Set so user toggles survive re-renders.
  // First render seeds with the first group expanded (original behaviour);
  // after that, the set is the source of truth — collapsing the last expanded
  // card no longer triggers an auto-expand on rebuild.
  if(window.__bpGroupsExpanded == null){
    const firstRoomId = Object.keys(ROOMS)[0];
    window.__bpGroupsExpanded = new Set(firstRoomId ? [firstRoomId] : []);
  }
  host.innerHTML = '';

  // Formatter for currency — matches how the table view renders numbers
  const money = (n) => (typeof fmt === 'function') ? fmt(n) : ('$' + n.toLocaleString());
  const ICON_WARN = '<svg width="9" height="9" viewBox="0 0 10 10" fill="none" style="flex-shrink:0"><path d="M5 1L9 8H1L5 1Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><line x1="5" y1="4" x2="5" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="7.3" r=".6" fill="currentColor"/></svg>';

  // Read the same LAYERS dict the floorplan uses, so the menu-bar toggles
  // (Budget / Contractor / Modifiers / Materials / Notes / Activity / Out of
  // stock / Change orders) drive what shows on scope cards in lock-step.
  const L = (typeof LAYERS === 'object' && LAYERS) ? LAYERS : {};

  // ── "All groups" summary card ────────────────────────────────────────────
  // Sits above the per-group list. Clicking it clears the room selection and
  // sends the right panel back to the full-scope Home view (zoom 0).
  const allTasks = Object.values(ROOMS).reduce((s,r) => s + r.taskList.length, 0);
  const allCost  = Object.values(ROOMS).reduce((s,r) => s + r.taskList.reduce((a,t) => a + (t.cost||0), 0), 0);
  const allCard = document.createElement('article');
  allCard.className = 'gf-card gf-card-all' + (selRoomId == null ? ' selected' : '');
  const allHead = document.createElement('header');
  allHead.className = 'gf-head';
  allHead.innerHTML =
    '<span class="gf-dot" style="background:var(--charcoal)"></span>' +
    '<span class="gf-title">All groups</span>' +
    '<span class="gf-count">'+ allTasks +' tasks</span>' +
    (L.budget ? '<span class="gf-total">'+ money(allCost) +'</span>' : '');
  allHead.addEventListener('click', () => {
    selRoomId = null; selTask = null;
    if(typeof hlRoom === 'function') hlRoom(null);
    if(typeof setZoom === 'function') setZoom(0); else if(typeof render === 'function') render();
  });
  allCard.appendChild(allHead);
  host.appendChild(allCard);

  Object.entries(ROOMS).forEach(([rid, room], idx) => {
    const color = RC[rid] || 'var(--charcoal)';
    const total = room.taskList.reduce((s,t) => s + (t.cost || 0), 0);

    // Expansion state lives in window.__bpGroupsExpanded so user toggles
    // survive re-renders triggered by layer changes / room selection.
    const expand = window.__bpGroupsExpanded.has(rid);
    const card = document.createElement('article');
    card.className = 'gf-card' + (expand ? ' expanded' : '') + (selRoomId === rid ? ' selected' : '');
    card.dataset.roomId = rid;

    // Header row — task count always, total cost gated by LAYERS.budget.
    // Sqft gets appended to the title when the room has it; the group note
    // renders as its own sub-row under the header.
    const head = document.createElement('header');
    head.className = 'gf-head';
    const sqftSuffix = room.sqft ? ' <span class="gf-sqft">· '+ room.sqft +' sqft</span>' : '';
    head.innerHTML =
      '<span class="gf-dot" style="background:'+color+'"></span>' +
      '<span class="gf-title">'+ room.name + sqftSuffix +'</span>' +
      '<span class="gf-count">'+ room.taskList.length +' '+ (room.taskList.length===1?'task':'tasks') +'</span>' +
      (L.budget ? '<span class="gf-total">'+ money(total) +'</span>' : '') +
      '<span class="gf-chev" aria-hidden="true"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    // Clicking the group header selects the room (filters the Compare timeline
    // to just that group) AND toggles expand so the task rows are visible.
    head.addEventListener('click', () => {
      // Persist the toggle in the JS set so the next re-render respects it.
      // Also track user-collapsed state so scope sync doesn't auto-reopen.
      if(!window.__bpUserCollapsed) window.__bpUserCollapsed = new Set();
      if(window.__bpGroupsExpanded.has(rid)){
        window.__bpGroupsExpanded.delete(rid);
        window.__bpUserCollapsed.add(rid);
        card.classList.remove('expanded');
      } else {
        window.__bpGroupsExpanded.add(rid);
        window.__bpUserCollapsed.delete(rid);
        card.classList.add('expanded');
      }
      if(typeof selRoom === 'function') selRoom(rid);
    });
    card.appendChild(head);
    // Optional group-level note sits just under the header (gated by Notes
    // layer so it follows the same show/hide logic as task notes).
    if(L.notes && room.groupNote){
      const noteEl = document.createElement('div');
      noteEl.className = 'gf-group-note';
      noteEl.innerHTML = '<span class="gf-group-note-label">Group Note:</span> ' + room.groupNote;
      card.appendChild(noteEl);
    }

    // Body — task rows
    const body = document.createElement('div');
    body.className = 'gf-body';
    room.taskList.forEach(task => {
      const row = document.createElement('div');
      row.className = 'gf-task' + (task.done ? ' done' : '');
      row.dataset.taskId = task.id;
      const metaBits = [];
      // Each bit is gated by its matching floorplan layer toggle.
      if(L.budget)     metaBits.push('<span class="gf-task-cost">'+ money(task.cost||0) +'</span>');
      if(L.contractor) metaBits.push('<span class="gf-task-ctor">'+ (task.assign || 'Unassigned') +'</span>');
      if(L.modifier && task.modifier) metaBits.push('<span class="gf-task-mod">'+ task.modifier +'</span>');
      if(L.materials)  metaBits.push('<span class="gf-task-mod">Materials</span>');
      if(L.notes && task.notes) metaBits.push('<span class="gf-task-mod">Note</span>');
      if(L.activity)   metaBits.push('<span class="gf-task-mod">Activity</span>');
      if(L.status){
        const _st = getTaskStatus(task);
        const _stPalette = {
          rework:     'background:rgba(212,90,40,.15);color:#a04020',
          completed:  'background:rgba(96,146,108,.15);color:#1f6e3f',
          notstarted: 'background:rgba(140,140,140,.18);color:#555',
          progress:   'background:rgba(46,125,143,.15);color:#1f5b6b',
        };
        metaBits.push('<span class="gf-task-mod" style="'+(_stPalette[_st.key]||_stPalette.progress)+';font-weight:600;display:inline-flex;align-items:center;gap:4px"><span style="display:inline-flex;align-items:center">'+ICON_STATUS(_st.key, 11)+'</span>'+ _st.label +'</span>');
      }
      if(L.onhold && task.outOfStock) metaBits.push('<span class="gf-task-mod" style="color:var(--red)">Out of stock</span>');
      // Summary (clickable to select) + chevron toggle (clickable to expand)
      // + details panel that mirrors scope-review-floorplan.html. A category
      // kicker sits above the name when the task carries one (e.g. "Cabinet
      // Refresh/Repair/Repaint/Demo" above "Paint Cabinet Base").
      const categoryLine = task.category
        ? '<div class="gf-task-category">'+ task.category +'</div>'
        : '';
      const summaryInner =
        categoryLine +
        '<div class="gf-task-name">'+ task.name +'</div>' +
        (metaBits.length ? '<div class="gf-task-meta">'+ metaBits.join('') +'</div>' : '');
      row.innerHTML =
        '<div class="gf-task-summary">'+
          '<div class="gf-task-summary-main">'+ summaryInner +'</div>'+
          '<button type="button" class="gf-task-toggle" aria-label="Show details" data-gf-toggle="1">'+
            '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">'+
              '<path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>'+
            '</svg>'+
          '</button>'+
        '</div>' +
        '<div class="gf-task-details">'+ __gfTaskDetailsHtml(task, room.name) +'</div>';
      // Click anywhere on the task summary toggles the expanded state.
      // Action buttons inside the expanded details panel intercept their
      // own clicks via data-gf-task-action.
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        const actBtn = e.target.closest('[data-gf-task-action]');
        if(actBtn){
          const kind = actBtn.dataset.gfTaskAction;
          if(kind === 'approve' && !task.done){
            task.done = true;
            if(typeof render === 'function') render();
          }
          actBtn.style.filter = 'brightness(.92)';
          setTimeout(() => { actBtn.style.filter = ''; }, 140);
          return;
        }
        if(e.target.closest('.gf-task-details')) return;
        row.classList.toggle('expanded');
      });
      body.appendChild(row);
    });
    card.appendChild(body);

    // Actions row — Approve group, Request edit, and a compact + button for
    // adding a new task. Matches the layout in ProjectReview_Grid.html.
    const actions = document.createElement('div');
    actions.className = 'gf-actions';
    actions.innerHTML =
      '<button class="gf-action approve" type="button" style="flex:1">Approve group</button>' +
      '<button class="gf-action gf-action-edit" type="button" style="flex:1">Request edit</button>' +
      '<button class="gf-action new-task gf-action-icon" type="button" title="New task" aria-label="New task">' +
        '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>' +
      '</button>';
    actions.addEventListener('click', e => e.stopPropagation());
    card.appendChild(actions);

    host.appendChild(card);
  });
}

// Deterministic color picker for contractor dots — same contractor always
// gets the same swatch so the Contractors list stays visually stable.
function __ctorColor(name){
  if(!name || name === 'Unassigned') return 'var(--border-mid)';
  const palette = ['#567DA3','#60926C','#8B5DD4','#B3643E','#D4A017','#C4783A','#5BAED4','#7a8c6e','#B14541'];
  const seed = (typeof __tlHashStr === 'function') ? __tlHashStr(String(name)) : 0;
  return palette[seed % palette.length];
}

// Build the collapsible contractor/task card list in the left panel.
// Mirrors renderBpGroupFeed() but buckets by task.assign instead of room.
function renderBpContractorFeed(){
  const host = document.getElementById('bp-contractors-inner');
  if(!host) return;
  // Preserve which cards were expanded so a layer toggle doesn't collapse the
  // view the user was actively reading.
  const prevExpanded = new Set();
  host.querySelectorAll('.gf-card.expanded[data-ctor-id]').forEach(c => {
    prevExpanded.add(c.dataset.ctorId);
  });
  const hadAnyExpanded = prevExpanded.size > 0 || host.querySelector('.gf-card.expanded') != null;
  host.innerHTML = '';

  const money = (n) => (typeof fmt === 'function') ? fmt(n) : ('$' + n.toLocaleString());
  const L = (typeof LAYERS === 'object' && LAYERS) ? LAYERS : {};

  // Bucket every task by its assigned contractor. We also keep the rid+room
  // attached so clicking a task row can route back through selRoom/pickTask.
  const buckets = {};  // { contractorName: [ { rid, room, task } ] }
  Object.entries(ROOMS).forEach(([rid, room]) => {
    room.taskList.forEach(task => {
      const key = task.assign || 'Unassigned';
      if(!buckets[key]) buckets[key] = [];
      buckets[key].push({ rid, room, task });
    });
  });

  // Sort contractor names alphabetically, with "Unassigned" pinned to the end.
  const names = Object.keys(buckets).sort((a,b) => {
    if(a === 'Unassigned') return 1;
    if(b === 'Unassigned') return -1;
    return a.localeCompare(b);
  });

  // Track which contractor is currently "selected" via selTask.assign so the
  // card highlight mirrors what Scope does for rooms.
  const activeCtor = (selTask && selTask.assign) ? selTask.assign : null;

  // ── "All contractors" summary card ───────────────────────────────────────
  const allTasks = names.reduce((s,n) => s + buckets[n].length, 0);
  const allCost  = names.reduce((s,n) => s + buckets[n].reduce((a,b) => a + (b.task.cost||0), 0), 0);
  const allCard = document.createElement('article');
  allCard.className = 'gf-card gf-card-all' + (selRoomId == null && !activeCtor ? ' selected' : '');
  const allHead = document.createElement('header');
  allHead.className = 'gf-head';
  allHead.innerHTML =
    '<span class="gf-dot" style="background:var(--charcoal)"></span>' +
    '<span class="gf-title">All contractors</span>' +
    '<span class="gf-count">'+ allTasks +' tasks</span>' +
    (L.budget ? '<span class="gf-total">'+ money(allCost) +'</span>' : '');
  allHead.addEventListener('click', () => {
    selRoomId = null; selTask = null;
    if(typeof hlRoom === 'function') hlRoom(null);
    if(typeof setZoom === 'function') setZoom(0); else if(typeof render === 'function') render();
  });
  allCard.appendChild(allHead);
  host.appendChild(allCard);

  names.forEach((name, idx) => {
    const items = buckets[name];
    const color = __ctorColor(name);
    const total = items.reduce((s,b) => s + (b.task.cost || 0), 0);

    const expand = hadAnyExpanded ? prevExpanded.has(name) : (idx === 0);
    const card = document.createElement('article');
    card.className = 'gf-card' + (expand ? ' expanded' : '') + (activeCtor === name ? ' selected' : '');
    card.dataset.ctorId = name;

    const head = document.createElement('header');
    head.className = 'gf-head';
    head.innerHTML =
      '<span class="gf-dot" style="background:'+color+'"></span>' +
      '<span class="gf-title">'+ name +'</span>' +
      '<span class="gf-count">'+ items.length +' '+ (items.length===1?'task':'tasks') +'</span>' +
      (L.budget ? '<span class="gf-total">'+ money(total) +'</span>' : '') +
      '<span class="gf-chev" aria-hidden="true"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    head.addEventListener('click', () => {
      card.classList.toggle('expanded');
    });
    card.appendChild(head);

    // Trade caption — sits directly under the company name. Pulls the
    // trade from CONTRACTOR_META (e.g. "General Contractor", "Flooring").
    const _ctorTrade = (CONTRACTOR_META[name] && CONTRACTOR_META[name].trade) || 'Contractor';
    const tradeEl = document.createElement('div');
    tradeEl.className = 'gf-trade-caption';
    tradeEl.textContent = _ctorTrade;
    card.appendChild(tradeEl);

    const body = document.createElement('div');
    body.className = 'gf-body';
    items.forEach(({ rid, room, task }) => {
      const row = document.createElement('div');
      row.className = 'gf-task' + (task.done ? ' done' : '');
      row.dataset.taskId = task.id;
      const metaBits = [];
      // In the Contractors view, the group (room) replaces the contractor
      // meta chip since the card already communicates the contractor.
      metaBits.push('<span class="gf-task-ctor" style="color:var(--t3)">'+ room.name +'</span>');
      if(L.budget)     metaBits.push('<span class="gf-task-cost">'+ money(task.cost||0) +'</span>');
      if(L.modifier && task.modifier) metaBits.push('<span class="gf-task-mod">'+ task.modifier +'</span>');
      if(L.materials)  metaBits.push('<span class="gf-task-mod">Materials</span>');
      if(L.notes && task.notes) metaBits.push('<span class="gf-task-mod">Note</span>');
      if(L.activity)   metaBits.push('<span class="gf-task-mod">Activity</span>');
      if(L.status){
        const _st = getTaskStatus(task);
        const _stPalette = {
          rework:     'background:rgba(212,90,40,.15);color:#a04020',
          completed:  'background:rgba(96,146,108,.15);color:#1f6e3f',
          notstarted: 'background:rgba(140,140,140,.18);color:#555',
          progress:   'background:rgba(46,125,143,.15);color:#1f5b6b',
        };
        metaBits.push('<span class="gf-task-mod" style="'+(_stPalette[_st.key]||_stPalette.progress)+';font-weight:600;display:inline-flex;align-items:center;gap:4px"><span style="display:inline-flex;align-items:center">'+ICON_STATUS(_st.key, 11)+'</span>'+ _st.label +'</span>');
      }
      if(L.onhold && task.outOfStock) metaBits.push('<span class="gf-task-mod" style="color:var(--red)">Out of stock</span>');
      const summaryInner =
        '<div class="gf-task-name">'+ task.name +'</div>' +
        (metaBits.length ? '<div class="gf-task-meta">'+ metaBits.join('') +'</div>' : '');
      row.innerHTML =
        '<div class="gf-task-summary">'+
          '<div class="gf-task-summary-main">'+ summaryInner +'</div>'+
          '<button type="button" class="gf-task-toggle" aria-label="Show details" data-gf-toggle="1">'+
            '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">'+
              '<path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>'+
            '</svg>'+
          '</button>'+
        '</div>' +
        '<div class="gf-task-details">'+ __gfTaskDetailsHtml(task, room.name) +'</div>';
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        const actBtn = e.target.closest('[data-gf-task-action]');
        if(actBtn){
          const kind = actBtn.dataset.gfTaskAction;
          if(kind === 'approve' && !task.done){
            task.done = true;
            if(typeof render === 'function') render();
          }
          actBtn.style.filter = 'brightness(.92)';
          setTimeout(() => { actBtn.style.filter = ''; }, 140);
          return;
        }
        if(e.target.closest('.gf-task-details')) return;
        row.classList.toggle('expanded');
      });
      body.appendChild(row);
    });
    card.appendChild(body);

    const actions = document.createElement('div');
    actions.className = 'gf-actions';
    actions.innerHTML =
      '<button class="gf-action approve" type="button" style="flex:1">Approve contractor</button>' +
      '<button class="gf-action gf-action-edit" type="button" style="flex:1">Request edit</button>';
    actions.addEventListener('click', e => e.stopPropagation());
    card.appendChild(actions);

    host.appendChild(card);
  });
}

let activeContractor = null;
let ctorSelOpen = false;

function getAllContractors(){
  const ctors = new Map();
  Object.values(ROOMS).forEach(room => {
    room.taskList.forEach(task => {
      if(task.assign && task.assign !== 'Unassigned'){
        if(!ctors.has(task.assign)) ctors.set(task.assign, 0);
        ctors.set(task.assign, ctors.get(task.assign) + 1);
      }
    });
  });
  return [...ctors.entries()].map(([name, count]) => ({ name, count })).sort((a,b) => a.name.localeCompare(b.name));
}

  'Apex General':                   { trade:'General Contractor', gc:true  },
  'ClearFlow Plumbing':             { trade:'Plumbing',           gc:false },
  'Brushstroke Co.':                { trade:'Paint & Finishes',   gc:false },

// ── COMPARE PHOTO OVERLAY STATE ───────────────────────────────────────────────
let cpoState = null;
// cpoState = { roomId, taskId, subjects:[], subjectIdx, paneA:{walkId,photos,idx}, paneB:{walkId,photos,idx} }

// Build the list of navigable subjects (tasks in room, or rooms+tasks at home)
function buildCpoSubjects(roomId, taskId){
  if(zoom === 2 || zoom === 1){
    // subjects = tasks in the current room
    const room = ROOMS[roomId];
    return room ? room.taskList.map(t=>({ roomId, taskId:t.id, groupName:room.name, taskName:t.name, color:RC[roomId] })) : [];
  } else {
    // home zoom: all tasks across all rooms
    const subjects = [];
    Object.entries(ROOMS).forEach(([rid,room]) => {
      room.taskList.forEach(t => subjects.push({ roomId:rid, taskId:t.id, groupName:room.name, taskName:t.name, color:RC[rid] }));
    });
    return subjects;
  }
}

function openCmpPhotoOverlay(roomId, taskId, clickedWalkId, clickedIdx){
  const isA = clickedWalkId === cmpWalkA;
  const subjects = buildCpoSubjects(roomId, taskId);
  const subjectIdx = subjects.findIndex(s=>s.roomId===roomId && s.taskId===taskId);

  const photosA = getWalkPhotos(roomId, taskId, cmpWalkA);
  const photosB = getWalkPhotos(roomId, taskId, cmpWalkB);

  cpoState = {
    roomId, taskId, subjects, subjectIdx: Math.max(0, subjectIdx),
    paneA:{ walkId:cmpWalkA, photos:photosA, idx: isA ? clickedIdx : 0 },
    paneB:{ walkId:cmpWalkB, photos:photosB, idx: isA ? 0 : clickedIdx }
  };

  document.getElementById('cmp-photo-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  updateCpoHeader();
  renderCpoPane('a');
  renderCpoPane('b');
}

function updateCpoHeader(){
  if(!cpoState) return;
  const s = cpoState.subjects[cpoState.subjectIdx];
  const groupEl = document.getElementById('cpo-subject-group');
  const taskEl  = document.getElementById('cpo-subject-task');
  if(groupEl) groupEl.textContent = s ? s.groupName : '';
  if(taskEl)  taskEl.textContent  = s ? s.taskName  : '';

  // Prev/next button state
  const prevBtn = document.getElementById('cpo-nav-prev');
  const nextBtn = document.getElementById('cpo-nav-next');
  if(prevBtn) prevBtn.style.opacity = cpoState.subjectIdx > 0 ? '1' : '0.3';
  if(nextBtn) nextBtn.style.opacity = cpoState.subjectIdx < cpoState.subjects.length-1 ? '1' : '0.3';
}

function navCmpSubject(dir){
  if(!cpoState) return;
  const newIdx = cpoState.subjectIdx + dir;
  if(newIdx < 0 || newIdx >= cpoState.subjects.length) return;
  cpoState.subjectIdx = newIdx;
  const s = cpoState.subjects[newIdx];
  cpoState.roomId  = s.roomId;
  cpoState.taskId  = s.taskId;
  cpoState.paneA.photos = getWalkPhotos(s.roomId, s.taskId, cpoState.paneA.walkId);
  cpoState.paneB.photos = getWalkPhotos(s.roomId, s.taskId, cpoState.paneB.walkId);
  cpoState.paneA.idx = 0;
  cpoState.paneB.idx = 0;
  updateCpoHeader();
  renderCpoPane('a');
  renderCpoPane('b');
}

function closeCmpPhotoOverlay(){
  document.getElementById('cmp-photo-overlay').style.display = 'none';
  document.body.style.overflow = '';
  cpoState = null;
}

function navCmpPhoto(pane, dir){
  if(!cpoState) return;
  const p = pane==='a' ? cpoState.paneA : cpoState.paneB;
  const newIdx = p.idx + dir;
  if(newIdx < 0 || newIdx >= p.photos.length) return;
  p.idx = newIdx;
  renderCpoPane(pane);
}

// Placeholder colors per walk — used as bg behind photos AND as empty state
const CPO_PLACEHOLDER_COLORS = ['#8B7355','#6B7A5E','#7A6B8B','#4A7A7A','#6B7580','#8B7C6B','#5A5A5A','#7A6B5A'];
const WALK_PALETTE = {
  initial_scope: '#8B7355',
  progress_1:    '#6B7A5E',
  progress_2:    '#4A7A7A',
  close_out:     '#6B7580',
  change_order:  '#8B5A5A',
};

function renderCpoPane(pane){
  if(!cpoState) return;
  const p = pane==='a' ? cpoState.paneA : cpoState.paneB;
  const walk = WALKS.find(w=>w.id===p.walkId);
  const suffix = pane==='a' ? 'a' : 'b';
  const s = cpoState.subjects[cpoState.subjectIdx];
  const color = s ? s.color : '#888';

  // Main image
  const imgEl = document.getElementById('cpo-img-'+suffix);
  imgEl.innerHTML = '';
  const walkColor = WALK_PALETTE[p.walkId] || '#C4B8A8';
  const attr = getAttr(cpoState.roomId, cpoState.taskId, p.walkId);
  const attrSource = attr.source;
  const attrByLine = attrSource === 'field_user' ? `Field capture · ${attr.assignedBy}`
    : attrSource === 'office_user' ? `Office assigned · ${attr.assignedBy}`
    : `AI suggested · ${attr.assignedAt}`;
  const attrColor = attrSource === 'ai' ? 'var(--purple)'
    : attrSource === 'office_user' ? 'rgba(255,255,255,.18)'
    : 'rgba(255,255,255,.1)';

  if(p.photos.length && p.photos[p.idx]){

      : `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="3.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 9c0-2 1.8-3.5 4-3.5S9 7 9 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Field · ${attr.assignedBy}`;

    imgEl.onmouseleave = () => attrOverlay.style.opacity = '0';

    imgEl.appendChild(msg);

  document.getElementById('cpo-prev-'+suffix).disabled = p.idx === 0 || !p.photos.length;

  // Pane header
