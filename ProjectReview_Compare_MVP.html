  hdr.innerHTML = `
    <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>
    <span style="font-size:12px;font-weight:600;color:#fff">${walk ? walk.label : '—'}</span>
    <span style="font-size:11px;color:rgba(255,255,255,.45)">${walk ? walk.date : ''}</span>
    <span style="font-size:11px;color:rgba(255,255,255,.35);margin-left:auto;font-family:var(--mono)">${p.photos.length ? `${p.idx+1} / ${p.photos.length}` : 'No photos'}</span>
  `;

  // Thumbnail strip
  const thumbsEl = document.getElementById('cpo-thumbs-'+suffix);
  thumbsEl.innerHTML = '';
  if(p.photos.length){
    p.photos.forEach((url, idx) => {
      const isActive = idx === p.idx;
      const thumbAttr = getAttr(cpoState.roomId, cpoState.taskId, p.walkId);
      const thumbAttrLabel = thumbAttr.source === 'ai' ? '✦ AI'
        : thumbAttr.source === 'office_user' ? 'Office'
        : `Field · ${thumbAttr.assignedBy}`;
      const thumbAttrColor = thumbAttr.source === 'ai' ? 'var(--purple)'
        : thumbAttr.source === 'office_user' ? 'rgba(255,255,255,.2)'
        : 'rgba(0,0,0,.55)';

      const thWrap = document.createElement('div');
      thWrap.style.cssText = 'position:relative;flex-shrink:0';

      const th = document.createElement('div');
      th.style.cssText = `width:72px;height:54px;border-radius:3px;background:${walkColor} url(${url}) center/cover;cursor:pointer;opacity:${isActive?1:.55};outline:${isActive?'2px solid #fff':'none'};outline-offset:1px;transition:opacity .12s`;
      th.onclick = () => { p.idx = idx; renderCpoPane(pane); };

      // Hover attribution tooltip on thumbnail
      const thTooltip = document.createElement('div');
      thTooltip.style.cssText = `position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;font-size:9px;font-weight:600;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10`;
      thTooltip.textContent = thumbAttrLabel;

      thWrap.onmouseenter = () => { th.style.opacity='1'; thTooltip.style.opacity='1'; };
      thWrap.onmouseleave = () => { th.style.opacity = isActive?'1':'.55'; thTooltip.style.opacity='0'; };

      thWrap.appendChild(th);
      thWrap.appendChild(thTooltip);
      thumbsEl.appendChild(thWrap);
    });
  } else {
    const placeholder = document.createElement('div');
    placeholder.style.cssText = 'display:flex;align-items:center;gap:8px';
    placeholder.innerHTML = `
      <div style="width:72px;height:54px;border-radius:3px;background:#2a2a2a;flex-shrink:0"></div>
      <span style="font-size:11px;color:rgba(255,255,255,.3);font-style:italic">No photos captured on this walk</span>`;
    thumbsEl.appendChild(placeholder);
  }
}


// Single-mode variant: this file is pinned to Compare walks. The toggle is
// hidden in the header so the user can't switch out of it.
let compareMode = true;
let cmpWalkA = 'initial_scope';
let cmpWalkB = 'close_out';
let cmpDdOpen = null; // 'A' or 'B'

// ── SCOPE-REVIEW MODE (side-by-side walks) ────────────────────────────────
// Mutually exclusive with compareMode. Both are "alternate" right-panel
// views; only one at a time.
let scopeReviewMode = false;
// Default walk selection for SR columns (can be mutated from within SR UI)
let srWalkLeft  = 'initial_scope';
let srWalkRight = 'progress_1';
// SR-4: scope group + task selection (sidebar)
let srGroupId = 'kitchen';   // default group = kitchen (shared fallback)
// Per-column group selection — each column can focus on a different scope
// group independently. Seeded to match srGroupId.
let srColGroup = { L:'kitchen', R:'kitchen' };
let srTaskId  = null;         // no task pinned initially
// Per-column hero selection. Independent per side so L and R can show
// different photos. Shape: { origin:'group'|'task', roomId, taskId, idx, url }
let srHeroSel = { L:null, R:null };

function toggleCompare(){
  compareMode = !compareMode;
  // Mutually exclusive with scope review
  if(compareMode && scopeReviewMode){
    scopeReviewMode = false;
    const srBtn = document.getElementById('vt-sr');
    if(srBtn) srBtn.classList.remove('active');
  }
  const btn = document.getElementById('vt-compare');
  if(btn) btn.classList.toggle('active', compareMode);
  document.getElementById('vt-photo').classList.toggle('active', !compareMode && !scopeReviewMode && viewMode==='photo');
  document.getElementById('vt-table').classList.toggle('active', !compareMode && !scopeReviewMode && viewMode==='table');
  if(compareMode && viewMode === 'table'){ viewMode = 'photo'; }
  renderWalkSel(); // dim/undim the walk selector
  document.addEventListener('click', closeCmpDd);
  // If the compare view was host to a detail modal, close it on mode exit
  if(!compareMode && typeof closeTlModal === 'function') closeTlModal();
  render();
}

function toggleScopeReview(){
  scopeReviewMode = !scopeReviewMode;
  // When entering SR, seed both columns from whatever group the main nav
  // currently has selected (floor plan / breadcrumb). Falls back to the
  // existing srColGroup.L if selRoomId isn't a real group.
  if(scopeReviewMode && selRoomId && ROOMS[selRoomId]){
    srColGroup.L = selRoomId;
    srColGroup.R = selRoomId;
    srHeroSel = { L:null, R:null };
  }
  // Mutually exclusive with compare
  if(scopeReviewMode && compareMode){
    compareMode = false;
    const cmpBtn = document.getElementById('vt-compare');
    if(cmpBtn) cmpBtn.classList.remove('active');
    // close any compare-owned modal that might still be up
    if(typeof closeTlModal === 'function') closeTlModal();
  }
  const btn = document.getElementById('vt-sr');
  if(btn) btn.classList.toggle('active', scopeReviewMode);
  document.getElementById('vt-photo').classList.toggle('active', !compareMode && !scopeReviewMode && viewMode==='photo');
  document.getElementById('vt-table').classList.toggle('active', !compareMode && !scopeReviewMode && viewMode==='table');
  // Table view doesn't make sense behind a full-bleed SR shell
  if(scopeReviewMode && viewMode === 'table'){ viewMode = 'photo'; }
  // Polish: clear any pinned task when leaving SR, and wire/unwire the
  // SR-global Escape-to-clear handler.
  if(!scopeReviewMode){
    srTaskId = null;
    if(typeof closeTlModal === 'function') closeTlModal();
    if(__srEscHandler){ document.removeEventListener('keydown', __srEscHandler); __srEscHandler = null; }
  } else if(!__srEscHandler){
    __srEscHandler = (e) => {
      if(e.key !== 'Escape') return;
      if(!scopeReviewMode) return;
      // Let the modal handle its own Escape first
      if(typeof __tlModalState !== 'undefined' && __tlModalState) return;
      if(srTaskId){ srTaskId = null; render(); }
    };
    document.addEventListener('keydown', __srEscHandler);
  }
  renderWalkSel();
  render();
}
let __srEscHandler = null;

function closeCmpDd(){
  // Only do anything if a compare-pane walk dropdown is actually open.
  // Without this guard, every document-level click (including scrubber
  // releases inside the Compare timeline) fires render() and wipes the
  // closure-local Compare-walks state — collapsing the view back to a
  // single date and snapping the scrubber to the first slot.
  if(cmpDdOpen == null) return;
  cmpDdOpen = null;
  render();
}

// Walk dot color helper
function walkDotColor(wid){
  return wid==='initial_scope'?'var(--charcoal)':wid==='close_out'?'var(--green)':wid==='change_order'?'var(--red)':'var(--blue)';
}

// ── BUILD COMPARE PANE HEADER ─────────────────────────────────────────────────
function buildCmpPaneHdr(pane, walkId, otherWalkId){
  const w = WALKS.find(w=>w.id===walkId);
  const hdr = mk('div','cmp-pane-hdr');
  const label = mk('span','cmp-pane-label');
  label.textContent = pane === 'A' ? 'Walk A' : 'Walk B';
  hdr.appendChild(label);

  const sel = mk('button','cmp-walk-sel');
  sel.innerHTML = `<span class="cmp-walk-dot" style="background:${walkDotColor(walkId)}"></span>${w ? w.label+' · '+w.date : '—'}<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;
  sel.onclick = e => { e.stopPropagation(); cmpDdOpen = cmpDdOpen===pane ? null : pane; render(); };
  hdr.appendChild(sel);

  if(cmpDdOpen === pane){
    const dd = mk('div','cmp-walk-dd');
    WALKS.filter(w=>w.id!=='change_order').forEach(wk => {
      const item = mk('button','cmp-walk-dd-item'+(wk.id===walkId?' active':'')+(wk.id===otherWalkId?' disabled':''));
      item.innerHTML = `<span class="cmp-walk-dot" style="background:${walkDotColor(wk.id)}"></span>${wk.label}<span style="font-size:10px;color:var(--t3);margin-left:auto;font-family:var(--mono)">${wk.date}</span>`;
      item.onclick = e => {
        e.stopPropagation();
        if(pane==='A') cmpWalkA = wk.id; else cmpWalkB = wk.id;
        cmpDdOpen = null; render();
      };
      dd.appendChild(item);
    });
    hdr.appendChild(dd);
  }
  return hdr;
}

// ── TILE BUILDER ──────────────────────────────────────────────────────────────
function buildCmpTile(url, size, roomId, taskId, walkId, photoIdx, hasCO){
  const tile = mk('div','cmp-tile');
  tile.style.cssText = `width:${size}px;aspect-ratio:4/3`;
  if(url){
    const img = document.createElement('img');
    img.src = url; img.alt = '';
    tile.appendChild(img);
  } else {
    tile.style.background = 'var(--bg-2)';
  }
  if(hasCO){
    const co = mk('div','cmp-tile-co');
    co.style.borderWidth = '14px 14px 0 0';
    tile.appendChild(co);
  }
  // Attribution badge — only visible for non-field sources
  const attr = getAttr(roomId, taskId, walkId);
  const badge = attrBadge(attr);
  if(badge) tile.insertAdjacentHTML('beforeend', badge);
  tile.onclick = () => openCmpPhotoOverlay(roomId, taskId, walkId, photoIdx);
  return tile;
}

// ── LAYER BADGE OVERLAY (map-style) on a tile ─────────────────────────────────
function addTileBadges(tile, roomId, taskId){
  const task = ROOMS[roomId]?.taskList.find(t=>t.id===taskId);
  if(!task) return;
  if(LAYERS.changes && task.issue){
    const co = mk('div','cmp-tile-co');
    co.style.borderWidth = '14px 14px 0 0';
    tile.appendChild(co);
  }
  if(LAYERS.modifier && task.modifier){
    const b = mk('div','');
    b.style.cssText = 'position:absolute;top:3px;right:3px;background:rgba(212,160,23,.9);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;line-height:1.4';
    b.textContent = '★';
    tile.appendChild(b);
  }
  if(LAYERS.unassigned && task.assign==='Unassigned'){
    const b = mk('div','');
    b.style.cssText = 'position:absolute;bottom:3px;left:3px;background:rgba(179,77,0,.9);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;line-height:1.4';
    b.textContent = '⛑';
    tile.appendChild(b);
  }
}

// ── HOME COMPARE ──────────────────────────────────────────────────────────────
function renderCmpHome(scroll, walkId){
  Object.entries(ROOMS).forEach(([roomId, room]) => {
    const color = RC[roomId];
    const cos = room.taskList.filter(t=>t.issue).length;

    // Group section header
    const ghdr = mk('div','cmp-group-hdr');
    ghdr.style.borderLeftColor = color;
    ghdr.innerHTML = `<span class="cmp-group-name" style="color:${color}">${room.name}</span><span class="cmp-group-meta">${room.tasks} tasks</span>`;
    if(LAYERS.changes && cos > 0) ghdr.innerHTML += `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#a03030;font-weight:600">${ICON_CO} ${cos}</span>`;
    scroll.appendChild(ghdr);

    // Group-level photos — bigger tiles with room-color border
    const grpRow = mk('div','cmp-photo-row');
    let grpHasPhotos = false;
    room.taskList.forEach(task => {
      const ps = getWalkPhotos(roomId, task.id, walkId);
      ps.forEach((url, idx) => {
        const tile = buildCmpTile(url, 72, roomId, task.id, walkId, idx, false);
        tile.style.borderRadius = 'var(--r)';
        // Colored border to distinguish group photos
        tile.style.outline = `2px solid ${color}`;
        tile.style.outlineOffset = '-2px';
        addTileBadges(tile, roomId, task.id);
        grpRow.appendChild(tile);
        grpHasPhotos = true;
      });
    });
    if(!grpHasPhotos){
      const empty = mk('div','cmp-empty-walk'); empty.textContent = 'No photos this walk';
      grpRow.appendChild(empty);
    }
    scroll.appendChild(grpRow);

    // Task sub-sections
    room.taskList.forEach(task => {
      const ps = getWalkPhotos(roomId, task.id, walkId);
      if(!ps.length) return;
      const thdr = mk('div','cmp-task-hdr');
      const tdot = mk('span','cmp-task-dot'); tdot.style.background = color;
      thdr.appendChild(tdot);
      const tn = mk('span',''); tn.style.cssText='font-size:11px;color:var(--t2)'; tn.textContent = task.name;
      thdr.appendChild(tn);
      scroll.appendChild(thdr);

      const trow = mk('div','cmp-photo-row'); trow.style.paddingLeft='12px';
      ps.forEach((url,idx) => {
        const tile = buildCmpTile(url, 56, roomId, task.id, walkId, idx, task.issue && LAYERS.changes);
        addTileBadges(tile, roomId, task.id);
        trow.appendChild(tile);
      });
      scroll.appendChild(trow);
    });

    const div = mk('div','cmp-section-div');
    scroll.appendChild(div);
  });
}

// ── TASK COMPARE ──────────────────────────────────────────────────────────────
function renderCmpTask(scroll, walkId){
  if(!selTask || !selRoomId) return;
  const task = selTask;
  const room = ROOMS[selRoomId];
  const w = WALKS.find(w=>w.id===walkId);

  // Photo grid
  const ps = getWalkPhotos(selRoomId, task.id, walkId);
  const photoGrid = mk('div','cmp-photo-row');
  photoGrid.style.flexWrap = 'wrap';
  if(ps.length){
    ps.forEach((url,idx) => {
      const tile = buildCmpTile(url, 90, selRoomId, task.id, walkId, idx, false);
      addTileBadges(tile, selRoomId, task.id);
      photoGrid.appendChild(tile);
    });
  } else {
    const e = mk('div',''); e.style.cssText='font-size:12px;color:var(--t3);font-style:italic;padding:16px 0';
    e.textContent = 'No photos captured this walk';
    photoGrid.appendChild(e);
  }
  scroll.appendChild(photoGrid);

  // Key data strip
  const mats = TASK_MATERIALS[task.id]||[];
  const laborItems = mats.filter(m=>m.type==='labor');
  const products = mats.filter(m=>m.type==='material');
  const laborCost = laborItems.reduce((s,l)=>s+l.qty*l.unitPrice,0);
  const matCost = products.reduce((s,p)=>s+p.qty*p.unitPrice,0);
  const statusText = task.issue?'Change order':task.done?'Approved':'In progress';
  const statusColor = task.issue?'var(--red)':task.done?'var(--green)':'var(--t2)';

  const dataDiv = mk('div','cmp-task-data');
  const rows = [
    ['Status', `<span style="color:${statusColor};font-weight:600">${statusText}</span>`],
    ['Walk', w ? w.label : '—'],
    ['Contractor', task.assign],
    ['Cost', `<span style="font-family:var(--mono);color:var(--green)">${fmt(task.cost)}</span>`],
    ['Labor', `<span style="font-family:var(--mono)">${fmt(laborCost)}</span>`],
    ['Materials', `<span style="font-family:var(--mono)">${fmt(matCost)}</span>`],
  ];
  rows.forEach(([lbl,val]) => {
    const cell = mk('div','');
    cell.innerHTML = `<div class="cmp-data-lbl">${lbl}</div><div class="cmp-data-val">${val}</div>`;
    dataDiv.appendChild(cell);
  });
  scroll.appendChild(dataDiv);

  // Notes & issues for this walk context
  if(task.notes){
    const div = mk('div','cmp-section-div'); scroll.appendChild(div);
    const n = mk('div','');
    n.style.cssText = 'background:var(--bg-2);border-left:3px solid var(--purple);border-radius:4px;padding:8px 10px;font-size:12px;color:var(--t1);line-height:1.5';
    n.innerHTML = `<span style="font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--purple);display:block;margin-bottom:3px">Note</span>${task.notes}`;
    scroll.appendChild(n);
  }
  if(task.issue){
    const div = mk('div',''); div.style.cssText='height:6px'; scroll.appendChild(div);
    const c = mk('div','');
    c.style.cssText = 'background:#fef2f2;border-left:3px solid var(--red);border-radius:4px;padding:8px 10px;font-size:12px;color:var(--red);line-height:1.5';
    c.innerHTML = `<span style="font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;display:block;margin-bottom:3px">Change Order</span>${task.issue}`;
    scroll.appendChild(c);
  }
}

// ── TASK 5: DETAIL MODAL ───────────────────────────────────────────────────
// Full-screen modal that opens when a photo cell in the compare view is
// clicked. Shows a hero photo for the clicked walk, a gallery of thumbs for
// every walk, task details (cost, contractor, notes, issue, modifier),
// materials/labor from TASK_MATERIALS, optional qty/unit pulled from
// window.importedScopeData when a matching task id exists there, and a
// stable mock activity feed seeded by task id.

function __tlSeededRand(seed){
  // Mulberry32 — deterministic, small-seed-friendly
  let s = (seed|0) || 1;
  return function(){
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function __tlHashStr(str){
  let h = 0;
  for(let i = 0; i < str.length; i++){ h = (h * 31 + str.charCodeAt(i)) | 0; }
  return h;
}

function __tlLookupImportedTask(taskId){
  try {
    const groups = (window.importedScopeData && window.importedScopeData.groups) || [];
    for(let g = 0; g < groups.length; g++){
      const tasks = groups[g].tasks || [];
      for(let t = 0; t < tasks.length; t++){
        if(String(tasks[t].id) === String(taskId)) return { task: tasks[t], group: groups[g] };
      }
    }
  } catch(e) {}
  return null;
}

const __TL_ACTIVITY_POOL = [
  { who:'Marcus W.',    what:'uploaded 3 photos from the site walk' },
  { who:'Sarah M.',     what:'marked the task ready for inspection' },
  { who:'Diana R.',     what:'left a note: "Confirm final measurements before ordering"' },
  { who:'Brushstroke Co.', what:'updated status to Scheduled' },
  { who:'Apex General', what:'flagged a dependency on the adjacent room' },
  { who:'Kai',          what:'auto-matched this task to a line item in the scope sheet' },
  { who:'Sarah M.',     what:'approved the contractor quote' },
  { who:'Marcus W.',    what:'attached a receipt from Home Depot' },
  { who:'Diana R.',     what:'requested a revised estimate after the walkthrough' },
  { who:'Kai',          what:'noted a photo gap between progress walks' },
];
const __TL_ACTIVITY_TIMES = [
  '2 hours ago', 'Yesterday', '2 days ago', '3 days ago',
  '5 days ago', '1 week ago', '2 weeks ago', 'Mar 14', 'Feb 28', 'Feb 12'
];

function __tlBuildActivity(taskId){
  const seed = __tlHashStr(String(taskId));
  const rand = __tlSeededRand(seed);
  const n = 3 + Math.floor(rand() * 3); // 3–5 items
  const items = [];
  const usedTimeIdxs = new Set();
  for(let i = 0; i < n; i++){
    const pool = __TL_ACTIVITY_POOL[Math.floor(rand() * __TL_ACTIVITY_POOL.length)];
    let ti = Math.floor(rand() * __TL_ACTIVITY_TIMES.length);
    // prefer unique times; fine if rare collisions occur
    let guard = 0;
    while(usedTimeIdxs.has(ti) && guard++ < 5){ ti = (ti + 1) % __TL_ACTIVITY_TIMES.length; }
    usedTimeIdxs.add(ti);
    items.push({ who: pool.who, what: pool.what, when: __TL_ACTIVITY_TIMES[ti] });
  }
  return items;
}

function __tlInitials(name){
  if(!name) return '—';
  return name.split(/\s+/).map(s => s[0]).slice(0,2).join('').toUpperCase();
}

function __tlCurrency(n){
  if(n == null || isNaN(n)) return '—';
  return '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits:2 });
}

// ── modal lifecycle ────────────────────────────────────────────────────────
let __tlModalState = null; // { overlay, slot, walkId, keyHandler }

function openTlModal(slot, walkId){
  // If a modal is already open, reuse its overlay to avoid a flash
  if(__tlModalState){
    __tlModalState.slot = slot;
    __tlModalState.walkId = walkId;
    __tlRenderModalContent(__tlModalState.overlay, slot, walkId);
    return;
  }
  const overlay = document.createElement('div');
  overlay.className = 'tl-modal-overlay';
  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) closeTlModal();
  });
  const keyHandler = (e) => {
    if(e.key === 'Escape') closeTlModal();
    else if(e.key === 'ArrowLeft') __tlNavTask(-1);
    else if(e.key === 'ArrowRight') __tlNavTask(1);
  };
  document.addEventListener('keydown', keyHandler);
  document.body.appendChild(overlay);
  __tlModalState = { overlay, slot, walkId, keyHandler };
  __tlRenderModalContent(overlay, slot, walkId);
}

function closeTlModal(){
  if(!__tlModalState) return;
  document.removeEventListener('keydown', __tlModalState.keyHandler);
  if(__tlModalState.overlay && __tlModalState.overlay.parentNode){
    __tlModalState.overlay.parentNode.removeChild(__tlModalState.overlay);
  }
  __tlModalState = null;
}

function __tlNavTask(dir){
  if(!__tlModalState) return;
  const { slot, walkId } = __tlModalState;
  if(slot.type !== 'task') return;
  const room = ROOMS[slot.roomId];
  if(!room) return;
  const idx = room.taskList.findIndex(t => t.id === slot.taskId);
  const nextIdx = idx + dir;
  if(nextIdx < 0 || nextIdx >= room.taskList.length) return;
  const nextTask = room.taskList[nextIdx];
  const nextSlot = { type:'task', roomId: slot.roomId, roomName: room.name, taskId: nextTask.id, task: nextTask };
  __tlModalState.slot = nextSlot;
  __tlRenderModalContent(__tlModalState.overlay, nextSlot, walkId);
}

function __tlRenderModalContent(overlay, slot, walkId){
  overlay.innerHTML = '';
  const modal = document.createElement('div');
  modal.className = 'tl-modal';

  const task = slot.task;
  const room = ROOMS[slot.roomId];
  const walkObj = WALKS.find(w => w.id === walkId) || WALKS[0];
  const imported = __tlLookupImportedTask(task.id);
  const materials = (typeof TASK_MATERIALS !== 'undefined' && TASK_MATERIALS[task.id]) ? TASK_MATERIALS[task.id] : [];

  // ── Top bar: room pill, task id, prev/next, close ──
  const topbar = document.createElement('div');
  topbar.className = 'tl-modal-topbar';
  const pill = document.createElement('span');
  pill.className = 'tl-modal-room-pill';
  pill.style.background = (RC && RC[slot.roomId]) ? RC[slot.roomId] : 'var(--charcoal)';
  pill.textContent = room ? room.name : slot.roomName;
  topbar.appendChild(pill);
  const tid = document.createElement('span');
  tid.className = 'tl-modal-taskid';
  tid.textContent = '#' + task.id;
  topbar.appendChild(tid);

  const nav = document.createElement('div');
  nav.className = 'tl-modal-nav';
  const taskIdx = room ? room.taskList.findIndex(t => t.id === task.id) : -1;
  const prev = document.createElement('button');
  prev.type = 'button'; prev.textContent = '‹ Prev task';
  prev.disabled = (taskIdx <= 0);
  prev.addEventListener('click', () => __tlNavTask(-1));
  const next = document.createElement('button');
  next.type = 'button'; next.textContent = 'Next task ›';
  next.disabled = (!room || taskIdx < 0 || taskIdx >= room.taskList.length - 1);
  next.addEventListener('click', () => __tlNavTask(1));
  nav.appendChild(prev); nav.appendChild(next);
  topbar.appendChild(nav);

  const close = document.createElement('button');
  close.type = 'button';
  close.className = 'tl-modal-close';
  close.innerHTML = '&times;';
  close.setAttribute('aria-label','Close');
  close.addEventListener('click', closeTlModal);
  topbar.appendChild(close);
  modal.appendChild(topbar);

  // ── Body: media (hero + gallery) | info ──
  const bodyEl = document.createElement('div');
  bodyEl.className = 'tl-modal-body';

  // Media column
  const media = document.createElement('div');
  media.className = 'tl-modal-media';
  const heroWrap = document.createElement('div');
  heroWrap.className = 'tl-modal-hero-wrap';
  const heroUrl = (getWalkPhotos(slot.roomId, slot.taskId, walkId)||[])[0];
  if(heroUrl){
    const img = document.createElement('img');
    img.className = 'tl-modal-hero';
    img.src = heroUrl;
    heroWrap.appendChild(img);
  } else {
    heroWrap.appendChild(mk('div','tl-modal-hero-empty','No photo for this walk'));
  }
  const heroCap = document.createElement('div');
  heroCap.className = 'tl-modal-hero-caption';
  heroCap.innerHTML =
    '<strong>'+task.name+'</strong>' +
    '<span class="walk">'+walkObj.short+' · '+walkObj.date+'</span>';
  heroWrap.appendChild(heroCap);
  media.appendChild(heroWrap);

  // Gallery thumbs across every walk
  const gallery = document.createElement('div');
  gallery.className = 'tl-modal-gallery';
  WALKS.forEach(w => {
    const thumb = document.createElement('button');
    thumb.type = 'button';
    thumb.className = 'tl-modal-thumb' + (w.id === walkId ? ' active' : '');
    const urls = getWalkPhotos(slot.roomId, slot.taskId, w.id) || [];
    if(urls[0]){
      const im = document.createElement('img');
      im.src = urls[0]; im.loading = 'lazy';
      thumb.appendChild(im);
    } else {
      thumb.appendChild(mk('div','thumb-empty','no photo'));
    }
    thumb.appendChild(mk('div','thumb-walk', w.short));
    thumb.addEventListener('click', () => {
      if(!__tlModalState) return;
      __tlModalState.walkId = w.id;
      __tlRenderModalContent(__tlModalState.overlay, __tlModalState.slot, w.id);
    });
    gallery.appendChild(thumb);
  });
  media.appendChild(gallery);
  bodyEl.appendChild(media);

  // Info column
  const info = document.createElement('div');
  info.className = 'tl-modal-info';

  const head = document.createElement('div');
  head.className = 'tl-modal-head';
  const h2 = document.createElement('h2');
  h2.textContent = task.name;
  head.appendChild(h2);
  const sub = document.createElement('div');
  sub.className = 'sub';
  const roomLabel = room ? room.name : slot.roomName;
  const totalMaterialsAmount = materials.reduce((s,m)=> s + (Number(m.qty||0) * Number(m.unitPrice||0)), 0);
  const rollupBudget = task.cost || totalMaterialsAmount || 0;
  sub.textContent = roomLabel + ' · ' + (room ? ('Task '+(taskIdx+1)+' of '+room.taskList.length) : '');
  head.appendChild(sub);

  const badges = document.createElement('div');
  badges.className = 'tl-modal-badges';
  if(task.done) badges.appendChild(mk('span','tl-modal-badge done','Completed'));
  else badges.appendChild(mk('span','tl-modal-badge','In progress'));
  if(task.issue) badges.appendChild(mk('span','tl-modal-badge issue','Rework'));
  if(task.modifier) badges.appendChild(mk('span','tl-modal-badge modifier', task.modifier));
  if(imported && imported.task.status && imported.task.status !== 'Not Started'){
    badges.appendChild(mk('span','tl-modal-badge', imported.task.status));
  }
  head.appendChild(badges);
  info.appendChild(head);

  // Details grid
  const grid = document.createElement('div');
  grid.className = 'tl-modal-grid';
  function addCell(lbl, val, mono){
    const c = mk('div','cell');
    c.appendChild(mk('div','lbl', lbl));
    c.appendChild(mk('div','val'+(mono?' mono':''), (val == null || val === '') ? '—' : String(val)));
    grid.appendChild(c);
  }
  addCell('Budget', __tlCurrency(rollupBudget), true);
  addCell('Contractor', task.assign || (imported && imported.task.contractor) || '—');
  if(imported){
    addCell('Quantity', (imported.task.qty != null ? imported.task.qty : '—') + ' ' + (imported.task.unit || ''), true);
    addCell('Scope group', imported.group.name);
  } else {
    addCell('Materials total', __tlCurrency(totalMaterialsAmount), true);
    addCell('Scope group', '—');
  }
  info.appendChild(grid);

  // Notes / issue
  if(task.issue){
    const iss = mk('div','tl-modal-notes issue');
    iss.innerHTML = '<strong>Issue · </strong>' + task.issue;
    info.appendChild(iss);
  }
  if(task.notes){
    const notesSec = document.createElement('section');
    notesSec.appendChild(mk('h3','','Notes'));
    const notes = mk('div','tl-modal-notes', task.notes);
    notesSec.appendChild(notes);
    info.appendChild(notesSec);
  }

  // Materials & labor
  const matSec = document.createElement('section');
  matSec.appendChild(mk('h3','','Materials & labor'));
  if(materials.length === 0){
    matSec.appendChild(mk('div','tl-modal-empty-section','No materials or labor items tracked for this task yet.'));
  } else {
    const wrap = mk('div','tl-modal-materials');
    const hdr = mk('div','row header');
    hdr.innerHTML = '<div>Item</div><div>Qty</div><div>Total</div><div>Status</div>';
    wrap.appendChild(hdr);
    materials.forEach(m => {
      const row = mk('div','row'+(m.type==='labor'?' labor':''));
      const total = Number(m.qty||0) * Number(m.unitPrice||0);
      const nameCell = mk('div','name');
      nameCell.innerHTML = (m.name || '—') + (m.vendor ? '<span class="vendor">'+m.vendor+'</span>' : '');
      row.appendChild(nameCell);
      row.appendChild(mk('div','qty', (m.qty != null ? m.qty : '—') + ' ' + (m.unit || '')));
      row.appendChild(mk('div','price total', __tlCurrency(total)));
      const stPill = mk('div','status', m.status || '—');
      stPill.setAttribute('data-s', m.status || '');
      row.appendChild(stPill);
      wrap.appendChild(row);
    });
    matSec.appendChild(wrap);
  }
  info.appendChild(matSec);

  // Activity feed
  const actSec = document.createElement('section');
  actSec.appendChild(mk('h3','','Activity'));
  const actList = mk('div','tl-modal-activity');
  const activity = __tlBuildActivity(task.id);
  activity.forEach(a => {
    const item = mk('div','item');
    const av = mk('div','avatar', __tlInitials(a.who));
    // Color the avatar with a stable hue from the name
    const hue = Math.abs(__tlHashStr(a.who)) % 360;
    av.style.background = 'hsl(' + hue + ', 42%, 38%)';
    item.appendChild(av);
    const ib = mk('div','item-body');
    ib.innerHTML = '<span class="who">'+a.who+'</span> <span class="what">'+a.what+'</span>' +
                   '<span class="when">'+a.when+'</span>';
    item.appendChild(ib);
    actList.appendChild(item);
  });
  actSec.appendChild(actList);
  info.appendChild(actSec);

  bodyEl.appendChild(info);
  modal.appendChild(bodyEl);
  overlay.appendChild(modal);
}

// ── MAIN COMPARE RENDERER ─────────────────────────────────────────────────────
// ── TIMELINES COMPARE (replaces legacy dual-pane cmp view) ─────────────────
// Delegates to window.__tlRenderCompare when defined. Otherwise renders the
// Task 3 timeline:
//   - Column headers (Prev / Current / Next)
//   - Two bands (A / B), each with walk-radio aside + 3 photo cells
//   - Timeline row between bands: two tracks (one per band), each a row of
//     colored zones (one per room) with a group-overview dot (square) + one
//     task-dot (circle) per task. A single shared scrubber spans both tracks.
//   - Scrubber is draggable. Clicking a dot also moves the scrubber.
//   - Hover on a dot shows a photo preview popover (walk-specific per band).
function renderCompare(){
  const body = document.getElementById('rp-body');
  body.innerHTML = '';
  body.style.display = '';
  body.style.flexDirection = '';
  body.style.overflow = '';
  body.style.flex = '';

  // Clean up any stale popovers (they attach to document.body)
  document.querySelectorAll('.tl-popover').forEach(p => p.remove());

  if(typeof window.__tlRenderCompare === 'function'){
    window.__tlRenderCompare(body, selRoomId);
    return;
  }

  // ── Task 4: floorplan filter ──
  // If the user has selected a single room on the floorplan while compare
  // mode is active, reduce the timeline to just that room's zone. 'unassigned'
  // and unknown ids are ignored so the compare view stays usable.
  const filterRoomId = (selRoomId && selRoomId !== 'unassigned' && ROOMS[selRoomId]) ? selRoomId : null;

  // ── Build flat slot list ──
  // Default mode: bucket by room — [group, ...tasks] for each room.
  // Contractors mode: bucket by contractor — each bucket becomes a "group"
  // slot (acting like a section header) followed by that contractor's tasks.
  // Unassigned bucket sorts to the top so tasks that still need a contractor
  // are the first thing the user sees; every other contractor follows
  // alphabetically beneath it.
  const byContractor = (typeof bpView !== 'undefined' && bpView === 'contractors');
  const slots = [];
  if(byContractor){
    // Build contractor buckets from every task across every room. The
    // floorplan's per-room filter doesn't apply in contractor mode — the
    // sidebar's active-contractor filter does the equivalent job here.
    const bucketMap = new Map();
    Object.keys(ROOMS).forEach(rid => {
      const room = ROOMS[rid];
      (room.taskList || []).forEach(t => {
        const key = (t.assign && t.assign !== 'Unassigned') ? t.assign : '__unassigned__';
        if(!bucketMap.has(key)){
          bucketMap.set(key, {
            key,
            name: (key === '__unassigned__') ? 'Unassigned' : key,
            isUnassigned: (key === '__unassigned__'),
            tasks: [],
          });
        }
        bucketMap.get(key).tasks.push({ roomId:rid, roomName:room.name, task:t });
      });
    });
    const buckets = [...bucketMap.values()].sort((a,b) => {
      if(a.isUnassigned !== b.isUnassigned) return a.isUnassigned ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    buckets.forEach(b => {
      if(!b.tasks.length) return;
      const first = b.tasks[0];
      slots.push({
        type:'group',
        isContractor:true,
        contractor:b.name,
        roomId:first.roomId,             // used by hlRoom + photo fallback
        roomName:b.name,                  // displayed as the section title
        firstTaskId:first.task.id,        // routes photo lookup to a real task
        bucketTasks:b.tasks,              // routes badge aggregation
      });
      b.tasks.forEach(({roomId, roomName, task}) => {
        slots.push({ type:'task', roomId, roomName, taskId:task.id, task });
      });
    });
  } else {
    const roomIds = filterRoomId ? [filterRoomId] : Object.keys(ROOMS);
    roomIds.forEach(rid => {
      const room = ROOMS[rid];
      slots.push({ type:'group', roomId:rid, roomName:room.name, noGroupPhoto: !!room.noGroupPhoto });
      room.taskList.forEach(t => {
        slots.push({ type:'task', roomId:rid, roomName:room.name, taskId:t.id, task:t });
        // Expand any task-defined extra slots into additional columns directly
        // after the main task slot. Each extra slot reuses the same task data
        // (name, badges, etc.) but supplies its own per-walk photo overrides
        // via the `photoOverride` field consumed by getPhotoForSlot below.
        if(Array.isArray(t.extraSlots)){
          t.extraSlots.forEach((ex, exIdx) => {
            slots.push({
              type:'task',
              roomId:rid,
              roomName:room.name,
              taskId:t.id,
              task:t,
              isExtra:true,
              extraIdx:exIdx,
              extraLabel:ex.label || ('Photo '+(exIdx+2)),
              photoOverride:ex.photos || {},
            });
          });
        }
      });
    });
  }
  const taskSlotIdxs = slots.map((s,i)=>s.type==='task'?i:-1).filter(i=>i>=0);

  // ── State ──
  // Persisted across re-renders via window.__cmpState so that toggling layer
  // icons (Status, Change order, etc.) — which calls render() — doesn't reset
  // the user's scrubber position, walk picks, or whether Band B is open. The
  // closure-local `state` is rebuilt each render, but seeded from the
  // persistent store. Mutations write through to both.
  const _defaultIdx   = taskSlotIdxs[0] != null ? taskSlotIdxs[0] : 0;
  const _defaultWalkA = (WALKS[0]||{}).id;
  const _defaultWalkB = ((WALKS.find(w => w.id === 'close_out')) || WALKS[WALKS.length-1] || {}).id;
  const _persisted    = (window.__cmpState = window.__cmpState || {});
  const state = {
    currentIdx: (typeof _persisted.currentIdx === 'number' && _persisted.currentIdx >= 0 && _persisted.currentIdx < slots.length)
      ? _persisted.currentIdx : _defaultIdx,
    walkA: WALKS.some(w => w.id === _persisted.walkA) ? _persisted.walkA : _defaultWalkA,
    walkB: WALKS.some(w => w.id === _persisted.walkB) ? _persisted.walkB : _defaultWalkB,
  };
  // Mirror back so the validated values become the new persisted values.
  _persisted.currentIdx = state.currentIdx;
  _persisted.walkA      = state.walkA;
  _persisted.walkB      = state.walkB;
  // Compare file defaults to showing both dates (Initial walk + Final walk)
  // — the user can still close Band B via the X to drop back to one date.
  if(typeof _persisted.bandBVisible !== 'boolean') _persisted.bandBVisible = true;

  // ── Scope sidebar sync helper ──
  // Translates the current scrubber position to a (roomId, taskId?) pair and
  // pings __syncScopeHighlight so the matching .gf-card / .gf-task in the
  // Scope sidebar lights up + scrolls into view. No-op when the sidebar is
  // showing a different tab (Floor plan / Trade-Contractor).
  function __syncScopeFromSlot(){
    if(typeof __syncScopeHighlight !== 'function') return;
    const s = slots[state.currentIdx];
    if(!s){ __syncScopeHighlight(null); return; }
    if(s.type === 'task') __syncScopeHighlight(s.roomId, s.taskId);
    else                  __syncScopeHighlight(s.roomId, null);
  }

  // ── Shell ──
  // Band B's visibility persists across re-renders too — only collapse to
  // single-date view if the user hasn't explicitly opened Band B yet (or has
  // since closed it via the X button).
  const root = mk('div','tl-root' + (_persisted.bandBVisible ? '' : ' tl-b-hidden'));

  // Header row (Walk dates | Prev | Current | Next). Columns show the
  // group/task name at each position plus < / > arrows that advance through
  // the slot list (groups + tasks, in order). Labels re-render on each
  // navigation via renderHead().
  const head = mk('div','tl-head');
  const headLabelCell = mk('div','tl-head-label','Walk dates');
  const prevCell = mk('div','tl-col-head');
  const curCell  = mk('div','tl-col-head current');
  const nextCell = mk('div','tl-col-head');
  prevCell.dataset.col = 'prev';
  curCell.dataset.col  = 'current';
  nextCell.dataset.col = 'next';
  head.appendChild(headLabelCell);
  head.appendChild(prevCell);
  head.appendChild(curCell);
  head.appendChild(nextCell);
  root.appendChild(head);

  // Label helper — "Group name" for a group slot, "Task · Group" for a task.
  // Contractor groups use a slightly different meta label so the header is
  // unambiguous in Contractors mode.
  function slotLabel(slot){
    if(!slot) return { title:'', meta:'' };
    if(slot.type === 'group'){
      return {
        title: slot.roomName,
        meta: slot.isContractor ? 'Contractor overview' : 'Group overview',
      };
    }
    if(slot.isExtra){
      // Extra slots inherit the parent task's name but append the extra label
      // (e.g. "2nd photo") so the user can tell them apart at a glance.
      return { title:slot.task.name, meta:slot.roomName + ' · ' + (slot.extraLabel || 'Extra photo') };
    }
    return { title:slot.task.name, meta:slot.roomName };
  }

  function renderHead(){
    const prev = slots[state.currentIdx - 1];
    const cur  = slots[state.currentIdx];
    const next = slots[state.currentIdx + 1];

    function fill(cell, slot, badge, arrowPos){
      cell.innerHTML = '';
      if(arrowPos === 'left'){
        const btn = mk('button','tl-col-nav');
        btn.type = 'button';
        btn.title = 'Previous';
        btn.setAttribute('aria-label','Previous');
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2L3.5 6l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        btn.disabled = state.currentIdx <= 0;
        btn.addEventListener('click', ev => { ev.stopPropagation(); navigate(-1); });
        cell.appendChild(btn);
      }
      if(badge) cell.appendChild(mk('span','tl-col-badge', badge));
      const lab = slotLabel(slot);
      const box = mk('div','tl-col-label');
      if(lab.title){
        box.appendChild(mk('span','tl-col-title', lab.title));
        if(lab.meta) box.appendChild(mk('span','tl-col-meta', lab.meta));
      } else {
        box.appendChild(mk('span','tl-col-empty','—'));
      }
      cell.appendChild(box);
      if(arrowPos === 'right'){
        const btn = mk('button','tl-col-nav');
        btn.type = 'button';
        btn.title = 'Next';
        btn.setAttribute('aria-label','Next');
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        btn.disabled = state.currentIdx >= slots.length - 1;
        btn.addEventListener('click', ev => { ev.stopPropagation(); navigate(1); });
        cell.appendChild(btn);
      }
    }
    // Prev and Next cells show only the arrow + slot label (no text badge).
    // Current still shows its "Current" pill so the active column is obvious.
    fill(prevCell, prev, '',        'left');
    fill(curCell,  cur,  'Current', null);
    fill(nextCell, next, '',        'right');
  }

  // Advance / retreat by one slot, clamped. Group slots are valid stops too
  // (group → its tasks → next group's slot list).
  function navigate(delta){
    const n = state.currentIdx + delta;
    if(n < 0 || n >= slots.length) return;
    state.currentIdx = n;
    _persisted.currentIdx = n;
    renderHead();
    updatePhotos();
    if(typeof renderSlider === 'function') renderSlider();
    __syncScopeFromSlot();
  }

  // Filter info strip — shown when timeline is reduced to a single room
  if(filterRoomId){
    const fRoom = ROOMS[filterRoomId];
    const nTasks = fRoom.taskList.length;
    const strip = mk('div','tl-filter-strip');
    const dot = mk('span','tl-filter-dot');
    dot.style.background = RC[filterRoomId] || 'var(--charcoal)';
    strip.appendChild(dot);
    const txt = mk('span','tl-filter-text',
      'Filtered to: <strong>'+fRoom.name+'</strong>'+
      '<span class="tl-filter-meta">· '+nTasks+' task'+(nTasks===1?'':'s')+'</span>'
    );
    strip.appendChild(txt);
    const clear = mk('button','tl-filter-clear','Show all');
    clear.type = 'button';
    clear.addEventListener('click', () => {
      // Don't route through selRoom(null) — that branch can touch ROOMS[null].
      // Clear the selection directly and re-render in-place.
      selRoomId = null;
      selTask = null;
      hlRoom(null);
      render();
    });
    strip.appendChild(clear);
    root.appendChild(strip);
  }

  const bodyEl = mk('div','tl-body');

  // Band builder: radio aside + 3 photo cells
  function buildBand(bandKey){
    const band = mk('div','tl-band');
    band.dataset.band = bandKey;
    // Start collapsed — only the selected walk is shown until the user opens
    // the picker to change it.
    const walks = mk('aside','tl-walks is-collapsed');
    walks.appendChild(mk('div','tl-walks-title','Select date'));
    // Remove-band X — only on the second band. Hides it so the user is back
    // to viewing a single walk; clicking "+ Add date" brings it back.
    if(bandKey === 'B'){
      const rm = mk('button','tl-walks-remove');
      rm.type = 'button';
      rm.title = 'Remove';
      rm.setAttribute('aria-label', 'Remove date row');
      rm.innerHTML = '<svg width="12" height="12" viewBox="0 0 10 10" fill="none" style="display:block"><line x1="2" y1="2" x2="8" y2="8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="8" y1="2" x2="2" y2="8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>';
      rm.onclick = function(ev){
        if(ev){ ev.preventDefault(); ev.stopPropagation(); }
        // Reset Band B's selection back to Final walk so the next "Add date"
        // click always re-opens with the canonical second-date default.
        state.walkB = ((WALKS.find(w => w.id === 'close_out')) || WALKS[WALKS.length-1] || {}).id;
        _persisted.walkB = state.walkB;
        _persisted.bandBVisible = false;
        root.classList.add('tl-b-hidden');
      };
      walks.appendChild(rm);
    }
    // Explicit chevron button that expands the picker when collapsed. Using a
    // real <button> (instead of a hidden div-click) keeps the expand reliable
    // regardless of label/radio behaviour inside the aside.
    const chev = mk('button','tl-walks-chev');
    chev.type = 'button';
    chev.title = 'Change date';
    chev.setAttribute('aria-label', 'Change date');
    chev.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="display:block"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    chev.onclick = function(ev){
      if(ev){ ev.preventDefault(); ev.stopPropagation(); }
      walks.classList.remove('is-collapsed');
    };
    walks.appendChild(chev);
    const opts = [];
    WALKS.forEach(w => {
      const opt = mk('label','tl-walk-opt');
      const checkedWalk = (bandKey==='A') ? state.walkA : state.walkB;
      if(w.id === checkedWalk) opt.classList.add('is-selected');
      opt.innerHTML =
        '<input type="radio" name="tl-walk-'+bandKey+'" value="'+w.id+'"'+
        (w.id===checkedWalk?' checked':'')+'>'+
        '<span class="tl-walk-name">'+w.short+'</span>'+
        '<span class="tl-walk-date">'+w.date+'</span>';
      opt.querySelector('input').addEventListener('change', e => {
        if(!e.target.checked) return;
        if(bandKey==='A'){ state.walkA = w.id; _persisted.walkA = w.id; }
        else             { state.walkB = w.id; _persisted.walkB = w.id; }
        updatePhotos();
        // Track the selected one via a class so the collapsed CSS can show
        // just that option (more reliable than :has(input:checked) for
        // subsequent label clicks).
        opts.forEach(o => o.classList.remove('is-selected'));
        opt.classList.add('is-selected');
        // Auto-collapse once a selection is made.
        walks.classList.add('is-collapsed');
      });
      // Clicking the currently-selected option while collapsed should also
      // expand — even though the radio's state doesn't change.
      opt.addEventListener('click', function(ev){
        if(walks.classList.contains('is-collapsed')){
          ev.preventDefault();
          walks.classList.remove('is-collapsed');
        }
      });
      walks.appendChild(opt);
      opts.push(opt);
    });
    band.appendChild(walks);
    ['prev','current','next'].forEach(col => {
      const cell = mk('div','tl-cell'+(col==='current'?' current':''));
      cell.dataset.band = bandKey;
      cell.dataset.col = col;
      band.appendChild(cell);
    });
    return band;
  }

  bodyEl.appendChild(buildBand('A'));
  bodyEl.appendChild(buildBand('B'));

  // "+ Add date" placeholder — visible only when Band B has been removed.
  // Sits where Band B would live so the vertical rhythm stays consistent.
  const addBandBtn = mk('button','tl-add-band');
  addBandBtn.type = 'button';
  addBandBtn.innerHTML = '<span style="font-size:14px;line-height:1">+</span> Add date';
  addBandBtn.addEventListener('click', (ev) => {
    if(ev){ ev.preventDefault(); ev.stopPropagation(); }
    // Always re-open Band B preset to Final walk, regardless of whatever the
    // user may have last picked before removing the band.
    const finalId = ((WALKS.find(w => w.id === 'close_out')) || WALKS[WALKS.length-1] || {}).id;
    state.walkB = finalId;
    _persisted.walkB = finalId;
    _persisted.bandBVisible = true;
    // Refresh Band B's radio + collapsed-picker visual state to match.
    const bandB = root.querySelector('.tl-band[data-band="B"]');
    if(bandB){
      const walksB = bandB.querySelector('.tl-walks');
      if(walksB){
        walksB.classList.add('is-collapsed');
        walksB.querySelectorAll('.tl-walk-opt').forEach(opt => {
          const input = opt.querySelector('input[type="radio"]');
          const isSel = input && input.value === finalId;
          opt.classList.toggle('is-selected', !!isSel);
          if(input) input.checked = !!isSel;
        });
      }
    }
    root.classList.remove('tl-b-hidden');
    // Repaint Band B's photo cells in case state changed.
    if(typeof updatePhotos === 'function') updatePhotos();
  });
  bodyEl.appendChild(addBandBtn);

  root.appendChild(bodyEl);

  // ── Bottom slider — scrubs through the full slot list (groups + tasks).
  // Ticks mark where each group begins so the user can see the section
  // boundaries at a glance. The slider is kept in sync with the arrow
  // buttons and keyboard nav via renderSlider().
  const sliderWrap = mk('div','tl-nav-slider');
  const sliderHdr = mk('div','tl-nav-slider-hdr');
  sliderHdr.appendChild(mk('span','tl-nav-slider-title','Scrub through groups and tasks'));
  const sliderLabel = mk('span','tl-nav-current-label','');
  sliderHdr.appendChild(sliderLabel);
  sliderWrap.appendChild(sliderHdr);

  const rangeWrap = mk('div','tl-nav-range-wrap');
  rangeWrap.setAttribute('role','slider');
  rangeWrap.setAttribute('tabindex','0');
  rangeWrap.setAttribute('aria-label','Navigate through groups and tasks');
  rangeWrap.setAttribute('aria-valuemin','0');
  rangeWrap.setAttribute('aria-valuemax', String(Math.max(0, slots.length - 1)));
  rangeWrap.setAttribute('aria-valuenow', String(state.currentIdx));
  const track = mk('div','tl-nav-track');
  const trackFill = mk('div','tl-nav-track-fill');
  const thumb = mk('div','tl-nav-thumb');
  track.appendChild(trackFill);
  track.appendChild(thumb);
  rangeWrap.appendChild(track);
  // Back-compat shim for legacy code that reads/writes `range.value` or
  // `range.getBoundingClientRect()`. The shim delegates those to the track
  // div and the shared state so older callers keep working without change.
  const range = {
    get value(){ return String(state.currentIdx); },
    set value(v){
      const n = parseInt(v, 10);
      if(!isNaN(n)){
        state.currentIdx = Math.max(0, Math.min(slots.length - 1, n));
        _persisted.currentIdx = state.currentIdx;
        rangeWrap.setAttribute('aria-valuenow', String(state.currentIdx));
        __syncScopeFromSlot();
      }
    },
    getBoundingClientRect(){ return track.getBoundingClientRect(); },
    style:{ setProperty(name, val){ track.style.setProperty(name, val); } },
    focus(){ try { rangeWrap.focus({ preventScroll:true }); } catch(e){ try{ rangeWrap.focus(); }catch(_){} } },
    addEventListener(){ /* no-op: native 'input' events no longer exist */ },
  };
  // v5: floating label that tracks the thumb while the user is scrubbing.
  const floatLbl = mk('div','tl-nav-float-label','');
  rangeWrap.appendChild(floatLbl);
  sliderWrap.appendChild(rangeWrap);

  const ticks = mk('div','tl-nav-ticks');
  const denom = Math.max(1, slots.length - 1);
  slots.forEach((s, i) => {
    if(s.type !== 'group') return;
    const pct = (i / denom) * 100;
    const tick = mk('div','tl-nav-tick');
    tick.dataset.slotIdx = i;
    tick.style.left = pct + '%';
    tick.title = s.roomName;
    ticks.appendChild(tick);
  });
  sliderWrap.appendChild(ticks);

  // Group-stretch labels row — one label per group, sized to span the group's
  // portion of the slider (its own slot + all its tasks). Truncates with
  // ellipsis if the stretch isn't wide enough for the full name.
  const groupLabels = mk('div','tl-nav-groups');
  const groupSlotIdxs = slots.map((s,i) => s.type==='group' ? i : -1).filter(i => i >= 0);
  groupSlotIdxs.forEach((gi, gArrIdx) => {
    const nextGi = (gArrIdx + 1 < groupSlotIdxs.length) ? groupSlotIdxs[gArrIdx + 1] : slots.length;
    const leftPct = (gi / denom) * 100;
    // Last group extends to 100% so its last task is covered by its label.
    const rightPct = (gArrIdx + 1 < groupSlotIdxs.length)
      ? (nextGi / denom) * 100
      : 100;
    const widthPct = Math.max(0, rightPct - leftPct);
    // Number of task slots owned by this group stretch (excludes the group
    // slot itself). Shown in parentheses so each label reads like
    // "Bathroom (4 tasks)".
    const taskCount = Math.max(0, nextGi - gi - 1);
    const countStr = taskCount + (taskCount === 1 ? ' task' : ' tasks');
    const labelText = slots[gi].roomName + ' (' + countStr + ')';
    const lbl = mk('div','tl-nav-group-label', labelText);
    lbl.dataset.slotIdx = gi;
    lbl.dataset.slotEnd = String(nextGi - 1); // last slot idx owned by this group
    lbl.style.left  = leftPct  + '%';
    lbl.style.width = widthPct + '%';
    lbl.title = labelText;
    groupLabels.appendChild(lbl);
  });
  sliderWrap.appendChild(groupLabels);

  function renderSlider(){
    range.value = String(state.currentIdx);
    const pct = (state.currentIdx / denom) * 100;
    range.style.setProperty('--tl-nav-fill', pct + '%');
    const cur = slots[state.currentIdx];
    if(cur){
      const lab = cur.type === 'group'
        ? cur.roomName + (cur.isContractor ? ' (contractor)' : ' (group)')
        : cur.task.name + ' · ' + cur.roomName;
      const labHtml =
        lab.replace(/</g,'&lt;') +
        '<span class="tl-nav-idx">'+ (state.currentIdx+1) +' / '+ slots.length +'</span>';
      sliderLabel.innerHTML = labHtml;
      // Mirror the same text into the floating tooltip and park it above the
      // thumb. The thumb's center aligns with pct% of the track; the label's
      // own `translateX(-50%)` centers it over that point.
      floatLbl.innerHTML =
        lab.replace(/</g,'&lt;') +
        '<span class="tl-nav-float-idx">'+ (state.currentIdx+1) +' / '+ slots.length +'</span>';
      floatLbl.style.left = pct + '%';
    } else {
      sliderLabel.textContent = '';
      floatLbl.textContent = '';
    }
    // Highlight the active group tick + group label (the tick/label at/before
    // the current slot — i.e. the group that owns the current scrub position).
    ticks.querySelectorAll('.tl-nav-tick.is-current').forEach(t => t.classList.remove('is-current'));
    groupLabels.querySelectorAll('.tl-nav-group-label.is-current').forEach(l => l.classList.remove('is-current'));
    let activeGroupIdx = -1;
    for(let i = state.currentIdx; i >= 0; i--){
      if(slots[i] && slots[i].type === 'group'){ activeGroupIdx = i; break; }
    }
    if(activeGroupIdx >= 0){
      const t = ticks.querySelector('.tl-nav-tick[data-slot-idx="'+activeGroupIdx+'"]');
      if(t) t.classList.add('is-current');
      const l = groupLabels.querySelector('.tl-nav-group-label[data-slot-idx="'+activeGroupIdx+'"]');
      if(l) l.classList.add('is-current');
    }

    // Echo the active group onto the floor plan on the left. hlRoom() mutates
    // the .room SVG elements so the highlight persists across sidebar tab
    // switches and is visible the moment the floorplan tab is active. We
    // intentionally don't touch selRoomId — scrubbing is a preview, not a
    // selection change.
    try {
      const activeRoomId = (slots[activeGroupIdx] && slots[activeGroupIdx].roomId) || null;
      if(typeof hlRoom === 'function') hlRoom(activeRoomId);
    } catch(e){}

    // Alternate the body background between the current group and its
    // neighbors. The parity is derived from the active group's index inside
    // the groupSlotIdxs array so adjacent groups always get different tints.
    try {
      const gArrIdx = groupSlotIdxs.indexOf(activeGroupIdx);
      bodyEl.dataset.groupParity = (gArrIdx >= 0) ? String(gArrIdx % 2) : '0';
    } catch(e){}
  }

  range.addEventListener('input', () => {
    // While our custom pointer drag owns the scrub, ignore any native
    // <input type="range"> 'input' events. The native track-click handler
    // would otherwise fire with a step-by-1 value and override the position
    // we just set, which users see as the thumb "snapping back" on release.
    // Keyboard arrow-key input still works because __scrubDragging is false
    // when the range has keyboard focus but no active pointer drag.
    if(typeof __scrubDragging !== 'undefined' && __scrubDragging) return;
    const v = parseInt(range.value, 10);
    if(isNaN(v) || v === state.currentIdx) return;
    state.currentIdx = v;
    _persisted.currentIdx = v;
    renderHead();
    updatePhotos();
    renderSlider();
    __syncScopeFromSlot();
  });

  // v5++: pointer scrubbing is owned by rangeWrap, not the <input> itself.
  // Putting `pointer-events: none` on the range kills the browser's built-in
  // track-click step and thumb-drag, so nothing can race with our state
  // updates. rangeWrap catches all pointer events, we compute the slot
  // index from the wrapper's bounding rect, and pointer capture keeps the
  // drag alive even if the cursor leaves the slider area. Keyboard nav
  // still works: on pointerdown we focus the range, and the 'input'
  // listener above continues to handle arrow-key value changes.
  function __idxFromClientX(clientX){
    const rect = range.getBoundingClientRect();
    if(rect.width <= 0) return state.currentIdx;
    const frac = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(frac * Math.max(0, slots.length - 1));
  }
  function __applyIdx(v){
    v = Math.max(0, Math.min(slots.length - 1, v));
    if(v === state.currentIdx) return;
    state.currentIdx = v;
    _persisted.currentIdx = v;
    range.value = String(v);
    renderHead();
    updatePhotos();
    renderSlider();
    __syncScopeFromSlot();
  }
  let __scrubDragging = false;
  function __startScrub(ev){
    if(ev.button != null && ev.button !== 0) return; // left button / touch only
    ev.preventDefault();
    __scrubDragging = true;
    try { rangeWrap.setPointerCapture(ev.pointerId); } catch(e){}
    sliderWrap.classList.add('is-scrubbing');
    __applyIdx(__idxFromClientX(ev.clientX));
    // Keep keyboard accessibility: give the range focus so arrow keys scrub.
    try { range.focus({ preventScroll: true }); } catch(e){ try { range.focus(); } catch(_){} }
  }
  function __moveScrub(ev){
    if(!__scrubDragging) return;
    ev.preventDefault();
    __applyIdx(__idxFromClientX(ev.clientX));
  }
  function __endScrub(){
    if(!__scrubDragging) return;
    __scrubDragging = false;
    sliderWrap.classList.remove('is-scrubbing');
  }
  rangeWrap.addEventListener('pointerdown',  __startScrub);
  rangeWrap.addEventListener('pointermove',  __moveScrub);
  rangeWrap.addEventListener('pointerup',    __endScrub);
  rangeWrap.addEventListener('pointercancel',__endScrub);
  rangeWrap.addEventListener('lostpointercapture', __endScrub);
  window.addEventListener('pointerup',       __endScrub);

  root.appendChild(sliderWrap);

  body.appendChild(root);

  // ── Interactivity ──

  function getPhotoForSlot(slot, walkId){
    if(!slot) return '';
    if(slot.type==='task'){
      // Extra slots carry their own per-walk photo overrides — pick from those
      // first so a single task can show multiple photos side by side. If the
      // override doesn't list this walk, fall through to empty (the cell shows
      // the dashed "no photo" empty state).
      if(slot.isExtra && slot.photoOverride){
        const arr = slot.photoOverride[walkId];
        return (Array.isArray(arr) && arr[0]) || '';
      }
      const photos = getWalkPhotos(slot.roomId, slot.taskId, walkId);
      return photos[0] || '';
    }
    // group — first try GROUP_PHOTOS (the dedicated group-level photo set
    // for this room/walk). If the room actually has a real group photo for
    // this walk, show it. Only when GROUP_PHOTOS has nothing for this walk
    // do we either (a) skip entirely (rooms flagged noGroupPhoto, so the
    // cell renders a meaningful "No group photo" message) or (b) fall back
    // to the room's first task's photo.
    const _gpKeyMap = { initial_scope:'initial', progress_1:'p1', change_order:null, progress_2:'p2', close_out:'final' };
    const _gpKey = _gpKeyMap[walkId];
    const _gpData = (typeof GROUP_PHOTOS !== 'undefined' && GROUP_PHOTOS[slot.roomId]) || null;
    if(_gpKey && _gpData && Array.isArray(_gpData[_gpKey]) && _gpData[_gpKey].length){
      return _gpData[_gpKey][0];
    }
    if(slot.noGroupPhoto) return '';
    if(slot.firstTaskId){
      const photos = getWalkPhotos(slot.roomId, slot.firstTaskId, walkId);
      return photos[0] || '';
    }
    const firstTask = ROOMS[slot.roomId].taskList[0];
    if(!firstTask) return '';
    const photos = getWalkPhotos(slot.roomId, firstTask.id, walkId);
    return photos[0] || '';
  }

  // v5: build the stack of overlay badges (Change order / Note / Unassigned)
  // for a given slot. Each badge is gated by its matching LAYERS toggle, so
  // clicking the icon in the top bar truly shows/hides the info on the photo.
  // For group slots, the badge shows whenever ANY task in the group matches
  // (so the overview photo still communicates that the group has work flagged).
  function buildCellBadges(slot, walkId){
    const host = mk('div','tl-cell-badges');
    const L = (typeof LAYERS === 'object' && LAYERS) ? LAYERS : {};
    let hasIssue = false, hasNote = false, hasUnassigned = false;
    if(slot.type === 'task' && slot.task){
      hasIssue      = !!slot.task.issue;
      hasNote       = !!slot.task.notes;
      hasUnassigned = (slot.task.assign === 'Unassigned');
    } else if(slot.bucketTasks && slot.bucketTasks.length){
      // Contractor group — aggregate across every task in this bucket.
      const list = slot.bucketTasks.map(x => x.task).filter(Boolean);
      hasIssue      = list.some(t => !!t.issue);
      hasNote       = list.some(t => !!t.notes);
      hasUnassigned = list.some(t => t.assign === 'Unassigned');
    } else if(slot.roomId && ROOMS[slot.roomId] && Array.isArray(ROOMS[slot.roomId].taskList)){
      const list = ROOMS[slot.roomId].taskList;
      hasIssue      = list.some(t => !!t.issue);
      hasNote       = list.some(t => !!t.notes);
      hasUnassigned = list.some(t => t.assign === 'Unassigned');
    }
    if(L.changes && hasIssue){
      const b = mk('span','tl-cell-badge issue');
      b.title = 'Change order';
      b.innerHTML = '<svg viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M5 1.5L9 8.5H1L5 1.5Z" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/><line x1="5" y1="4" x2="5" y2="6" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="7.25" r=".55" fill="#fff"/></svg><span class="tl-cell-badge-text">Change order</span>';
      host.appendChild(b);
    }
    if(L.notes && hasNote){
      const b = mk('span','tl-cell-badge note');
      // v5: don't use the native browser title tooltip — we supply a richer
      // HTML tooltip with the actual note content below.
      // Build the tooltip content. Single-task slots get the task name as the
      // header and the note body underneath. Group slots get a list of every
      // task inside the group that carries a note.
      const esc = s => String(s==null?'':s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      let tipHtml = '';
      if(slot.type === 'task' && slot.task){
        const body = slot.task.notes ? esc(slot.task.notes) : '<span class="tl-note-tip-empty">No note content</span>';
        tipHtml =
          '<div class="tl-note-tip-title">'+ esc(slot.task.name || 'Note') +'</div>' +
          '<div class="tl-note-tip-body">'+ body +'</div>';
      } else if(slot.bucketTasks && slot.bucketTasks.length){
        // Contractor group — pull notes from every task in this bucket and
        // prefix each one with its room name so the source is clear.
        const items = slot.bucketTasks
          .filter(x => x && x.task && x.task.notes)
          .map(x =>
            '<div class="tl-note-tip-item">' +
              '<div class="tl-note-tip-sub">'+ esc((x.task.name || 'Task') + ' · ' + (x.roomName || '')) +'</div>' +
              esc(x.task.notes) +
            '</div>'
          ).join('');
        tipHtml =
          '<div class="tl-note-tip-title">'+ esc(slot.roomName || 'Notes') +'</div>' +
          '<div class="tl-note-tip-body">'+ (items || '<span class="tl-note-tip-empty">No notes</span>') +'</div>';
      } else if(slot.roomId && ROOMS[slot.roomId]){
        const items = ROOMS[slot.roomId].taskList
          .filter(t => t && t.notes)
          .map(t =>
            '<div class="tl-note-tip-item">' +
              '<div class="tl-note-tip-sub">'+ esc(t.name || 'Task') +'</div>' +
              esc(t.notes) +
            '</div>'
          ).join('');
        tipHtml =
          '<div class="tl-note-tip-title">'+ esc(slot.roomName || 'Notes') +'</div>' +
          '<div class="tl-note-tip-body">'+ (items || '<span class="tl-note-tip-empty">No notes</span>') +'</div>';
      }
      b.innerHTML =
        '<svg viewBox="0 0 10 10" fill="none" aria-hidden="true">' +
          '<rect x="1.5" y="1.25" width="7" height="7.5" rx="1" stroke="#fff" stroke-width="1.1"/>' +
          '<line x1="3.25" y1="3.75" x2="6.75" y2="3.75" stroke="#fff" stroke-width="1"/>' +
          '<line x1="3.25" y1="5.5" x2="6.75" y2="5.5" stroke="#fff" stroke-width="1"/>' +
          '<line x1="3.25" y1="7.25" x2="5.25" y2="7.25" stroke="#fff" stroke-width="1"/>' +
        '</svg>' +
        '<span class="tl-cell-badge-text">Note</span>' +
        '<span class="tl-cell-note-tooltip">'+ tipHtml +'</span>';
      // Position the fixed-positioned tooltip relative to the badge on hover.
      // Clamp to viewport so it never spills off-screen on a narrow window.
      b.addEventListener('mouseenter', function(){
        const tip = b.querySelector('.tl-cell-note-tooltip');
        if(!tip) return;
        const r = b.getBoundingClientRect();
        const tipW = 240;
        const vw = window.innerWidth || document.documentElement.clientWidth;
        // Align the tooltip's right edge to the badge's right edge by default,
        // then clamp so it stays ≥ 8px from both viewport edges.
        let left = r.right - tipW;
        left = Math.max(8, Math.min(left, vw - tipW - 8));
        tip.style.left = left + 'px';
        tip.style.top  = (r.bottom + 8) + 'px';
      });
      host.appendChild(b);
    }
    if(L.unassigned && hasUnassigned){
      const b = mk('span','tl-cell-badge unassigned');
      b.title = 'Unassigned';
      b.innerHTML = '<svg viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M1 8h8M1.75 8V6.25c0-1.8 1.25-3 3.25-3s3.25 1.2 3.25 3V8" stroke="#fff" stroke-width="1.1" stroke-linecap="round"/><line x1="3.25" y1="5.25" x2="6.75" y2="5.25" stroke="#fff" stroke-width="1"/></svg><span class="tl-cell-badge-text">Unassigned</span>';
      host.appendChild(b);
    }
    // Status pill — colored by status key (Completed/Rework/In progress/Not
    // started). For task slots, reflects this task's status; for groups,
    // hidden (the group header pill in the right panel already aggregates).
    if(L.status && slot.type === 'task' && slot.task && typeof getTaskStatus === 'function'){
      // Walk-aware: Initial walk forces "Not started" for every task.
      const _st = (typeof getTaskStatusForWalk === 'function')
        ? getTaskStatusForWalk(slot.task, walkId)
        : getTaskStatus(slot.task);
      const _stColors = {
        rework:     'background:rgba(212,90,40,.95)',
        completed:  'background:rgba(96,146,108,.95)',
        notstarted: 'background:rgba(140,140,140,.95)',
        progress:   'background:rgba(46,125,143,.95)',
      };
      const b = mk('span','tl-cell-badge');
      b.title = 'Status: ' + _st.label;
      b.style.cssText = (_stColors[_st.key]||_stColors.progress) + ';color:#fff';
      // Render the matching status icon at 10px so it sits inline with the
      // badge text (currentColor → white from the inline style above).
      b.innerHTML = (typeof ICON_STATUS === 'function' ? ICON_STATUS(_st.key, 10) : '') + '<span class="tl-cell-badge-text">'+_st.label+'</span>';
      host.appendChild(b);
    }
    return host.childElementCount ? host : null;
  }

  function cellRender(cell, slot, walkId, groupInfo, roomBoundary){
    cell.innerHTML = '';
    // Reset any previous click handler — cell elements are reused across updates
    cell.onclick = null;
    cell.removeAttribute('data-clickable');
    // Reset task-grouping & room classes from any prior render
    cell.classList.remove('tl-cell-grp', 'tl-cell-grp-l', 'tl-cell-grp-r', 'tl-cell-grp-solo', 'tl-cell-room-bnd');
    cell.style.removeProperty('--room-tint');

    if(!slot){
      cell.appendChild(mk('div','tl-cell-empty','—'));
      return;
    }

    // Room-color top stripe + alternating subtle background tint per room. The
    // top stripe makes a cell's room recognisable at a glance even when its
    // photo dominates. The CSS picks up --room-tint as the stripe color.
    if(slot.roomId){
      cell.dataset.roomId = slot.roomId;
      const _rc = (typeof RC === 'object' && RC[slot.roomId]) ? RC[slot.roomId] : null;
      if(_rc) cell.style.setProperty('--room-tint', _rc);
    }
    // When this cell starts a new room (the cell to its left is in a different
    // room), tag it so the CSS draws a vertical dashed divider in the band gap.
    if(roomBoundary) cell.classList.add('tl-cell-room-bnd');

    const walkObj = WALKS.find(w => w.id===walkId);
    const walkShort = walkObj ? walkObj.short : '';
    const url = getPhotoForSlot(slot, walkId);

    // Visually link adjacent cells that belong to the SAME task (e.g. the
    // main "Paint Cabinet Base" slot + its "2nd photo" extra slot). The
    // black-box treatment + bridge bar only render when:
    //   (a) the adjacent slot shares this task, AND
    //   (b) BOTH cells in the pair actually have a photo for this walk.
    // That keeps empty cells looking like the standard dashed empty state and
    // avoids the box wrapping a photo + a no-photo placeholder.
    if(url && groupInfo && (groupInfo.groupL || groupInfo.groupR) && groupInfo.chipLen >= 2){
      cell.classList.add('tl-cell-grp');
      if(groupInfo.groupL && groupInfo.chipIdx > 1) cell.classList.add('tl-cell-grp-l');
      if(groupInfo.groupR && groupInfo.chipIdx < groupInfo.chipLen) cell.classList.add('tl-cell-grp-r');
    } else if(url && groupInfo && (groupInfo.groupL || groupInfo.groupR)){
      cell.classList.add('tl-cell-grp-solo');
    }
    const taskLabel = slot.type==='task'
      ? (slot.isExtra ? (slot.task.name + ' · ' + (slot.extraLabel || 'Extra photo')) : slot.task.name)
      : (slot.roomName + ' · overview');

    // Task cells open the Photo Grid's task modal (openPhotoDetail) so the
    // pop-up matches what users see from the Photo Grid view. Group cells
    // stay static — they're aggregates, not a specific task.
    if(slot.type === 'task'){
      cell.dataset.clickable = '1';
      cell.onclick = (ev) => {
        ev.stopPropagation();
        // The cell shows photos[0] from getWalkPhotos, so open at index 0.
        if(typeof openPhotoDetail === 'function'){
          openPhotoDetail(slot.roomId, slot.taskId, walkId, 0);
        } else if(typeof openTlModal === 'function'){
          openTlModal(slot, walkId);
        }
      };
    }

    if(!url){
      // Special empty-state for groups flagged as having no group-level photo
      // (e.g. Kitchen). Show an explanatory message instead of the generic
      // "no photo" so the user understands this is intentional, not missing
      // data. Falls back to the standard empty state for everything else.
      if(slot.type === 'group' && slot.noGroupPhoto){
        const ng = mk('div','tl-cell-empty tl-cell-empty-nogrp');
        ng.innerHTML =
          '<span class="tl-nogrp-title">No group photo</span>' +
          '<span class="tl-nogrp-sub">See task photos for this group</span>';
        cell.appendChild(ng);
      } else {
        cell.appendChild(mk('div','tl-cell-empty','no photo'));
      }
      // Room pill + walk label both dropped — the scrubber, header columns
      // and row context already tell you which group/walk you're looking at.
      const badges = buildCellBadges(slot, walkId);
      if(badges) cell.appendChild(badges);
      const lbl = mk('div','tl-cell-label');
      lbl.innerHTML = '<span class="tl-cell-task">'+taskLabel+'</span>';
      lbl.style.background = 'linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.35) 100%)';
      lbl.querySelector('.tl-cell-task').style.color = 'var(--t1)';
      cell.appendChild(lbl);
      // Show "Photo N of M" only when 2+ slots in this task's run actually
      // have photos for this walk — otherwise the chip would lie about how
      // many real photos exist on this date.
      if(groupInfo && groupInfo.chipLen >= 2 && groupInfo.chipIdx > 0){
        const chip = mk('div','tl-cell-grp-chip');
        chip.innerHTML =
          '<svg width="9" height="9" viewBox="0 0 12 12" fill="none" aria-hidden="true">' +
            '<path d="M4.5 7.5L7.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>' +
            '<path d="M3 6c-1 1-1 2.4 0 3.4 1 1 2.4 1 3.4 0L7.5 8.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>' +
            '<path d="M9 6c1-1 1-2.4 0-3.4-1-1-2.4-1-3.4 0L4.5 3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>' +
          'Photo '+groupInfo.chipIdx+' of '+groupInfo.chipLen;
        cell.appendChild(chip);
      }
      return;
    }
    const img = document.createElement('img');
    img.className = 'tl-cell-img';
    img.src = url; img.loading = 'lazy';
    cell.appendChild(img);
    const badges = buildCellBadges(slot, walkId);
    if(badges) cell.appendChild(badges);
    const lbl = mk('div','tl-cell-label');
    lbl.innerHTML = '<span class="tl-cell-task">'+taskLabel+'</span>';
    cell.appendChild(lbl);
    // "Photo N of M" chip — only when 2+ cells in this task's run actually
    // have photos for this walk. Hidden when this is the only photo for the
    // walk so the chip never lies about how many real photos exist.
    if(groupInfo && groupInfo.chipLen >= 2 && groupInfo.chipIdx > 0){
      const chip = mk('div','tl-cell-grp-chip');
      chip.innerHTML =
        '<svg width="9" height="9" viewBox="0 0 12 12" fill="none" aria-hidden="true">' +
          '<path d="M4.5 7.5L7.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>' +
          '<path d="M3 6c-1 1-1 2.4 0 3.4 1 1 2.4 1 3.4 0L7.5 8.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>' +
          '<path d="M9 6c1-1 1-2.4 0-3.4-1-1-2.4-1-3.4 0L4.5 3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
        'Photo '+groupInfo.chipIdx+' of '+groupInfo.chipLen;
      cell.appendChild(chip);
    }
  }

  function updatePhotos(){
    const cur  = slots[state.currentIdx];
    const prev = slots[state.currentIdx - 1];
    const next = slots[state.currentIdx + 1];
    const pairs = [['prev',prev],['current',cur],['next',next]];
    // Two adjacent task slots with the same (roomId,taskId) are different
    // photos of the SAME task. Two passes:
    //   1) STRUCTURAL run — based on shared taskId. Drives the connector bar
    //      that visually bridges grouped cells (always shown so the user sees
    //      the slots are related, even if one is empty for the current walk).
    //   2) PHOTO-AWARE run — counts only cells in the run that actually have
    //      a photo for THIS walk. Drives the "Photo N of M" chip so we don't
    //      claim "Photo 2 of 2" when one of the two slots is empty.
    function __sameTask(a, b){
      return a && b && a.type === 'task' && b.type === 'task'
        && a.taskId === b.taskId && a.roomId === b.roomId;
    }
    function __runInfoFor(idx, walkId){
      let start = idx;
      while(start > 0 && __sameTask(slots[start - 1], slots[start])) start--;
      let end = idx;
      while(end < slots.length - 1 && __sameTask(slots[end], slots[end + 1])) end++;
      const runLen = end - start + 1;
      const runIdx = idx - start + 1;
      // Photo-aware count for the chip: only slots with a photo at this walk.
      let chipLen = 0, chipIdx = 0;
      for(let i = start; i <= end; i++){
        const url = (typeof getPhotoForSlot === 'function') ? getPhotoForSlot(slots[i], walkId) : '';
        if(url){
          chipLen++;
          if(i === idx) chipIdx = chipLen;
        }
      }
      return {
        runLen, runIdx,
        groupL:   runLen > 1 && runIdx > 1,            // joined to left neighbor
        groupR:   runLen > 1 && runIdx < runLen,       // joined to right neighbor
        chipLen, chipIdx,
      };
    }
    // Room-boundary detection — used by cellRender to add a vertical divider
    // when this cell sits in a different room than the cell to its LEFT (so
    // when the user scrubs across rooms, they immediately see the boundary).
    function __isRoomBoundary(curIdx){
      const a = slots[curIdx - 1];
      const b = slots[curIdx];
      return !!(a && b && a.roomId && b.roomId && a.roomId !== b.roomId);
    }
    ['A','B'].forEach(bandKey => {
      const walkId = bandKey==='A' ? state.walkA : state.walkB;
      pairs.forEach(([col, slot], colIdxInArr) => {
        const idx = state.currentIdx + (col === 'prev' ? -1 : col === 'next' ? 1 : 0);
        const cell = root.querySelector('.tl-cell[data-band="'+bandKey+'"][data-col="'+col+'"]');
        if(!cell) return;
        const gi = slot ? __runInfoFor(idx, walkId) : null;
        const roomBoundary = __isRoomBoundary(idx);
        cellRender(cell, slot, walkId, gi, roomBoundary);
      });
    });
  }

  // Any stale timeline resize handlers from earlier renders — drop them so
  // they don't run against a DOM that no longer has a scrubber to position.
  if(window.__tlResizeHandler){
    window.removeEventListener('resize', window.__tlResizeHandler);
    window.__tlResizeHandler = null;
  }

  // Initial paint
  renderHead();
  updatePhotos();
  renderSlider();
  // Mirror the starting slot into the Scope sidebar — defer one tick so
  // the sidebar has finished its own render() pass first.
  setTimeout(() => { try { __syncScopeFromSlot(); } catch(e){} }, 0);

  // Keyboard nav — left/right arrows advance through slots.
  if(window.__tlKeyHandler){
    window.removeEventListener('keydown', window.__tlKeyHandler);
  }
  window.__tlKeyHandler = function(e){
    // Ignore if the user is typing in an input/textarea
    const tag = (e.target && e.target.tagName) || '';
    if(/^(INPUT|TEXTAREA|SELECT)$/.test(tag)) return;
    if(e.key === 'ArrowLeft'){ e.preventDefault(); navigate(-1); }
    else if(e.key === 'ArrowRight'){ e.preventDefault(); navigate(1); }
  };
  window.addEventListener('keydown', window.__tlKeyHandler);
}

// ── SCOPE-REVIEW RENDERER (side-by-side walks) ─────────────────────────────
// SR-3: real data wiring for walk selects + floorplan clone + photo carousels.
// Sidebar task list + group feed + shared timeline still land in SR-4/SR-5.
function renderScopeReview(){
  const body = document.getElementById('rp-body');
  if(!body) return;
  body.innerHTML = '';
  // Let the SR shell manage its own layout; strip any legacy flex overrides
  body.style.display = '';
  body.style.flexDirection = '';
  body.style.overflow = '';
  body.style.flex = '';

  // Strip any lingering compare-view popovers so they don't overlap SR
  document.querySelectorAll('.tl-popover').forEach(p => p.remove());

  const wL = WALKS.find(w => w.id === srWalkLeft)  || WALKS[0];
