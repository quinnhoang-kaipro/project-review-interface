  const wR = WALKS.find(w => w.id === srWalkRight) || WALKS[1] || WALKS[0];

  const root = mk('div','sr-root');

  // ── Shared mini-timeline strip ──
  root.appendChild(buildSrTimeline());

  // ── Combined header row (earlier date · Group name · later date) ──
  // Intentionally hidden now — the dates live on the taller timeline strip
  // above, and the group name is already evident from the hero captions +
  // the main Home/Group/Task breadcrumb. Flip this flag back to true to
  // restore the combined strip above both columns.
  const SR_SHOW_COMBINED_HDR = false;
  if(SR_SHOW_COMBINED_HDR){
    root.appendChild(buildSrCombinedHdr(wL, wR));
  }

  // ── Body: canvas (2 columns) + right sidebar ──
  // Sidebar (group dropdown + "Tasks in this group" list) is hidden for now;
  // flip SR_SHOW_SIDEBAR back to true to restore it.
  const SR_SHOW_SIDEBAR = false;
  const bodyGrid = mk('div','sr-body');
  if(!SR_SHOW_SIDEBAR) bodyGrid.classList.add('no-sidebar');
  // When the main left sidebar is collapsed, flip to the compact layout so
  // the task thumbnails stack vertically beside the hero (above the fold).
  try {
    const __bp = document.querySelector('.bp');
    if(__bp && __bp.offsetWidth <= 1) bodyGrid.classList.add('sr-compact');
  } catch(e){}

  const canvas = mk('div','sr-canvas');
  canvas.appendChild(buildSrColumn('L', wL));
  canvas.appendChild(buildSrColumn('R', wR));
  bodyGrid.appendChild(canvas);

  // Sidebar — live in SR-4: group select + group card (with feed) + task list.
  if(SR_SHOW_SIDEBAR){
    bodyGrid.appendChild(buildSrSidebar());
  }
  root.appendChild(bodyGrid);
  body.appendChild(root);
}

// ── SR helpers ────────────────────────────────────────────────────────────

// Deep-clone Kai's main floorplan SVG and strip interactivity so it renders
// statically inside an SR column. Returns a detached <svg> element.
function __srCloneFloorplanSvg(){
  const srcSvg = document.getElementById('bp-svg');
  if(!srcSvg) return null;
  const clone = srcSvg.cloneNode(true);
  // Strip IDs (avoid duplicates in the document), onclick handlers, and the
  // dynamic overlay (SR-3 shows the base plan only; markers come in SR-6).
  clone.removeAttribute('id');
  clone.removeAttribute('style');
  clone.setAttribute('width', '100%');
  clone.setAttribute('height', '100%');
  clone.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  clone.querySelectorAll('[id]').forEach(n => n.removeAttribute('id'));
  clone.querySelectorAll('[onclick]').forEach(n => n.removeAttribute('onclick'));
  // Drop the overlay group (dynamic layer) — it's populated by renderFloorplanLayers
  // against the main SVG only, and we don't want stale children here.
  const overlay = clone.querySelector('g#bp-overlay, g[id="bp-overlay"]');
  if(overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
  return clone;
}

// Collect every (roomId, taskId, photoUrl) for the given walk across WALK_PHOTOS.
// Returns a flat array: [{roomId, taskId, task, url, idx, status}].
function __srWalkPhotoList(walkId){
  const out = [];
  Object.entries(WALK_PHOTOS).forEach(([roomId, tasks]) => {
    const room = ROOMS[roomId];
    if(!room) return;
    Object.entries(tasks).forEach(([taskId, byWalk]) => {
      const urls = (byWalk && byWalk[walkId]) || [];
      if(!urls.length) return;
      const task = room.taskList.find(t => t.id === taskId);
      if(!task) return;
      urls.forEach((url, idx) => {
        out.push({ roomId, taskId, task, url, idx, room });
      });
    });
  });
  return out;
}

// Status badge class + label for a task, scoped to a specific walk.
// The initial walk establishes scope only — no task state exists yet — so
// no badge renders for that column. Later walks show:
//   • Rework      — task has an open issue / change order
//   • Completed   — task is done
//   • In progress — everything else
// Returns null when no badge should render.
function __srTaskStatus(task, walkId){
  if(walkId === 'initial_scope') return null;
  if(task.issue)  return { cls:'on-hold',     label:'Rework' };
  if(task.done)   return { cls:'completed',   label:'Completed' };
  return            { cls:'in-progress', label:'In progress' };
}

// Shared mini-timeline across the top of the SR view. Renders every WALK as
// a clickable stop. Click sets the Left walk; shift/alt/cmd-click sets Right.
function buildSrTimeline(){
  const bar = mk('div','sr-timeline');

  const track = mk('div','sr-timeline-track');
  track.appendChild(mk('div','sr-timeline-line'));

  const stops = mk('div','sr-tl-stops');
  WALKS.forEach(w => {
    const stop = mk('div','sr-tl-stop');
    stop.dataset.walkId = w.id;
    const isL = w.id === srWalkLeft;
    const isR = w.id === srWalkRight;
    if(isL && isR)       stop.classList.add('is-lr');
    else if(isL)         stop.classList.add('is-l');
    else if(isR)         stop.classList.add('is-r');

    // Date ABOVE the horizontal line (absolute-positioned via CSS).
    stop.appendChild(mk('div','sr-tl-date', w.date));

    // Colored dot ON the line (reuses global wdot-* palette).
    const dot = mk('div','sr-tl-dot');
    if(w.dotClass) dot.classList.add(w.dotClass);
    stop.appendChild(dot);

    // Name BELOW the horizontal line.
    stop.appendChild(mk('div','sr-tl-name', w.short || w.label));

    stop.title = w.label + ' · ' + w.date;

    // Click directly on the stop. Children (date/dot/name) have
    // pointer-events:none so the click always lands here. Picks the nearer
    // scrubber (by WALKS index) and reassigns it. __srChangeWalk also
    // enforces chronological order, so if the move would put L after R the
    // two are swapped.
    stop.onclick = (ev) => {
      ev.stopPropagation();
      const idxL = WALKS.findIndex(wk => wk.id === srWalkLeft);
      const idxR = WALKS.findIndex(wk => wk.id === srWalkRight);
      const idxClick = WALKS.findIndex(wk => wk.id === w.id);
      const distL = Math.abs(idxClick - idxL);
      const distR = Math.abs(idxClick - idxR);
      const targetSide = (distL <= distR) ? 'L' : 'R';
      __srChangeWalk(targetSide, w.id);
    };

    stops.appendChild(stop);
  });
  track.appendChild(stops);
  bar.appendChild(track);

  return bar;
}

// Change handler for a walk selector — mutates global state and re-renders.
// Enforces chronological order: the earlier walk is always on the Left column
// and the later walk on the Right. If an assignment would flip that, we swap
// L and R so the chronology is preserved.
function __srChangeWalk(side, newWalkId){
  if(side === 'L') srWalkLeft  = newWalkId;
  else             srWalkRight = newWalkId;
  const idxL = WALKS.findIndex(w => w.id === srWalkLeft);
  const idxR = WALKS.findIndex(w => w.id === srWalkRight);
  if(idxL !== -1 && idxR !== -1 && idxL > idxR){
    const tmp = srWalkLeft;
    srWalkLeft = srWalkRight;
    srWalkRight = tmp;
  }
  // Re-render the whole SR view. render() dispatches into renderScopeReview.
  render();
}

// ── SR-4: Sidebar (scope groups + group feed + task list) ─────────────────

// Ordered list of scope groups. One entry per Kai room, using the room as a
// group. This keeps the sidebar in sync with the floorplan visually (same
// RC color dot, same name).
function __srGroupList(){
  const order = ['kitchen','living','dining','bath','hall','master','bed2','garage','exterior_general'];
  return order.filter(id => ROOMS[id]).map(id => ({
    id, name: ROOMS[id].name, room: ROOMS[id], color: RC[id] || 'var(--charcoal)'
  }));
}

// Guard against a stale srGroupId (e.g. after a reload) by falling back to
// the first available group.
function __srEffectiveGroupId(){
  if(srGroupId && ROOMS[srGroupId]) return srGroupId;
  const list = __srGroupList();
  return list.length ? list[0].id : null;
}

// Build a group-level activity feed by seeding from the group id + walk ids
// so it stays stable across re-renders of the same scope.
function __srBuildGroupFeed(groupId){
  const seed = __tlHashStr(groupId + '::' + srWalkLeft + '::' + srWalkRight);
  const rand = __tlSeededRand(seed);
  const n = 3 + Math.floor(rand() * 2); // 3–4 items
  const items = [];
  const usedTimeIdxs = new Set();
  for(let i = 0; i < n; i++){
    const pool = __TL_ACTIVITY_POOL[Math.floor(rand() * __TL_ACTIVITY_POOL.length)];
    let ti = Math.floor(rand() * __TL_ACTIVITY_TIMES.length);
    let guard = 0;
    while(usedTimeIdxs.has(ti) && guard++ < 5){ ti = (ti + 1) % __TL_ACTIVITY_TIMES.length; }
    usedTimeIdxs.add(ti);
    items.push({ who: pool.who, what: pool.what, when: __TL_ACTIVITY_TIMES[ti] });
  }
  return items;
}

function __srChangeGroup(newId){
  srGroupId = newId;
  srColGroup = { L:newId, R:newId }; // keep columns in sync with sidebar change
  srTaskId  = null; // reset pinned task when group changes
  srHeroSel = { L:null, R:null }; // hero selections were scoped to old group
  render();
}

// Per-column group change — Left's dropdown now drives both columns since
// the Right column's group follows L. We still update srColGroup[side] so
// the state stays coherent, and mirror L → R when side === 'L'.
function __srChangeColGroup(side, newId){
  if(!side || !ROOMS[newId]) return;
  srColGroup[side] = newId;
  if(side === 'L') srColGroup.R = newId; // R mirrors L
  // Hero selections were scoped to the old group — clear both sides since
  // both columns are now repointed at the new group.
  srHeroSel = { L:null, R:null };
  // If the pinned task lives outside the new shared group, clear it.
  if(srTaskId){
    const g = ROOMS[srColGroup.L];
    const stillVisible = g && g.taskList.some(t => t.id === srTaskId);
    if(!stillVisible) srTaskId = null;
  }
  render();
}

function __srToggleTask(taskId){
  srTaskId = (srTaskId === taskId) ? null : taskId;
  render();
}

function buildSrSidebar(){
  const sidebar = mk('aside','sr-sidebar');
  const groups = __srGroupList();
  const gId    = __srEffectiveGroupId();
  const g      = groups.find(x => x.id === gId) || groups[0];

  // Scope-group selector
  const sel = document.createElement('select');
  sel.className = 'sr-sidebar-select';
  groups.forEach(grp => {
    const o = document.createElement('option');
    o.value = grp.id;
    o.textContent = grp.name + ' · ' + grp.room.taskList.length + ' task' + (grp.room.taskList.length===1?'':'s');
    if(grp.id === gId) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = (ev) => __srChangeGroup(ev.target.value);
  sidebar.appendChild(sel);

  if(!g){
    sidebar.appendChild(mk('div','sr-section-empty','No scope groups available'));
    return sidebar;
  }

  // Group card (title + task count + "Activity log" feed) — hidden for now.
  // User asked to call it "Activity log"; they'll flag when they want it back.
  // To restore: set SR_SHOW_ACTIVITY_LOG = true.
  const SR_SHOW_ACTIVITY_LOG = false;
  if(SR_SHOW_ACTIVITY_LOG){
    const groupCard = mk('div','sr-group-card');
    const groupHead = mk('div','sr-group-head');
    const dot = mk('span','sr-group-dot');
    dot.style.background = g.color;
    groupHead.appendChild(dot);
    groupHead.appendChild(mk('span','sr-group-title', g.name));
    const count = g.room.taskList.length;
    groupHead.appendChild(mk('span','sr-group-count', count + ' task' + (count===1?'':'s')));
    groupCard.appendChild(groupHead);

    const groupFeed = mk('div','sr-group-feed');
    const feed = __srBuildGroupFeed(g.id);
    if(!feed.length){
      const empty = mk('div','sr-section-empty','No recent activity');
      empty.style.margin = '10px 12px';
      groupFeed.appendChild(empty);
    } else {
      feed.forEach(item => {
        const row = mk('div','sr-feed-item');
        const av = mk('span','sr-feed-avatar', __tlInitials(item.who));
        const body = mk('div','sr-feed-body');
        body.innerHTML = '<span class="who">' + item.who + '</span> '
                       + '<span class="what">' + item.what + '</span>'
                       + '<span class="when">' + item.when + '</span>';
        row.appendChild(av);
        row.appendChild(body);
        groupFeed.appendChild(row);
      });
    }
    groupCard.appendChild(groupFeed);
    sidebar.appendChild(groupCard);
  }

  // Task list — with a small "Clear" affordance when a task is pinned
  const titleRow = mk('div','sr-section-title-row');
  titleRow.appendChild(mk('span','sr-section-title','Tasks in this group'));
  if(srTaskId){
    const clear = mk('button','sr-section-clear','Clear selection');
    clear.type = 'button';
    clear.onclick = () => { srTaskId = null; render(); };
    titleRow.appendChild(clear);
  }
  sidebar.appendChild(titleRow);
  const taskList = mk('div','sr-task-list');

  if(!g.room.taskList.length){
    taskList.appendChild(mk('div','sr-section-empty','No tasks in this group'));
  } else {
    g.room.taskList.forEach(t => {
      const row = mk('div','sr-task-row');
      if(t.done)  row.classList.add('done');
      if(t.issue) row.classList.add('issue');
      if(srTaskId === t.id) row.classList.add('active');
      row.appendChild(mk('span','sr-task-bullet'));
      const body = mk('div','sr-task-body');
      body.appendChild(mk('div','sr-task-name', t.name));
      const metaBits = [];
      metaBits.push(t.assign || 'Unassigned');
      if(typeof t.cost === 'number') metaBits.push(__tlCurrency(t.cost));
      if(t.issue)       metaBits.push('ISSUE');
      else if(t.done)   metaBits.push('DONE');
      else              metaBits.push('OPEN');
      body.appendChild(mk('div','sr-task-meta', metaBits.join(' · ')));
      row.appendChild(body);
      row.onclick = () => __srToggleTask(t.id);
      taskList.appendChild(row);
    });
  }

  sidebar.appendChild(taskList);
  return sidebar;
}

// One side-by-side column: header + floorplan + group-photos + task-photos.
// SR-3: walk selects are live, floorplan is cloned from #bp-svg, carousels
// are wired to WALK_PHOTOS for the given walk.
// Combined (earlier date · Group name · later date) strip shown once above
// both columns. Replaces the per-column walk dropdowns.
function buildSrCombinedHdr(wL, wR){
  const groupId = (srColGroup && ROOMS[srColGroup.L]) ? srColGroup.L : __srEffectiveGroupId();
  const group = groupId ? ROOMS[groupId] : null;
  const groupName = group ? group.name : 'All groups';
  const hdr = mk('div','sr-combined-hdr');
  hdr.appendChild(mk('div','sr-combined-date sr-combined-date-l', (wL && wL.date) || ''));
  hdr.appendChild(mk('div','sr-combined-group', groupName));
  hdr.appendChild(mk('div','sr-combined-date sr-combined-date-r', (wR && wR.date) || ''));
  return hdr;
}

function buildSrColumn(side /* 'L' | 'R' */, walkObj){
  const col = mk('div','sr-col');
  col.dataset.side = side;
  col.dataset.walkId = walkObj.id;

  // No per-column header anymore — the combined strip above both columns
  // shows both dates + the group name. Both columns read from srColGroup.L
  // (kept in lockstep with selRoomId via __syncSrGroupFromNav).
  const colGroupId = (srColGroup && ROOMS[srColGroup.L]) ? srColGroup.L : __srEffectiveGroupId();

  // Walk photos — filter by the shared scope group (driven by L's dropdown).
  const focusGroupId = colGroupId;
  const photos = __srWalkPhotoList(walkObj.id)
    .filter(p => !focusGroupId || p.roomId === focusGroupId);

  // Hero photo — big blown-up image per column. Priority:
  //   1. this column's own srHeroSel pick (group or task carousel click)
  //   2. currently-pinned task's first photo for this walk
  //   3. first available photo in the focused group for this walk
  //   4. empty state
  //
  // `sr-top-row` wraps the hero and the task-photos section so that — when
  // the main left sidebar is collapsed (`.sr-body.sr-compact`) — the two
  // sit side-by-side and the task thumbs stack vertically beside the hero
  // so they stay above the fold. With the sidebar visible it acts as
  // `display:contents` and the original hero / group / task column order
  // is preserved via flex `order`.
  const topRow = mk('div','sr-top-row');
  topRow.appendChild(buildSrHero(photos, walkObj, side));
  col.appendChild(topRow);

  // Group photos: first photo per (room, task) pair — acts as the pool of
  // "recently captured" thumbnails for the focused group.
  const groupPool = [];
  const seenPair  = new Set();
  photos.forEach(p => {
    const k = p.roomId + ':' + p.taskId;
    if(seenPair.has(k)) return;
    seenPair.add(k);
    groupPool.push(p);
  });

  // Task photos: one card per (room, task) pair in the focused group that
  // has at least one photo, using the pair's first photo as the thumbnail.
  const taskCards = groupPool; // same shape, distinct rendering

  // Group photos section — stays below the hero in both modes.
  const gpSec = mk('div','sr-photos-section sr-gp-section');
  const gpHdr = mk('div','sr-photos-hdr');
  gpHdr.appendChild(mk('span','sr-photos-label','Group photos'));
  gpHdr.appendChild(mk('span','sr-photos-count',
    groupPool.length ? (groupPool.length + ' photo' + (groupPool.length===1?'':'s')) : 'no photos'));
  gpSec.appendChild(gpHdr);
  gpSec.appendChild(buildSrGroupCarousel(groupPool, walkObj, side));
  col.appendChild(gpSec);

  // Task photos section — lives inside `sr-top-row` so it can flip beside
  // the hero when the left sidebar collapses.
  const tpSec = mk('div','sr-photos-section sr-tp-section');
  const tpHdr = mk('div','sr-photos-hdr');
  tpHdr.appendChild(mk('span','sr-photos-label','Task photos'));
  tpHdr.appendChild(mk('span','sr-photos-count',
    taskCards.length ? (taskCards.length + ' task' + (taskCards.length===1?'':'s')) : 'no tasks'));
  tpSec.appendChild(tpHdr);
  tpSec.appendChild(buildSrTaskCarousel(taskCards, walkObj, side));
  topRow.appendChild(tpSec);

  return col;
}

// Big blown-up hero photo for a column. Picks this column's own explicit
// selection first (a click in the group or task carousel), then the globally-
// pinned task, then the first photo in the focused group for this walk.
function buildSrHero(photos, walkObj, side){
  const hero = mk('div','sr-hero');

  let pick = null;
  const sel = side && srHeroSel ? srHeroSel[side] : null;
  if(sel){
    // Match the exact photo the user clicked when possible (same roomId +
    // taskId + idx). If this walk doesn't have that idx, fall back to any
    // photo of the same task so the hero still feels "pinned".
    pick = photos.find(p => p.roomId === sel.roomId && p.taskId === sel.taskId && p.idx === sel.idx)
        || photos.find(p => p.roomId === sel.roomId && p.taskId === sel.taskId)
        || null;
  }
  if(!pick && srTaskId){
    pick = photos.find(p => p.taskId === srTaskId) || null;
  }
  if(!pick && photos.length){
    pick = photos[0];
  }

  if(!pick){
    hero.appendChild(mk('div','sr-hero-empty','No photos captured for this group on this walk'));
    return hero;
  }

  const img = document.createElement('img');
  img.src = pick.url;
  img.loading = 'lazy';
  img.alt = pick.task.name;
  hero.appendChild(img);

  // Task-hotspot markers — pulsing dashed blue circles calling out the tasks
  // related to this hero photo's group (pattern from the scope-review-floorplan
  // reference). One marker per task with at least one photo in this walk.
  // Placed before the caption so the caption's gradient sits above the bottom
  // of any marker that happens to land there.
  hero.appendChild(__srBuildHeroMarkers(photos, pick, walkObj, side));

  const cap = mk('div','sr-hero-caption');
  // Group/room name is shown once in the combined header above both columns,
  // so the per-hero sr-hero-room chip is intentionally omitted here.
  cap.appendChild(mk('span','sr-hero-title', pick.task.name));
  const status = __srTaskStatus(pick.task, walkObj && walkObj.id);
  if(status) cap.appendChild(mk('span','sr-hero-badge ' + status.cls, status.label));
  hero.appendChild(cap);

  // SR-7: open the Kai detail modal scoped to this column's walk
  hero.style.cursor = 'zoom-in';
  hero.title = pick.task.name + ' — click for details';
  hero.onclick = () => __srOpenTaskModal(pick, walkObj.id);

  return hero;
}

// Deterministic (top, left) percentage for a task-id hotspot on the hero.
// Seeded by taskId + the room so markers don't jump when switching walks.
// Keeps markers inside a 15–70% / 12–85% box so they don't collide with the
// bottom caption or the hero's edges.
function __srMarkerPos(taskId, roomId){
  const seed = __tlHashStr(String(taskId) + '::' + String(roomId || ''));
  const rand = __tlSeededRand(seed);
  const top  = 15 + Math.floor(rand() * 55); // 15–70
  const left = 12 + Math.floor(rand() * 73); // 12–85
  return { top, left };
}

// Build the hero marker overlay: one dashed blue hotspot per task in the
// focused group that has at least one photo for this walk. Clicking a marker
// pins that task's photo as the column's hero (mirrors the group-carousel
// click behavior).
function __srBuildHeroMarkers(photos, pick, walkObj, side){
  const wrap = mk('div','sr-hero-markers');
  const seen = new Set();
  // Gather one representative photo per task so we can pin a hero on click.
  const byTask = [];
  photos.forEach(p => {
    if(seen.has(p.taskId)) return;
    seen.add(p.taskId);
    byTask.push(p);
  });
  // Cap to avoid clutter on groups with many tasks.
  const MAX_MARKERS = 6;
  byTask.slice(0, MAX_MARKERS).forEach(p => {
    const pos = __srMarkerPos(p.taskId, p.roomId);
    const m = document.createElement('button');
    m.type = 'button';
    m.className = 'sr-hero-marker';
    if(pick && p.taskId === pick.taskId) m.classList.add('active');
    m.style.top  = pos.top  + '%';
    m.style.left = pos.left + '%';
    m.setAttribute('aria-label', '#' + p.taskId + ' · ' + p.task.name);
    m.title = '#' + p.taskId + ' · ' + p.task.name;
    const lbl = mk('span','sr-hero-marker-label', '#' + p.taskId + ' · ' + p.task.name);
    m.appendChild(lbl);
    m.onclick = (ev) => {
      ev.stopPropagation();
      if(side){
        srHeroSel[side] = { origin:'hero-marker', roomId:p.roomId, taskId:p.taskId, idx:p.idx, url:p.url };
      }
      render();
    };
    wrap.appendChild(m);
  });
  return wrap;
}

// Open the shared Kai detail modal for a task photo in the SR view.
function __srOpenTaskModal(p, walkId){
  if(typeof openTlModal !== 'function') return;
  const room = ROOMS[p.roomId];
  const task = room && room.taskList.find(t => t.id === p.taskId);
  if(!room || !task) return;
  openTlModal({ type:'task', roomId:p.roomId, roomName:room.name, taskId:task.id, task }, walkId);
}

// Carousel of compact thumbs (group-level photo pool).
function buildSrGroupCarousel(items, walkObj, side){
  const row = mk('div','sr-photos-row');
  const prev = __srCarouselBtn('prev');
  const next = __srCarouselBtn('next');
  const scroll = mk('div','sr-photos-scroll');
  const grid = mk('div','sr-photos-grid');

  const sel = side && srHeroSel ? srHeroSel[side] : null;
  let activeThumb = null;

  if(!items.length){
    const empty = mk('div','sr-section-empty', 'No photos captured for this walk');
    empty.style.flex = '1';
    grid.appendChild(empty);
    prev.disabled = true;
    next.disabled = true;
  } else {
    items.forEach(p => {
      const thumb = mk('div','sr-unassigned-photo');
      thumb.title = p.room.name + ' · ' + p.task.name + '\nClick: set as hero · Double-click: open details';
      // Light up when THIS column's hero was selected via the group carousel
      // and matches this specific photo (roomId + taskId + idx).
      if(sel && sel.origin === 'group'
         && sel.roomId === p.roomId && sel.taskId === p.taskId && sel.idx === p.idx){
        thumb.classList.add('active');
        activeThumb = thumb;
      }
      const img = document.createElement('img');
      img.src = p.url;
      img.loading = 'lazy';
      img.alt = p.task.name;
      thumb.appendChild(img);
      // Single click sets this column's hero from the GROUP carousel only —
      // it deliberately does NOT touch srTaskId so the task carousel's card
      // for the same task doesn't also light up. Double-click opens details.
      thumb.onclick = () => {
        if(p.roomId && srGroupId !== p.roomId){ srGroupId = p.roomId; }
        if(side){
          srHeroSel[side] = { origin:'group', roomId:p.roomId, taskId:p.taskId, idx:p.idx, url:p.url };
        }
        render();
      };
      thumb.ondblclick = (ev) => { ev.preventDefault(); __srOpenTaskModal(p, walkObj.id); };
      grid.appendChild(thumb);
    });
    if(activeThumb){
      requestAnimationFrame(() => {
        const target = activeThumb.offsetLeft - (scroll.clientWidth - activeThumb.clientWidth) / 2;
        scroll.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
      });
    }
  }

  scroll.appendChild(grid);
  __srWireCarouselScroll(scroll, prev, next);

  row.appendChild(prev);
  row.appendChild(scroll);
  row.appendChild(next);
  return row;
}

// Carousel of task photo cards (thumb + status badge + task name label).
function buildSrTaskCarousel(items, walkObj, side){
  const row = mk('div','sr-photos-row');
  const prev = __srCarouselBtn('prev');
  const next = __srCarouselBtn('next');
  const scroll = mk('div','sr-photos-scroll');
  const grid = mk('div','sr-photos-grid');

  const sel = side && srHeroSel ? srHeroSel[side] : null;

  if(!items.length){
    const empty = mk('div','sr-section-empty', 'No task photos for this walk');
    empty.style.flex = '1';
    grid.appendChild(empty);
    prev.disabled = true;
    next.disabled = true;
  } else {
    let activeCard = null;
    items.forEach(p => {
      const card = mk('div','sr-photo-card');
      card.dataset.roomId = p.roomId;
      card.dataset.taskId = p.taskId;
      // Light up ONLY when this column's hero was set from the task carousel
      // (group clicks shouldn't highlight task cards). Fall back to the global
      // srTaskId pin when no column-specific selection exists, so the sidebar
      // pin still visually syncs with the task carousel.
      const litByTaskSel  = sel && sel.origin === 'task' && sel.taskId === p.taskId;
      const litByPin      = !sel && srTaskId === p.taskId;
      if(litByTaskSel || litByPin){
        card.classList.add('active');
        activeCard = card;
      }
      const thumb = mk('div','sr-photo-thumb');
      const img = document.createElement('img');
      img.src = p.url;
      img.loading = 'lazy';
      img.alt = p.task.name;
      thumb.appendChild(img);
      const status = __srTaskStatus(p.task, walkObj && walkObj.id);
      if(status){
        const badge = mk('span','sr-photo-badge ' + status.cls, status.label);
        thumb.appendChild(badge);
      }
      card.appendChild(thumb);
      const label = mk('div','sr-photo-label', p.task.name);
      card.appendChild(label);
      card.title = p.room.name + ' · ' + p.task.name + '\nClick: set as hero + pin task · Double-click: open details';
      // Single click sets this column's hero from the TASK carousel and pins
      // the task in the sidebar. Group-carousel clicks deliberately skip the
      // pin so the two selections stay independent. Double-click: modal.
      card.onclick = () => {
        if(p.roomId && srGroupId !== p.roomId){ srGroupId = p.roomId; }
        if(side){
          srHeroSel[side] = { origin:'task', roomId:p.roomId, taskId:p.taskId, idx:p.idx, url:p.url };
        }
        srTaskId = p.taskId;
        render();
      };
      card.ondblclick = (ev) => { ev.preventDefault(); __srOpenTaskModal(p, walkObj.id); };
      grid.appendChild(card);
    });
    // After layout, scroll the active card into view (centered-ish)
    if(activeCard){
      requestAnimationFrame(() => {
        const target = activeCard.offsetLeft - (scroll.clientWidth - activeCard.clientWidth) / 2;
        scroll.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
      });
    }
  }

  scroll.appendChild(grid);
  __srWireCarouselScroll(scroll, prev, next);

  row.appendChild(prev);
  row.appendChild(scroll);
  row.appendChild(next);
  return row;
}

// Shared carousel prev/next button factory.
function __srCarouselBtn(dir){
  const b = document.createElement('button');
  b.className = 'sr-carousel-btn ' + dir;
  b.type = 'button';
  b.innerHTML = dir === 'prev' ? '&#8249;' : '&#8250;';
  return b;
}

// Wire prev/next so they scroll the carousel by roughly one card-width and
// auto-disable at the ends. Also wires pointer-drag to pan the scroller.
function __srWireCarouselScroll(scroll, prev, next){
  const step = () => Math.max(120, Math.round(scroll.clientWidth * 0.8));
  const sync = () => {
    const max = scroll.scrollWidth - scroll.clientWidth - 1;
    prev.disabled = scroll.scrollLeft <= 0;
    next.disabled = scroll.scrollLeft >= max;
  };
  prev.onclick = () => { scroll.scrollBy({ left: -step(), behavior:'smooth' }); };
  next.onclick = () => { scroll.scrollBy({ left:  step(), behavior:'smooth' }); };
  scroll.addEventListener('scroll', sync, { passive:true });

  // Pointer-drag pan. Only kick in after a small threshold so single clicks
  // on cards still work normally.
  let dragState = null;
  const THRESH = 4;
  scroll.addEventListener('pointerdown', (ev) => {
    // Ignore non-primary buttons and touch-originating scrolls (native is better)
    if(ev.button !== 0) return;
    dragState = { startX: ev.clientX, startScroll: scroll.scrollLeft, active:false, id: ev.pointerId };
  });
  scroll.addEventListener('pointermove', (ev) => {
    if(!dragState) return;
    const dx = ev.clientX - dragState.startX;
    if(!dragState.active && Math.abs(dx) < THRESH) return;
    if(!dragState.active){
      dragState.active = true;
      try{ scroll.setPointerCapture(dragState.id); }catch(_){}
      scroll.classList.add('is-dragging');
    }
    scroll.scrollLeft = dragState.startScroll - dx;
    ev.preventDefault();
  });
  const endDrag = () => {
    if(!dragState) return;
    if(dragState.active){
      try{ scroll.releasePointerCapture(dragState.id); }catch(_){}
      scroll.classList.remove('is-dragging');
      // Swallow the click that fires after a drag so cards don't trigger.
      const swallow = (e) => { e.stopPropagation(); e.preventDefault(); scroll.removeEventListener('click', swallow, true); };
      scroll.addEventListener('click', swallow, true);
    }
    dragState = null;
  };
  scroll.addEventListener('pointerup',     endDrag);
  scroll.addEventListener('pointercancel', endDrag);
  scroll.addEventListener('pointerleave',  endDrag);

  // Defer initial sync until layout settles.
  requestAnimationFrame(sync);
}

// SR-2 empty-row helper retained for any future placeholder needs.
function buildSrCarouselRow(emptyLabel){
  const row = mk('div','sr-photos-row');
  const prev = __srCarouselBtn('prev'); prev.disabled = true;
  const next = __srCarouselBtn('next'); next.disabled = true;
  row.appendChild(prev);
  const scroll = mk('div','sr-photos-scroll');
  const grid = mk('div','sr-photos-grid');
  const empty = mk('div','sr-section-empty', emptyLabel);
  empty.style.flex = '1';
  grid.appendChild(empty);
  scroll.appendChild(grid);
  row.appendChild(scroll);
  row.appendChild(next);
  return row;
}

render();
renderUnassignedBadge();
renderWalkSel();
renderCtorSel();
