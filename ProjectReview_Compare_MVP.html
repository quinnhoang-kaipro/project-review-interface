  // ── GROUP: task list with walk filter ────────────────────────────────────
  if(zoom===1&&selRoomId&&selRoomId!=='unassigned'){
    const room=ROOMS[selRoomId], color=RC[selRoomId];
    if(!room){ body.innerHTML=''; return; }

    const cos_g=room.taskList.filter(t=>t.issue).length;
    const ctors_g=[...new Set(room.taskList.map(t=>t.assign).filter(a=>a!=='Unassigned'))];
    const notes_g=room.taskList.filter(t=>t.notes).length;
    const mods_g=room.taskList.filter(t=>t.modifier).length;

    // ── TABLE VIEW injection point

    // ── TABLE VIEW ──
    if(viewMode==='table'){
      const dtw = mk('div','dt-wrap');

      // ── Filter bar ──
      const filterBarG = mk('div','dt-filter-bar');
      filterBarG.innerHTML = `
        <span class="dt-filter-label">Filter</span>
        <button class="dt-filter-chip" title="Filter by contractor">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="3.5" r="1.8" stroke="currentColor" stroke-width="1.1"/><path d="M1.5 9c0-1.9 1.6-3.5 3.5-3.5S8.5 7.1 8.5 9" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          Contractor
        </button>
        <button class="dt-filter-chip" title="Filter by status">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.1"/><path d="M5 3v2l1.5 1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          Status
        </button>
        <button class="dt-filter-chip" title="Filter by modifier">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1l1 3h3l-2.5 2 1 3L5 7.5 2.5 9l1-3L1 4h3z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>
          Modifier
        </button>
        <button class="dt-filter-chip" title="Filter by change order">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1L9 8H1L5 1Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>
          Change order
        </button>`;
      dtw.appendChild(filterBarG);

      // Sort state
      let grpSortCol = null, grpSortDir = 1;

      const tbl = document.createElement('table');
      tbl.className = 'dt';
      tbl.id = 'grp-dt';

      const grpCols = [
        { key:'name',       label:'Task',          sortable:true,  align:'left'  },
        { key:'id',         label:'ID',            sortable:false, align:'left'  },
        { key:'contractor', label:'Contractor',    sortable:true,  align:'left'  },
        { key:'cost',       label:'Cost',          sortable:true,  align:'right' },
        { key:'status',     label:'Status',        sortable:true,  align:'left'  },
        { key:'modifier',   label:'Modifier',      sortable:false, align:'left'  },
        { key:'photos',     label:'Photos',        sortable:true,  align:'right' },
        { key:'notes',      label:'Notes',         sortable:true,  align:'right' },
        { key:'co',         label:'Change order',  sortable:false, align:'left'  },
      ];

      const statusOrder = { 'Change order':0, 'Pending':1, 'Done':2 };

      function renderGrpTbl() {
        let tasks = [...room.taskList];
        if(grpSortCol) tasks.sort((a,b) => {
          let av, bv;
          if(grpSortCol==='name')       { av=a.name; bv=b.name; }
          if(grpSortCol==='contractor') { av=a.assign; bv=b.assign; }
          if(grpSortCol==='cost')       { av=a.cost; bv=b.cost; }
          if(grpSortCol==='status')     { av=statusOrder[a.issue?'Change order':a.done?'Done':'Pending']; bv=statusOrder[b.issue?'Change order':b.done?'Done':'Pending']; }
          if(grpSortCol==='photos')     { av=WALKS.reduce((s,w)=>s+getWalkPhotos(selRoomId,a.id,w.id).length,0); bv=WALKS.reduce((s,w)=>s+getWalkPhotos(selRoomId,b.id,w.id).length,0); }
          if(grpSortCol==='notes')      { av=a.notes?1:0; bv=b.notes?1:0; }
          if(typeof av === 'string') return av.localeCompare(bv) * grpSortDir;
          return (av - bv) * grpSortDir;
        });

        tbl.innerHTML = `
          <thead><tr>
            ${grpCols.map(c => `
              <th class="${c.sortable?'sortable':''} ${grpSortCol===c.key?(grpSortDir===1?'sort-asc':'sort-desc'):''}"
                style="text-align:${c.align}"
                ${c.sortable ? `onclick="if(grpSortCol==='${c.key}'){grpSortDir*=-1}else{grpSortCol='${c.key}';grpSortDir=1};renderGrpTbl()"` : ''}>
                ${c.label}
              </th>`).join('')}
          </tr></thead>
          <tbody>
            ${tasks.map(task => {
              const sc  = task.issue?'#fde8e8,#a03030':task.done?'#e8f5e9,#2e7d32':'var(--bg-2),var(--t2)';
              const [bg,fg] = sc.split(',');
              const st  = task.issue?'Change order':task.done?'Done':'Pending';
              const photoCount = WALKS.reduce((s,w)=>s+getWalkPhotos(selRoomId,task.id,w.id).length,0);
              const noteCount  = task.notes ? 1 : 0;
              return `<tr>
                <td><span class="dt-name">${task.name}</span></td>
                <td class="dt-mono" style="color:var(--t3)">${task.id}</td>
                <td>${task.assign==='Unassigned'?`<span style="color:#b34d00">${task.assign}</span>`:task.assign}</td>
                <td class="dt-green" style="text-align:right">${fmt(task.cost)}</td>
                <td><span class="dt-chip" style="background:${bg};color:${fg};display:inline-flex;align-items:center;gap:3px">${task.issue?ICON_CO:''}${st}</span></td>
                <td>${task.modifier?`<span class="dt-chip" style="background:rgba(212,160,23,.15);color:#7a5a00">${task.modifier}</span>`:'<span style="color:var(--t3)">—</span>'}</td>
                <td class="dt-mono" style="text-align:right;color:${photoCount?'var(--t1)':'var(--t3)'}">${photoCount||'—'}</td>
                <td class="dt-mono" style="text-align:right;color:${noteCount?'var(--t1)':'var(--t3)'}">${noteCount||'—'}</td>
                <td>${task.issue?`<span class="dt-chip" style="background:#fde8e8;color:#a03030">Open</span>`:'<span style="color:var(--t3)">—</span>'}</td>
              </tr>`;
            }).join('')}
          </tbody>`;
      }

      window.grpSortCol = null;
      window.grpSortDir = 1;
      window.renderGrpTbl = renderGrpTbl;
      renderGrpTbl();
      dtw.appendChild(tbl);

      // Walk photo summary per task — same width container as task table
      const walkSummaryHead = mk('div','s-hdr');
      walkSummaryHead.innerHTML='<span class="s-title">Walk photo coverage</span><span class="s-line"></span>';
      dtw.appendChild(walkSummaryHead);

      const coverWalksG = WALKS.filter(w => w.id !== 'change_order');
      const coverTbl = document.createElement('table');
      coverTbl.className = 'dt';
      coverTbl.style.cssText = 'width:100%;table-layout:fixed';
      coverTbl.innerHTML = `<thead><tr>
        <th style="min-width:120px">Task</th>
        ${coverWalksG.map(w=>`<th><span style="display:flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:50%;display:inline-block" class="${w.dotClass}"></span>${w.short}</span></th>`).join('')}
      </tr></thead><tbody>
        ${room.taskList.map(task=>`<tr>
          <td class="dt-name">${task.name}</td>
          ${coverWalksG.map(w=>{
            const ps = getWalkPhotos(selRoomId, task.id, w.id);
            if(!ps.length) return `<td><span style="color:var(--t3);font-size:11px">—</span></td>`;
            const attr = getAttr(selRoomId, task.id, w.id);
            return `<td style="padding:6px 10px">
              <div style="position:relative;width:72px;aspect-ratio:4/3;border-radius:var(--r);overflow:hidden;cursor:pointer" onclick="openPhotoDetail('${selRoomId}','${task.id}','${w.id}',0)">
                <div style="width:100%;height:100%;background:url(${ps[0]}) center/cover;filter:brightness(.82)"></div>
                ${ps.length>1?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28)"><span style="font-size:11px;font-weight:600;color:#fff">${ps.length}</span></div>`:''}
                ${attrBadge(attr)}
              </div>
            </td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>`;
      dtw.appendChild(coverTbl);
      body.appendChild(dtw);
      return;
    }

    // ── PHOTO VIEW: group photos + task cards ──
    const g = mk('div','g-tasks');

    // Prominent group title heading at the top — matches the "Next group"
    // section style used by the stacked groups feed below, so the first
    // group on the page reads with the same visual hierarchy as the rest.
    const _grpHdr = mk('div','');
    _grpHdr.style.cssText = 'margin:0 0 18px;padding:0';
    _grpHdr.innerHTML =
      '<div style="height:5px;background:'+color+';border-radius:3px;margin-bottom:12px;opacity:.85"></div>' +
      '<div style="display:flex;align-items:baseline;gap:10px;padding:0 2px">' +
        '<span style="font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:'+color+'">▸ Group</span>' +
        '<div style="flex:1;height:1px;background:var(--border)"></div>' +
        '<span style="font-size:11px;color:var(--t3);font-family:var(--mono)">'+(room.taskList ? room.taskList.length : 0)+' tasks · '+(room.budget?fmt(room.budget):'—')+'</span>' +
      '</div>' +
      '<h2 style="font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.02em;line-height:1.2;margin:6px 0 0;padding:0 2px">'+room.name+'</h2>';
    g.appendChild(_grpHdr);

    // Placeholder color palettes
    const GP_COLORS = ['#C9BFB3','#B8ADA0','#D4C8BA','#A89D91','#BFB4A7','#C2B8AC','#CABFB5','#B5A99C','#D0C5B8','#A8A099','#C7BCB0','#BDAEA0','#D2C9BC','#AC9E93','#C4BAB0'];
    const TASK_PALETTES = [
      ['#8B7355','#9A7E5A','#7D6649','#A68B62','#8F7A58','#B09070','#7A6548','#9C8060'],
      ['#6B7A5E','#7A8B6A','#5E6E52','#8A9A75','#737F64','#8E9E72','#647558','#7E9268'],
      ['#7A6B8B','#8B7A9C','#6B5E7D','#9A8AAB','#817293','#958BA5','#72647E','#887898'],
      ['#4A7A7A','#5A8E8E','#3E6A6A','#639E9E','#527A7A','#6A9090','#447070','#5A8888'],
      ['#6B7580','#7A8590','#5E6870','#8A96A2','#737E8A','#848F9C','#687278','#7A8592'],
    ];
    const TASK_COUNTS = [14, 31, 22, 47, 9, 38, 16, 28]; // realistic photo counts per task

    // ── GROUP PHOTOS section — single row, expandable ──
    // Build real photo list from GROUP_PHOTOS when available; fall back to placeholder colors otherwise.
    const GP_WALK_ORDER = [
      { key:'initial', short:'Initial walk' },
      { key:'p1',      short:'Progress 1'   },
      { key:'p2',      short:'Progress 2'   },
      { key:'final',   short:'Final walk'   },
    ];
    const realGroupPhotos = [];
    const gpRoomData = (typeof GROUP_PHOTOS !== 'undefined' && GROUP_PHOTOS[selRoomId]) || null;
    if(gpRoomData){
      GP_WALK_ORDER.forEach(w => {
        (gpRoomData[w.key] || []).forEach(url => {
          realGroupPhotos.push({ url, walkShort:w.short, walkKey:w.key });
        });
      });
    }
    const useRealGroupPhotos = realGroupPhotos.length > 0;

    let gpExpanded = false;
    // When we have real photos, use that count; otherwise fall back to placeholder palette length
    const GP_TOTAL = useRealGroupPhotos ? realGroupPhotos.length : GP_COLORS.length;
    // How many fit in one row at ~88px tile width — we'll show a fixed count of 6 (or all if fewer)
    const GP_PREVIEW = Math.min(6, GP_TOTAL);

    const gpSection = mk('div','');
    gpSection.style.cssText = 'margin-bottom:18px';

    const gpHdr = mk('div','s-hdr');
    gpHdr.style.cssText = 'cursor:pointer;user-select:none';
    const gpToggle = mk('span','');
    gpToggle.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0';
    const canToggle = GP_TOTAL > GP_PREVIEW;
    gpToggle.innerHTML = canToggle
      ? `See all ${GP_TOTAL} <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : '';
    gpHdr.innerHTML = `<span class="s-title">Group photos</span><span class="s-count">${canToggle ? `${GP_PREVIEW} of ${GP_TOTAL}` : `${GP_TOTAL}`}</span><span class="s-line"></span>`;
    gpHdr.appendChild(gpToggle);

    // Single-row strip (overflow hidden)
    const gpStrip = mk('div','');
    gpStrip.style.cssText = 'display:flex;gap:4px;overflow:hidden;';

    // Expanded grid (hidden by default)
    const gpGrid = mk('div','');
    gpGrid.style.cssText = 'display:none;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:4px;margin-top:4px';

    function buildGpTiles(container, isGrid){
      const total = GP_TOTAL;
      for(let i=0;i<total;i++){
        const tile = mk('div','');
        const fallbackCol = GP_COLORS[i % GP_COLORS.length];
        const baseStyle = `aspect-ratio:4/3;background:${fallbackCol};background-size:cover;background-position:center;background-repeat:no-repeat;border-radius:var(--r);cursor:pointer;position:relative;transition:filter .15s;flex-shrink:0;`;
        tile.style.cssText = isGrid ? baseStyle : baseStyle + 'width:88px;';
        // Real photo URL when available
        const realInfo = (useRealGroupPhotos && i < realGroupPhotos.length) ? realGroupPhotos[i] : null;
        if(realInfo){
          tile.style.backgroundImage = `url("${realInfo.url}")`;
        }
        tile.onmouseenter = () => tile.style.filter='brightness(.88)';
        tile.onmouseleave = () => tile.style.filter='';
        // Open group photo modal — shows the blown-up photo plus group-level
        // info (cost, group notes, activity) and lets the user assign the
        // photo to a task in this group.
        tile.onclick = (ev) => {
          ev.stopPropagation();
          if(typeof openGroupPhotoDetail === 'function'){
            const walkKey = realInfo ? realInfo.walkKey : null;
            openGroupPhotoDetail(selRoomId, walkKey, i);
          }
        };
        // Walk label badge
        let walkLabel = null;
        if(useRealGroupPhotos && i < realGroupPhotos.length){
          walkLabel = realGroupPhotos[i].walkShort;
        } else if(!useRealGroupPhotos && i % 4 === 0){
          const w = WALKS[Math.floor(i/4) % WALKS.length];
          walkLabel = w.short;
        }
        if(walkLabel){
          tile.innerHTML = `<span style="position:absolute;bottom:4px;left:4px;font-size:8px;font-weight:700;letter-spacing:.04em;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.32);color:#fff">${walkLabel}</span>`;
        }
        container.appendChild(tile);
      }
    }
    buildGpTiles(gpStrip, false);
    buildGpTiles(gpGrid, true);

    if(canToggle){
      gpHdr.onclick = () => {
        gpExpanded = !gpExpanded;
        gpStrip.style.display = gpExpanded ? 'none' : 'flex';
        gpGrid.style.display = gpExpanded ? 'grid' : 'none';
        const countEl = gpHdr.querySelector('.s-count');
        if(countEl) countEl.textContent = gpExpanded ? GP_TOTAL : `${GP_PREVIEW} of ${GP_TOTAL}`;
        gpToggle.innerHTML = gpExpanded
          ? `Collapse <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 7.5L6 4.5L9 7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`
          : `See all ${GP_TOTAL} <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      };
    } else {
      // Few enough photos to fit in one row — no toggling needed; remove pointer affordance
      gpHdr.style.cursor = 'default';
    }

    gpSection.appendChild(gpHdr);
    gpSection.appendChild(gpStrip);
    gpSection.appendChild(gpGrid);
    g.appendChild(gpSection);

    // Layer panels (budget, etc.) if active
    if(LAYERS.budget){
      const panel=mk('div','layer-panel'); panel.style.margin='0 0 16px';
      const spent=room.spent, budget=room.budget;
      panel.innerHTML=`<div class="lp-head"><span class="lp-dot" style="background:var(--green)"></span>Budget</div>`;
      const pb=mk('div','lp-body');
      pb.innerHTML=`<div class="budget-bar-row"><span class="budget-bar-label">Spent</span><div class="budget-bar-track"><div class="budget-bar-fill" style="width:${pct(spent,budget)}%;background:var(--blue)"></div></div><span class="budget-bar-val">${fmt(spent)}</span></div><div class="budget-bar-row"><span class="budget-bar-label">Remaining</span><div class="budget-bar-track"><div class="budget-bar-fill" style="width:${pct(budget-spent,budget)}%;background:var(--green)"></div></div><span class="budget-bar-val">${fmt(budget-spent)}</span></div>`;
      panel.appendChild(pb); g.appendChild(panel);
    }

    // ── TASK CARDS ──
    const tasksHdr = sh('Tasks', room.taskList.length);
    g.appendChild(tasksHdr);

    room.taskList.forEach((task, ti)=>{
      // Contractor filter — hide tasks not assigned to active contractor
      if(!taskMatchesCtor(task)) return;

      // Collect REAL photos for this task across all walks (preserves walk origin)
      const realPhotos = [];
      WALKS.forEach(w => {
        const ps = getWalkPhotos(selRoomId, task.id, w.id);
        ps.forEach((url, idx) => realPhotos.push({ url, walkId:w.id, walk:w, idx }));
      });
      const useRealPhotos = realPhotos.length > 0;

      const photoCount = useRealPhotos ? realPhotos.length : TASK_COUNTS[ti % TASK_COUNTS.length];
      const palette = TASK_PALETTES[ti % TASK_PALETTES.length];
      // Show up to 8 tiles; last tile shows overflow count if more
      const tilesToShow = Math.min(photoCount, 8);

      const card = mk('div','');
      const approvedBorderColor = task.done ? 'var(--green)' : color;
      const approvedBg = task.done ? 'rgba(96,146,108,.04)' : 'var(--bg-card)';
      card.style.cssText = `background:${approvedBg};border:1px solid var(--border);border-left:4px solid ${approvedBorderColor};border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:box-shadow .15s;margin-bottom:8px`;
      card.onmouseenter = () => card.style.boxShadow='0 2px 10px rgba(0,0,0,.07)';
      card.onmouseleave = () => card.style.boxShadow='';
      card.onclick = () => pickTask(selRoomId, task);

      // Photo grid
      const photoGrid = mk('div','');
      photoGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:2px;border-bottom:1px solid var(--border)';
      // Get attribution for this task — use first available walk
      const firstWalkWithAttr = WALKS.find(w => getWalkPhotos(selRoomId, task.id, w.id).length);
      const taskAttr = firstWalkWithAttr ? getAttr(selRoomId, task.id, firstWalkWithAttr.id) : DEFAULT_ATTR;
      for(let i=0;i<tilesToShow;i++){
        const tile = mk('div','');
        const tileBg = palette[i % palette.length];
        tile.style.cssText = `aspect-ratio:4/3;background:${tileBg};position:relative;cursor:pointer;transition:filter .15s;background-size:cover;background-position:center;background-repeat:no-repeat`;
        // Use real photo if available for this slot
        if(useRealPhotos && i < realPhotos.length){
          tile.style.backgroundImage = `url("${realPhotos[i].url}")`;
        }
        tile.onmouseenter = () => tile.style.filter='brightness(.88)';
        tile.onmouseleave = () => tile.style.filter='';
        if(i===tilesToShow-1 && photoCount > tilesToShow){
          tile.innerHTML = `<div style="position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff">+${photoCount - tilesToShow + 1}</div>`;
        } else if(i === 0) {
          // Show icon-only attr badge on first tile only
          tile.innerHTML = attrBadge(taskAttr, true);
        }
        // Open photo overlay — stop propagation so card.onclick doesn't fire
        tile.onclick = e => {
          e.stopPropagation();
          // Prefer the walk this specific tile came from when real photos are present
          if(useRealPhotos && i < realPhotos.length){
            const rp = realPhotos[i];
            openPhotoDetail(selRoomId, task.id, rp.walkId, rp.idx);
            return;
          }
          for(const w of WALKS){
            const ps = getWalkPhotos(selRoomId, task.id, w.id);
            if(ps.length){ openPhotoDetail(selRoomId, task.id, w.id, 0); return; }
          }
        };
        photoGrid.appendChild(tile);
      }
      card.appendChild(photoGrid);

      // Task info row
      const infoRow = mk('div','');
      infoRow.style.cssText = 'padding:9px 14px;display:flex;align-items:center;gap:10px;';
      infoRow.innerHTML = `
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:${task.done?'var(--t3)':'var(--t1)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${task.name}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px">
            <span style="font-size:11px;color:var(--t3)">${task.assign}</span>
            ${task.issue?`<span class="chip chip-iss">${ICON_CO} Change order</span>`:''}
            ${task.modifier?`<span class="chip chip-pend">${task.modifier}</span>`:''}
          </div>
        </div>`;

      // Circular approve toggle — compact, non-navigating
      const toggle = mk('button', `task-appr-toggle${task.done?' approved':''}`);
      toggle.title = task.done ? 'Approved' : 'Approve task';
      toggle.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      toggle.onclick = e => {
        e.stopPropagation();
        task.done = !task.done;
        render();
      };
      infoRow.appendChild(toggle);
      card.appendChild(infoRow);

      // Layer data rows
      const anyTaskLayer = Object.values(LAYERS).some(v=>v);
      if(anyTaskLayer){
        const tlr = mk('div','task-layer-rows');
        tlr.style.borderTop = '1px solid var(--border)';
        if(LAYERS.budget) tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label">Cost</span><span class="tlr-value green">${fmt(task.cost)}</span></div>`;
        if(LAYERS.contractor) tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label">Contractor</span><span class="tlr-value">${task.assign}</span></div>`;
        if(LAYERS.materials){
          const mats = (TASK_MATERIALS[task.id]||[]);
          const products = mats.filter(m=>m.type==='material');
          const labor = mats.filter(m=>m.type==='labor');
          if(mats.length){
            let matHtml = '<div class="task-layer-row" style="align-items:flex-start"><span class="tlr-label" style="padding-top:2px">Materials</span><span class="tlr-value" style="display:flex;flex-direction:column;gap:3px">';
            products.forEach(m=>{ matHtml+=`<span style="font-size:11px;color:var(--t1)">${m.name} <span style="color:var(--t3)">× ${m.qty} ${m.unit}</span></span>`; });
            labor.forEach(m=>{ matHtml+=`<span style="font-size:11px;color:var(--t3);font-style:italic">${m.name} — ${m.qty} ${m.unit}</span>`; });
            matHtml+='</span></div>';
            tlr.innerHTML+=matHtml;
          }
        }
        if(LAYERS.modifier) tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label">Modifier</span><span class="tlr-value">${task.modifier?`<span class="tlr-chip" style="background:rgba(212,160,23,.15);color:#7a5a00">${task.modifier}</span>`:'—'}</span></div>`;
        if(LAYERS.changes) tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label" ${task.issue?'style="color:var(--red)"':''}>Change order</span><span class="tlr-value ${task.issue?'red':''}">${task.issue?task.issue.substring(0,60)+(task.issue.length>60?'…':''):'None'}</span></div>`;
        if(LAYERS.notes) tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label">Note</span><span class="tlr-value" style="font-style:italic;color:var(--t2)">${task.notes?'"'+task.notes.substring(0,55)+(task.notes.length>55?'…':'')+'"':'—'}</span></div>`;
        if(LAYERS.activity) tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label">Last action</span><span class="tlr-value" style="color:var(--t2)">Marcus W. uploaded photos · 2h ago</span></div>`;
        if(LAYERS.status){
          const _st = getTaskStatus(task);
          const _stColors = {
            rework:     'background:rgba(212,90,40,.15);color:#a04020',
            completed:  'background:rgba(96,146,108,.15);color:#1f6e3f',
            notstarted: 'background:rgba(140,140,140,.18);color:#555',
            progress:   'background:rgba(46,125,143,.15);color:#1f5b6b',
          };
          tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label">Status</span><span class="tlr-value"><span class="tlr-chip" style="${_stColors[_st.key]||_stColors.progress};display:inline-flex;align-items:center;gap:5px">${ICON_STATUS(_st.key,12)}${_st.label}</span></span></div>`;
        }

        // Attention items — gated by layer toggles
        const taskAttn = getAttentionItems(selRoomId, task.id);
        if(LAYERS.unassigned && task.assign === 'Unassigned')
          tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label" style="color:#b34d00">${ICON_HARDHAT} Unassigned</span><span class="tlr-value" style="color:#b34d00">No contractor assigned</span></div>`;
        if(LAYERS.onhold && taskAttn.outOfStock.length)
          tlr.innerHTML+=`<div class="task-layer-row"><span class="tlr-label" style="color:var(--red)">${ICON_TAG} Out of stock</span><span class="tlr-value" style="color:var(--red)">${taskAttn.outOfStock.map(m=>m.name).join(', ').substring(0,50)}</span></div>`;
        if(tlr.innerHTML) card.appendChild(tlr);
      }

    // ── STACKED "ALL GROUPS" FEED ─────────────────────────────────────────

  // ── TASK: side-by-side walk comparison for this single task ─────────────
  if(zoom===2&&selTask){
    const room=ROOMS[selRoomId], task=selTask, color=RC[selRoomId];

    // ── TABLE VIEW ──
    if(viewMode==='table'){

      // Walk for walk-date / field user — pick the most recent with photos
      const walkForMeta = WALKS.slice().reverse().find(w=>getWalkPhotos(selRoomId,task.id,w.id).length) || WALKS[0];

      // ── Title + Group (mirrors photo panel header) ──

          <tr style="background:var(--bg-card)">
            <td colspan="2" style="padding:16px 14px 4px">

          </tr>
          <tr style="background:var(--bg-card)">
            <td style="padding:2px 14px 14px;width:130px;font-size:12px;color:var(--t3)">Group</td>

          ${row('Status', `<span style="color:${statusColor};font-weight:500">${statusText}</span>`)}
          ${row('Phase', room.phase)}
          ${row('Walk date', `<span style="font-family:var(--mono)">${walkForMeta.date}</span>`)}
          ${row('Field user', walkForMeta.conductor)}
          ${divRow()}

          ${secHdr('Contractor')}
          ${row('Name', task.assign==='Unassigned'?`<span style="color:#b34d00">${task.assign}</span>`:task.assign)}
          ${row('Labor rate', laborItems.length?`<span style="font-family:var(--mono)">$${laborItems[0].unitPrice}/hr</span>`:'—')}
          ${row('Labor hrs', `<span style="font-family:var(--mono)">${laborItems.reduce((s,l)=>s+l.qty,0)} hrs</span>`)}
          ${row('Labor cost', `<span style="font-family:var(--mono);color:var(--green);font-weight:600">${fmt(totalLaborCost)}</span>`)}
          ${divRow()}

          ${secHdr('Financials')}
          ${row('Labor', `<span style="font-family:var(--mono)">${fmt(totalLaborCost)}</span>`)}
          ${row('Materials', `<span style="font-family:var(--mono)">${fmt(totalMatCost)}</span>`)}
          ${divRow()}
          ${row('Task total', `<span style="font-family:var(--mono);font-weight:700;color:var(--green)">${fmt(task.cost)}</span>`)}
          ${divRow()}

          ${secHdr('Materials')}
          ${products.length ? products.map(p => `
            <tr>
              <td style="padding:8px 14px;font-size:12px;color:var(--t2);vertical-align:top">${p.name}</td>
              <td style="padding:8px 14px;font-size:12px;color:var(--t1)">
                <span style="font-family:var(--mono);color:var(--t2)">${p.qty} ${p.unit}</span>
                <span style="color:var(--t3);font-size:11px;margin-left:8px">${p.vendor||''}</span>

        </tbody>`;

      dtw.appendChild(tbl);

      // ── Activity & Notes ──
      const ACT_DATA_MAP = {
        '50001': [
          { time:'Feb 3, 2026',  who:'Sarah M.',  dot:'green',  action:'Approved task — demolition complete, site clean' },
          { time:'Feb 2, 2026',  who:'Marcus W.', dot:'',       action:'Uploaded 3 final demolition photos' },
          { time:'Feb 2, 2026',  who:'Marcus W.', dot:'',       action:'Confirmed plumbing behind east wall is intact — no damage' },
          { time:'Jan 28, 2026', who:'Inspector', dot:'purple', action:'Added note: caution around east wall — active plumbing supply line' },
          { time:'Jan 20, 2026', who:'Marcus W.', dot:'',       action:'Uploaded 4 progress photos — cabinets removed, subfloor exposed' },

          { time:'Mar 5, 2026',  who:'Marcus W.', dot:'',       action:'Uploaded 5 photos documenting water damage extent' },
          { time:'Mar 4, 2026',  who:'Inspector', dot:'purple', action:'Added note: water damage limited to 3 sq ft — recommend targeted repair' },
          { time:'Mar 3, 2026',  who:'Diana R.',  dot:'red',    action:'Flagged water damage behind sink cabinet — subfloor soft' },
          { time:'Feb 28, 2026', who:'Marcus W.', dot:'',       action:'Uploaded 3 progress photos — cabinet carcasses installed' },

        { time:'Feb 14, 2026', who:'Diana R.', dot:'red',    action:'Flagged issue: '+(task.issue||'See change order') },
        { time:'Feb 3, 2026',  who:'Marcus W.',dot:'',       action:'Marked task in progress' },

      const actDiv = mk('div','');
      actDiv.style.cssText = 'margin-top:16px';
      const actHdrDiv = mk('div','s-hdr');
      actHdrDiv.innerHTML = '<span class="s-title">Activity & notes</span><span class="s-line"></span>';

      coverTbl.className = 'dt';
      coverTbl.style.width = '100%';
      coverTbl.innerHTML = `<thead><tr>
        ${coverWalks.map(w=>`<th><span style="display:flex;align-items:center;gap:5px">

      </tr></thead><tbody><tr>
        ${coverWalks.map(w=>{
          const ps = getWalkPhotos(selRoomId, task.id, w.id);
          if(!ps.length) return `<td style="padding:10px"><span style="color:var(--t3);font-size:11px">—</span></td>`;
          const attr = getAttr(selRoomId, task.id, w.id);
          return `<td style="padding:8px 10px">
            <div style="position:relative;width:100%;aspect-ratio:4/3;border-radius:var(--r);overflow:hidden;cursor:pointer;min-width:80px" onclick="openPhotoDetail('${selRoomId}','${task.id}','${w.id}',0)">
              <div style="width:100%;height:100%;background:url(${ps[0]}) center/cover;filter:brightness(.82)"></div>
              ${ps.length>1?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28)"><span style="font-size:14px;font-weight:600;color:#fff">${ps.length}</span></div>`:''}
              ${attrBadge(attr)}

          </td>`;

      </tr></tbody>`;
      dtw.appendChild(coverTbl);
      body.appendChild(dtw);
      return;
    }
    // Prominent task title heading — same style as the stacked feed's per-
    // task cards below so the user reads "Task: <task name>" at the top of
    // the page, matching the section-heading hierarchy of everything below.
    // The group name sits above the task name as a clickable back-link so
    // the user can jump up to the group-level page in one click.
    const _taskHdr = mk('div','');
    _taskHdr.style.cssText = 'margin:0 18px 18px;padding:0';
    _taskHdr.innerHTML =
      '<div style="height:5px;background:'+color+';border-radius:3px;margin-bottom:12px;opacity:.85"></div>' +
      '<div style="display:flex;align-items:baseline;gap:10px;padding:0 2px">' +
        '<span style="font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:'+color+'">▸ Task</span>' +
        '<div style="flex:1;height:1px;background:var(--border)"></div>' +
        '<span style="font-size:11px;color:var(--t3);font-family:var(--mono)">'+(task.cost?fmt(task.cost):'')+'</span>' +
      '</div>' +
      '<button type="button" id="__task-hdr-grp-link" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:8px 2px 0;margin:0;cursor:pointer;color:var(--t3);font:inherit;font-family:var(--font);text-align:left">' +
        '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" style="flex-shrink:0"><path d="M7.5 2L3.5 6l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:'+color+';display:inline-block"></span><span style="font-size:13px;font-weight:500;letter-spacing:-.005em">'+(room.name||'')+'</span></span>' +
      '</button>' +
      '<h2 style="font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.02em;line-height:1.25;margin:4px 0 0;padding:0 2px">'+task.name+'</h2>';
    body.appendChild(_taskHdr);
    // Wire the group back-link — clearing selTask + setZoom(1) takes the
    // user up one level to that group's full task list view.
    const _grpLinkBtn = _taskHdr.querySelector('#__task-hdr-grp-link');
    if(_grpLinkBtn){
      _grpLinkBtn.addEventListener('mouseenter', () => {
        _grpLinkBtn.style.color = 'var(--t1)';
        const dot = _grpLinkBtn.querySelector('span > span:first-child');
      });
      _grpLinkBtn.addEventListener('mouseleave', () => {
        _grpLinkBtn.style.color = 'var(--t3)';
      });
      _grpLinkBtn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        selTask = null;
        if(typeof setZoom === 'function') setZoom(1);
        else if(typeof render === 'function') render();
      });
    }

    const GP_STRIP_COLORS = {
      initial_scope: ['#C9C0B0','#BEB5A5','#D4CCB8','#C4BBA8'],
      progress_1:    ['#A8C4B8','#91AFA3','#BDD1C8','#96B8AE'],
      progress_2:    ['#B8C4C0','#A3B0AC','#C5D0CC','#96A8A4'],
      change_order:  ['#D4B8B0','#C0A09A','#DCC8C4'],
      close_out:     ['#B8C8B0','#A4B49C','#C8D8C0','#A8BEA0'],
    };
    const WALK_ORDER_STRIP = ['initial_scope','progress_1','change_order','progress_2','close_out'];
    const GP_KEY_MAP = { initial_scope:'initial', progress_1:'p1', change_order:null, progress_2:'p2', close_out:'final' };
    const gpRoomData = (typeof GROUP_PHOTOS !== 'undefined' && GROUP_PHOTOS[selRoomId]) || {};

    const stripTiles = [];
    WALK_ORDER_STRIP.forEach(wid => {
      const walk = WALKS.find(w => w.id === wid);
      if(!walk) return;
      const gpKey = GP_KEY_MAP[wid];
      const realPhotos = (gpKey && Array.isArray(gpRoomData[gpKey])) ? gpRoomData[gpKey] : [];
      const grpAttr = getGroupAttr(selRoomId, wid);
      if(realPhotos.length){
        realPhotos.forEach((url, i) => {
          stripTiles.push({ url, color:null, walk, walkId:wid, gpKey, idxInWalk:i, attr:grpAttr, isFirstOfWalk:i===0 });
        });
      } else {
        const pal = GP_STRIP_COLORS[wid] || ['#C9BFB3'];
        pal.forEach((col, i) => {
          stripTiles.push({ url:null, color:col, walk, walkId:wid, gpKey:null, idxInWalk:i, attr:grpAttr, isFirstOfWalk:i===0 });

    });
    const stripTotal = stripTiles.length;
    const stripPreview = Math.min(6, stripTotal);

    const gpStripOuter = mk('div','');
    gpStripOuter.style.cssText = 'flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border)';

    const gpStripHdr = mk('div','');
    gpStripHdr.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 18px 6px;';
    gpStripHdr.innerHTML = `
      <span style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)">Group photos</span>
      <span id="gp-strip-count" style="font-size:10px;color:var(--t3);font-family:var(--mono)">${stripPreview} of ${stripTotal}</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>

    function _mountStripTile(container, t, isGrid){

      if(t.url) tile.style.backgroundImage = `url("${t.url}")`;

        const labelPos  = isGrid ? 'bottom:4px;left:4px' : 'bottom:6px;left:6px';

        ev.stopPropagation();

      ps.forEach((url, idx) => tpAll.push({ url, walk:w, idx, isFirstOfWalk: idx===0 }));

    const tpOuter = mk('div','');

      empty.textContent = 'No photos uploaded for this task yet.';
      tpRow.appendChild(empty);
    } else {
      tpAll.forEach(item => {
        const tile = mk('div','');
        tile.style.cssText = `flex-shrink:0;width:130px;aspect-ratio:4/3;background:var(--bg-2) url("${item.url}") center/cover no-repeat;border-radius:var(--r);position:relative;cursor:pointer;transition:filter .15s;overflow:hidden`;
        tile.onmouseenter = () => tile.style.filter='brightness(.88)';
        tile.onmouseleave = () => tile.style.filter='';
        tile.onclick = () => openPhotoDetail(selRoomId, task.id, item.walk.id, item.idx);
        const attr = getAttr(selRoomId, task.id, item.walk.id);
        if(item.isFirstOfWalk){
          tile.innerHTML = `<div style="position:absolute;bottom:6px;left:6px;background:rgba(29,29,29,.72);backdrop-filter:blur(4px);color:#fff;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:.02em;white-space:nowrap">${item.walk.short}</div>${attrBadge(attr, true)}`;

    tpOuter.appendChild(tpRow);
