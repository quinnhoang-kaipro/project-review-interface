.gf-td-add:hover { color:var(--t1); border-color:var(--t2); background:var(--bg-2); }
.gf-td-product {
  grid-column:1 / -1;
  margin-top:4px; padding-top:8px; border-top:1px dashed var(--border);
  display:flex; flex-direction:column; gap:2px;
}
.gf-td-product-title { font-size:11.5px; color:var(--t1); line-height:1.35; }
.gf-td-product-meta  { font-family:var(--mono); font-size:10px; color:var(--t3); }
.gf-td-notes {
  grid-column:1 / -1;
  margin-top:4px; padding:6px 8px;
  background:var(--bg-2); border-left:2px solid var(--border-mid);
  border-radius:0 var(--rm) var(--rm) 0;
  font-size:11.5px; color:var(--t2); line-height:1.4;
}
.gf-td-issue {
  grid-column:1 / -1;
  margin-top:4px; padding:6px 8px;
  background:rgba(177,69,65,.06); border:1px solid rgba(177,69,65,.25);
  border-radius:var(--rm);
  font-size:11.5px; color:var(--red); line-height:1.4;
}
.gf-actions {
  display:flex; gap:6px;
  padding:8px 10px;
  border-top:1px solid var(--border);
  background:var(--bg);
}
.gf-card:not(.expanded) .gf-actions { display:none; }
.gf-action {
  border:1px solid var(--border-mid);
  border-radius:6px; cursor:pointer;
  font-family:var(--font); font-size:11px; font-weight:600;
  padding:6px 10px; line-height:1; white-space:nowrap;
  transition:background .12s, color .12s, border-color .12s;
}
.gf-action.approve {
  border-color:var(--green); background:var(--green); color:#fff;
  flex:1;
}
.gf-action.approve:hover { opacity:.9; }
.gf-action.new-task {
  background:var(--bg-card); color:var(--t2);
}
.gf-action.new-task:hover { background:var(--bg-2); color:var(--t1); }
/* Compact icon-only variant — used for "+ New task" so the row fits an
   extra Request edit button. */
.gf-action.gf-action-icon {
  width:30px; flex:0 0 auto; padding:0; display:inline-flex;
  align-items:center; justify-content:center;
  position:relative;
}
/* Request edit button — neutral pill matching the Approve group sibling. */
.gf-action.gf-action-edit {
  background:var(--bg-card); color:var(--t1);
  border-color:var(--border-mid);
}
.gf-action.gf-action-edit:hover {
  background:var(--bg-2); border-color:var(--charcoal); color:var(--t1);
}
/* Action row inside an expanded task — Approve / Request edit / Delete. */
.gf-task-actions {
  display:flex; gap:6px; padding:8px 0 2px;
  border-top:1px dashed var(--border); margin-top:8px;
}
.gf-task-action {
  flex:1; border:1px solid var(--border-mid); background:var(--bg-card);
  border-radius:6px; cursor:pointer; font-family:var(--font);
  font-size:11px; font-weight:600; color:var(--t1); padding:6px 8px;
  line-height:1; white-space:nowrap;
  transition:background .12s, color .12s, border-color .12s;
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
}
.gf-task-action:hover { background:var(--bg-2); border-color:var(--charcoal); }
.gf-task-action.approve {
  background:var(--green); border-color:var(--green); color:#fff;
}
.gf-task-action.approve:hover { opacity:.9; background:var(--green); }
.gf-task-action.delete {
  color:var(--red); border-color:rgba(177,69,65,.35); background:var(--bg-card);
}
.gf-task-action.delete:hover { background:#fef2f2; border-color:var(--red); color:var(--red); }
/* Trade name caption shown under the Contractor card title in
   Trade/Contractor view. */
.gf-trade-caption {
  font-size:10.5px; color:var(--t3); font-weight:500;
  letter-spacing:.01em; padding:8px 14px 10px;
}
/* Custom hover tooltip for icon-only buttons (matches Grid file). */
.rp-add-btn { position:relative; }
.rp-add-btn[title]::after,
#rp-approval button[title]::after {
  content: attr(title);
  position:absolute; left:50%; transform:translateX(-50%);
  top:calc(100% + 6px);
  background:var(--charcoal); color:#fff;
  font-family:var(--font); font-size:10.5px; font-weight:500;
  padding:4px 8px; border-radius:4px; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity .12s; z-index:100;
}
.rp-add-btn:hover::after,
#rp-approval button:hover::after { opacity:1; }
#rp-approval button { position:relative; }
.bp-walk-pill {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:14px; font-size:11px;
  font-weight:500; color:var(--bp-text); font-family:var(--font);
  background:rgba(255,255,255,.5); border:1px solid rgba(0,0,0,.1);
  cursor:pointer; transition:background .12s;
}
.bp-walk-pill.active { background:rgba(255,255,255,.9); color:var(--charcoal); font-weight:600; border-color:rgba(0,0,0,.18); }
.bp-walk-pill:hover:not(.active) { background:rgba(255,255,255,.7); }


/* ── UNASSIGNED MEDIA ── */
.unassigned-section { margin:0 24px 28px; border:1.5px dashed var(--border-mid); border-radius:var(--rl); overflow:hidden; }
.unassigned-hdr { display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-2);border-bottom:1px dashed var(--border-mid); }
.unassigned-dot { width:8px;height:8px;border-radius:50%;border:2px dashed var(--t3);flex-shrink:0; }
.unassigned-tiles { display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:10px; }
.unassigned-tile { aspect-ratio:4/3;border-radius:var(--r);position:relative;cursor:pointer;transition:filter .15s;border:2px dashed var(--border-mid);background-size:cover;background-position:center; }
.unassigned-tile:hover { filter:brightness(.88); }
.unassigned-tile img { width:100%;height:100%;object-fit:cover;display:block; }
.assign-panel { position:fixed;top:0;right:0;bottom:0;width:400px;z-index:500;background:var(--bg-card);border-left:1px solid var(--border-mid);box-shadow:-8px 0 32px rgba(0,0,0,.1);display:flex;flex-direction:column; }
.assign-panel-hdr { display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0; }
.assign-panel-photo { width:100%;aspect-ratio:16/9;background:var(--bg-2);overflow:hidden;flex-shrink:0; }
.assign-panel-photo img { width:100%;height:100%;object-fit:cover;display:block; }
.assign-panel-body { flex:1;overflow-y:auto;padding:14px 16px; }
.assign-room-btn { display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rm);border:1px solid var(--border);background:none;font-family:var(--font);cursor:pointer;width:100%;text-align:left;margin-bottom:6px;transition:border-color .12s,background .12s; }
.assign-room-btn:hover { background:var(--bg-2);border-color:var(--border-mid); }
.assign-room-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
.assign-task-btn { display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--rm);border:1px solid var(--border);background:none;font-family:var(--font);cursor:pointer;width:100%;text-align:left;margin-bottom:5px;transition:border-color .12s,background .12s; }
.assign-task-btn:hover { background:var(--bg-2);border-color:var(--border-mid); }

.cmp-body { display:flex; flex:1; min-height:0; overflow:hidden; }
.cmp-pane { flex:1; display:flex; flex-direction:column; min-width:0; border-right:2px solid var(--border-mid); }
.cmp-pane:last-child { border-right:none; }
.cmp-pane-hdr { display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--bg-card); border-bottom:1px solid var(--border); flex-shrink:0; position:relative; }
.cmp-pane-label { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--t3); flex-shrink:0; }
.cmp-walk-sel { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; background:var(--bg-2); border:1px solid var(--border-mid); font-size:12px; font-weight:500; color:var(--t1); cursor:pointer; font-family:var(--font); transition:background .12s; }
.cmp-walk-sel:hover { background:var(--bg); }
.cmp-walk-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cmp-walk-dd { position:absolute; top:calc(100% + 4px); left:14px; z-index:300; background:var(--bg-card); border:1px solid var(--border-mid); border-radius:var(--rl); box-shadow:0 4px 20px rgba(0,0,0,.12); min-width:200px; overflow:hidden; }
.cmp-walk-dd-item { display:flex; align-items:center; gap:8px; padding:9px 14px; font-size:12px; cursor:pointer; border-bottom:1px solid var(--border); color:var(--t1); background:none; border-left:none; border-right:none; font-family:var(--font); width:100%; text-align:left; transition:background .1s; }
.cmp-walk-dd-item:last-child { border-bottom:none; }
.cmp-walk-dd-item:hover:not(.disabled) { background:var(--bg-2); }
.cmp-walk-dd-item.active { font-weight:600; }
.cmp-walk-dd-item.disabled { opacity:.3; cursor:default; pointer-events:none; }
.cmp-scroll { flex:1; overflow-y:auto; padding:14px 16px; }
.cmp-scroll::-webkit-scrollbar { width:4px; }
.cmp-scroll::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:2px; }
.cmp-group-hdr { display:flex; align-items:center; gap:7px; padding:7px 0 5px 8px; border-left:3px solid transparent; margin-top:14px; }
.cmp-group-hdr:first-child { margin-top:0; }
.cmp-group-name { font-size:12px; font-weight:600; color:var(--t1); }
.cmp-group-meta { font-size:11px; color:var(--t3); }
.cmp-photo-row { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:6px; }
.cmp-tile { position:relative; border-radius:var(--r); overflow:hidden; cursor:pointer; background:var(--bg-2); flex-shrink:0; transition:filter .15s; }
.cmp-tile:hover { filter:brightness(.88); }
.cmp-tile img { width:100%; height:100%; object-fit:cover; display:block; }
.cmp-tile-co { position:absolute; top:0; left:0; width:0; height:0; border-style:solid; border-color:var(--red) transparent transparent transparent; pointer-events:none; }
.cmp-task-hdr { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--t2); margin:8px 0 3px 6px; }
.cmp-task-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.cmp-empty-walk { display:flex; align-items:center; justify-content:center; height:40px; font-size:11px; color:var(--t3); font-style:italic; margin-left:6px; }
.cmp-task-data { padding:10px 12px; background:var(--bg-2); border-radius:var(--rm); margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; }
.cmp-data-lbl { font-size:10px; color:var(--t3); margin-bottom:1px; }
.cmp-data-val { font-size:12px; font-weight:500; color:var(--t1); }
.cmp-section-div { height:1px; background:var(--border); margin:12px 0 8px; }

/* ── TIMELINES COMPARE VIEW (Task 2 shell) ───────────────────────────────
   All compare-view styles are scoped under .tl-root so they don't leak
   into any of Kai's other views. Uses only Kai's design tokens. */
.tl-root { display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; font-family:var(--font); color:var(--t1); background:#F7F5F0; }

.tl-root .tl-head { display:grid; grid-template-columns:88px 1fr 1fr 1fr; column-gap:10px; padding:14px 18px 10px; border-bottom:1px solid var(--border); flex-shrink:0; align-items:stretch; background:#F7F5F0; }
.tl-root .tl-head-label { font-size:10.5px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.08em; display:flex; align-items:flex-end; padding-bottom:6px; }
.tl-root .tl-col-head { font-size:12px; font-weight:500; color:var(--t2); padding:4px 8px; text-align:left; display:flex; align-items:center; gap:8px; min-width:0; border:1px solid var(--border); border-radius:var(--rm); background:#F7F5F0; min-height:40px; }
.tl-root .tl-col-head .tl-col-badge { font-family:var(--mono); font-size:9.5px; color:var(--t3); border:1px solid var(--border); padding:1px 6px; border-radius:999px; letter-spacing:.04em; text-transform:uppercase; flex-shrink:0; }
.tl-root .tl-col-head.current { color:var(--t1); font-weight:600; background:var(--bg-2); border-color:var(--border-mid); }
.tl-root .tl-col-head.current .tl-col-badge { background:var(--charcoal); color:#fff; border-color:var(--charcoal); }
/* Slot label inside a prev/current/next header — shows the group name (for
   a group slot) or "task · group" (for a task slot). Truncates with ellipsis
   so long names don't stretch the column. */
.tl-root .tl-col-label { flex:1; min-width:0; font-size:12px; display:flex; flex-direction:column; gap:1px; line-height:1.25; }
.tl-root .tl-col-title { color:var(--t1); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tl-root .tl-col-head.current .tl-col-title { font-weight:600; }
.tl-root .tl-col-meta { font-family:var(--mono); font-size:9.5px; color:var(--t3); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tl-root .tl-col-empty { color:var(--t3); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
/* Navigation arrow buttons — < on the Prev column, > on the Next column. */
.tl-root .tl-col-nav { flex-shrink:0; width:26px; height:26px; border-radius:999px; background:var(--bg-card); border:1px solid var(--border); color:var(--t2); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; padding:0; transition:background .12s, color .12s, border-color .12s, transform .12s; }
.tl-root .tl-col-head.current .tl-col-nav { background:var(--bg-card); }
.tl-root .tl-col-nav:hover:not(:disabled) { background:var(--bg-2); color:var(--t1); border-color:var(--border-mid); transform:scale(1.06); }
.tl-root .tl-col-nav:disabled { opacity:.35; cursor:not-allowed; }

/* ── Bottom slider — scrubs through the full slot list (groups + tasks) ── */
.tl-root .tl-nav-slider { flex-shrink:0; padding:12px 18px 14px; border-top:1px solid var(--border); background:#F7F5F0; display:flex; flex-direction:column; gap:8px; }
.tl-root .tl-nav-slider-hdr { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.tl-root .tl-nav-slider-title { font-family:var(--mono); font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.08em; }
.tl-root .tl-nav-current-label { font-size:11.5px; color:var(--t1); font-weight:500; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right; flex:1; }
.tl-root .tl-nav-current-label .tl-nav-idx { font-family:var(--mono); font-size:10px; color:var(--t3); font-weight:400; margin-left:8px; }
/* v5++: fully custom div-based scrubber. The native <input type="range">
   has been removed because its built-in pointer pipeline fought our
   custom drag state across browsers. rangeWrap is the pointer target;
   tl-nav-track is the visible rail; tl-nav-thumb is the grab handle. */
.tl-root .tl-nav-range-wrap { position:relative; padding:10px 0 8px; cursor:pointer; touch-action:none; user-select:none; -webkit-user-select:none; }
.tl-root .tl-nav-track { position:relative; height:6px; border-radius:999px; background:var(--bg-2); border:1px solid var(--border); overflow:visible; }
.tl-root .tl-nav-track-fill { position:absolute; left:0; top:0; bottom:0; width:var(--tl-nav-fill, 0%); background:var(--border-mid); border-radius:999px 0 0 999px; }
.tl-root .tl-nav-thumb { position:absolute; top:50%; left:var(--tl-nav-fill, 0%); width:16px; height:16px; border-radius:50%; background:var(--charcoal); border:2px solid var(--bg-card); box-shadow:0 0 0 1px var(--charcoal), 0 1px 3px rgba(0,0,0,.25); transform:translate(-50%, -50%); pointer-events:none; }
.tl-root .tl-nav-slider.is-scrubbing .tl-nav-thumb { transform:translate(-50%, -50%) scale(1.08); }
/* v5: floating tooltip that rides above the slider thumb while scrubbing.
   Replaces the right-corner "tl-nav-current-label" for the duration of a
   drag, so the active group/task name tracks the mouse instead. */
.tl-root .tl-nav-float-label {
  position:absolute; left:0; top:-4px;
  transform:translate(-50%, -100%);
  padding:5px 10px;
  background:var(--charcoal); color:#fff;
  font-size:11.5px; font-weight:500; line-height:1.25;
  border-radius:var(--rm);
  white-space:nowrap;
  box-shadow:0 4px 12px rgba(0,0,0,.22);
  pointer-events:none;
  opacity:0; visibility:hidden;
  transition:opacity .12s ease, visibility 0s linear .12s;
  z-index:20;
}
.tl-root .tl-nav-float-label::after {
  content:''; position:absolute; top:100%; left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:var(--charcoal);
}
.tl-root .tl-nav-float-label .tl-nav-float-idx {
  font-family:var(--mono); font-size:10px; opacity:.7; margin-left:6px; font-weight:400;
}
.tl-root .tl-nav-slider.is-scrubbing .tl-nav-float-label {
  opacity:1; visibility:visible; transition:opacity .12s ease, visibility 0s linear 0s;
}
.tl-root .tl-nav-slider.is-scrubbing .tl-nav-slider-title,
.tl-root .tl-nav-slider.is-scrubbing .tl-nav-current-label { visibility:hidden; }
.tl-root .tl-nav-range { width:100%; appearance:none; -webkit-appearance:none; height:6px; border-radius:999px; background:linear-gradient(to right, var(--border-mid) 0%, var(--border-mid) var(--tl-nav-fill, 0%), var(--bg-2) var(--tl-nav-fill, 0%), var(--bg-2) 100%); border:1px solid var(--border); outline:none; cursor:pointer; margin:0; display:block; pointer-events:none; }
.tl-root .tl-nav-range::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:16px; height:16px; border-radius:50%; background:var(--charcoal); border:2px solid var(--bg-card); box-shadow:0 0 0 1px var(--charcoal), 0 1px 3px rgba(0,0,0,.25); cursor:grab; margin-top:0; }
.tl-root .tl-nav-range::-webkit-slider-thumb:active { cursor:grabbing; transform:scale(1.08); }
.tl-root .tl-nav-range::-moz-range-thumb { width:16px; height:16px; border-radius:50%; background:var(--charcoal); border:2px solid var(--bg-card); box-shadow:0 0 0 1px var(--charcoal); cursor:grab; }
/* Group-boundary tick marks sit under the slider rail. */
.tl-root .tl-nav-ticks { position:relative; height:16px; margin-top:2px; pointer-events:none; }
.tl-root .tl-nav-tick { position:absolute; top:0; width:2px; height:6px; background:var(--border-mid); border-radius:1px; transform:translateX(-1px); }
.tl-root .tl-nav-tick.is-current { background:var(--charcoal); height:8px; }
/* Group-stretch labels — each group gets a horizontal segment sized by how
   many slots (group + its tasks) it covers. Truncates with ellipsis. */
.tl-root .tl-nav-groups { position:relative; height:16px; margin-top:2px; pointer-events:none; }
.tl-root .tl-nav-group-label {
  position:absolute; top:0;
  font-size:10px; line-height:16px;
  color:var(--t3);
  padding:0 6px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-align:center;
  box-sizing:border-box;
  border-left:1px solid var(--border);
  letter-spacing:.01em;
}
.tl-root .tl-nav-group-label:first-child { border-left:none; }
.tl-root .tl-nav-group-label.is-current { color:var(--t1); font-weight:500; background:var(--bg-2); border-radius:3px; }

.tl-root .tl-body { flex:1; display:flex; flex-direction:column; gap:12px; padding:14px 18px 18px; overflow:auto; transition:background-color .25s ease; }
/* v5: alternate the body tint between consecutive groups so scrubbing past a
   group boundary is visually obvious even without looking at the slider. */
.tl-root .tl-body[data-group-parity="0"] { background-color:var(--bg); }
.tl-root .tl-body[data-group-parity="1"] { background-color:var(--bg-2); }

/* One band = radio aside + 3 photo cells (prev/current/next) */
.tl-root .tl-band { display:grid; grid-template-columns:88px 1fr 1fr 1fr; gap:10px; align-items:stretch; }
.tl-root .tl-walks { position:relative; display:flex; flex-direction:column; gap:2px; padding:8px 8px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--rm); min-height:0; }
.tl-root .tl-walks-title { font-size:10px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
/* Remove-band X — only rendered on the second band. Hides Band B; an
   "+ Add date" row appears in its place and brings it back on click. */
.tl-root .tl-walks-remove { position:absolute; top:4px; right:4px; width:22px; height:22px;
  display:inline-flex; align-items:center; justify-content:center;
  background:transparent; border:none; cursor:pointer; color:var(--t3);
  border-radius:4px; transition:color .12s, background .12s; z-index:10; padding:0; }
.tl-root .tl-walks-remove:hover { color:var(--t1); background:rgba(0,0,0,.06); }
.tl-root .tl-walks-remove svg { pointer-events:none; }
/* Collapsed-B state — add-date placeholder + hide Band B / Track B */
.tl-root .tl-add-band { display:none; align-items:center; justify-content:center;
  gap:6px; height:36px; border:1px dashed var(--border-mid); border-radius:var(--rm);
  background:transparent; color:var(--t2); font:inherit; font-size:12px;
  font-weight:500; cursor:pointer; transition:color .12s, background .12s, border-color .12s; }
.tl-root .tl-add-band:hover { color:var(--t1); background:var(--bg-2); border-color:var(--t3); }
.tl-root.tl-b-hidden .tl-add-band { display:flex; }
.tl-root.tl-b-hidden .tl-band[data-band="B"] { display:none; }
.tl-root.tl-b-hidden .tl-track[data-band="B"] { display:none; }
.tl-root .tl-walk-opt { display:flex; flex-wrap:wrap; align-items:flex-start; gap:2px 6px; cursor:pointer; padding:5px 6px; border-radius:var(--r); transition:background .12s; min-width:0; }
.tl-root .tl-walk-opt:hover { background:rgba(0,0,0,.04); }
.tl-root .tl-walk-opt input[type="radio"] { accent-color:var(--charcoal); margin:2px 0 0 0; flex-shrink:0; width:12px; height:12px; }
/* Radio + name share row 1; date wraps to row 2 so everything fits in the
   now-narrow aside column. */
.tl-root .tl-walk-name { font-size:11.5px; font-weight:500; color:var(--t1); line-height:1.25; flex:1 1 0; min-width:0; white-space:normal; overflow-wrap:anywhere; }
.tl-root .tl-walk-date { font-family:var(--mono); font-size:9.5px; color:var(--t3); white-space:nowrap; flex:1 1 100%; margin-left:18px; }
/* v5: collapsed date-picker — by default, only the currently-selected walk
   is visible so the aside takes up far less space. An explicit chevron
   button toggles expanded/collapsed; picking a walk also auto-collapses. */
.tl-root .tl-walks-chev {
  display:none;
  position:absolute; top:50%; right:4px; transform:translateY(-50%);
  width:20px; height:20px;
  align-items:center; justify-content:center;
  background:transparent; border:none; padding:0;
  color:var(--t3); cursor:pointer; border-radius:4px;
  transition:background .12s, color .12s;
}
.tl-root .tl-walks-chev:hover { color:var(--t1); background:rgba(0,0,0,.06); }
.tl-root .tl-walks.is-collapsed { align-self:start; padding:28px 6px 4px 6px; gap:0; }
.tl-root .tl-walks.is-collapsed .tl-walks-title { display:none; }
.tl-root .tl-walks.is-collapsed .tl-walk-opt { display:none; }
.tl-root .tl-walks.is-collapsed .tl-walk-opt.is-selected {
  display:flex; padding:2px 4px; background:transparent !important;
  cursor:pointer; border-radius:var(--r);
}
.tl-root .tl-walks.is-collapsed .tl-walk-opt.is-selected:hover { background:rgba(0,0,0,.04) !important; }
.tl-root .tl-walks.is-collapsed .tl-walk-opt.is-selected input[type="radio"] { display:none; }
.tl-root .tl-walks.is-collapsed .tl-walk-opt.is-selected .tl-walk-name { flex:1 1 100%; }
.tl-root .tl-walks.is-collapsed .tl-walk-opt.is-selected .tl-walk-date { margin-left:0; }
.tl-root .tl-walks.is-collapsed .tl-walks-chev { display:inline-flex; top:4px; right:4px; transform:none; }
.tl-root .tl-walks:not(.is-collapsed) .tl-walks-chev { display:none; }
.tl-root .tl-band[data-band="B"] .tl-walks.is-collapsed { padding-right:6px; }
.tl-root .tl-band[data-band="B"] .tl-walks.is-collapsed .tl-walks-chev { right:28px; top:4px; }

/* Photo cells */
.tl-root .tl-cell { aspect-ratio:4/3; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--rm); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.tl-root .tl-cell.current { border-color:var(--border-mid); box-shadow:inset 0 0 0 1px var(--border-mid); }
/* Empty-state cell — distinct dashed visual so missing photos read clearly
   against cells that DO have a real photo (especially when the user is
   comparing dates side by side). */
.tl-root .tl-cell:has(.tl-cell-empty) { background:repeating-linear-gradient(135deg,var(--bg-2) 0,var(--bg-2) 10px,var(--bg) 10px,var(--bg) 20px); border-style:dashed; border-color:var(--border-mid); }
.tl-root .tl-cell-empty { font-family:var(--mono); font-size:10px; color:var(--t3); opacity:.7; text-transform:uppercase; letter-spacing:.1em; display:flex; flex-direction:column; align-items:center; gap:6px; }
.tl-root .tl-cell-empty::before { content:''; width:24px; height:24px; border:1.5px dashed var(--border-mid); border-radius:50%; display:block; opacity:.7; }
/* "No group photo" variant — taller two-line message; suppress the default
   dashed-circle indicator so the text stands on its own. */
.tl-root .tl-cell-empty-nogrp { gap:3px; padding:0 14px; text-align:center; }
.tl-root .tl-cell-empty-nogrp::before { display:none; }
.tl-root .tl-cell-empty-nogrp .tl-nogrp-title { font-family:var(--font); font-size:12px; font-weight:600; color:var(--t2); letter-spacing:0; text-transform:none; opacity:1; }
.tl-root .tl-cell-empty-nogrp .tl-nogrp-sub { font-family:var(--font); font-size:11px; font-weight:400; color:var(--t3); letter-spacing:0; text-transform:none; opacity:1; line-height:1.35; }

/* Same-task grouping — when adjacent photo cells in a band represent the
   SAME task (canonical slot + extra-photo slots), wrap them in a unified
   black "box" so it's unmistakable they're the same task. Cells in the
   middle of a run drop their inner border-radius so the box reads as one
   continuous outline. Empty (no-photo) cells in a group intentionally do
   NOT receive this treatment so they stay visually distinct (no box, no
   chip) from their photo-bearing neighbour. */
.tl-root .tl-cell.tl-cell-grp {
  border:4px solid var(--charcoal);
  overflow:visible; /* allow bridge bars to spill into the band gap */
}
.tl-root .tl-cell.tl-cell-grp.current { box-shadow:inset 0 0 0 1px var(--charcoal); }
/* Inner edges lose their corner radius so the box looks continuous across
   the band gap. The cell itself can no longer clip the image (overflow:
   visible), so we move the rounded clipping onto the <img> element. */
.tl-root .tl-cell.tl-cell-grp .tl-cell-img { border-radius:calc(var(--rm) - 4px); }
.tl-root .tl-cell.tl-cell-grp-r,
.tl-root .tl-cell.tl-cell-grp-r .tl-cell-img { border-top-right-radius:0; border-bottom-right-radius:0; }
.tl-root .tl-cell.tl-cell-grp-l,
.tl-root .tl-cell.tl-cell-grp-l .tl-cell-img { border-top-left-radius:0;  border-bottom-left-radius:0; }
/* Bridge the band gap with TWO black bars (top + bottom) drawn via a single
   pseudo-element per side so the outline visually closes around both cells.
   The pseudo-element sits in the gutter between paired cells; its top &
   bottom edges form the bars (matching the 4px cell border thickness), the
   middle is transparent. */
.tl-root .tl-cell.tl-cell-grp-r::after,
.tl-root .tl-cell.tl-cell-grp-l::before {
  content:''; position:absolute; top:-4px; bottom:-4px; width:12px;
  pointer-events:none; z-index:2;
  background: var(--charcoal);
}
.tl-root .tl-cell.tl-cell-grp-r::after  { right:-12px; }
.tl-root .tl-cell.tl-cell-grp-l::before { left:-12px;  }
.tl-root .tl-cell.tl-cell-grp-solo { border:none; }
.tl-root .tl-cell.tl-cell-grp-solo.current { box-shadow:inset 0 0 0 1px var(--border-mid); }
.tl-root .tl-cell-grp-chip {
  position:absolute; top:8px; left:8px; z-index:3;
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 7px; border-radius:10px;
  background:rgba(29,29,29,.85); color:#fff;
  font-size:9.5px; font-weight:600; letter-spacing:.02em;
  font-family:var(--font);
  box-shadow:0 1px 3px rgba(0,0,0,.18);
}

/* ── Room context cues ───────────────────────────────────────────────────
   So the user always knows which room each Compare-walks cell belongs to:
   (1) a thin coloured stripe at the very top of every cell, painted in the
       room's brand colour (--room-tint set on the cell), and
   (2) when a cell sits in a different room than the cell to its left, a
       vertical dashed divider appears in the band gap to mark the boundary.
*/
.tl-root .tl-cell[data-room-id] {
  /* 6px room-colored top stripe so the room context reads at a glance even
     when the photo dominates. Stacked with the current-selection inset
     border so both can coexist. */
  box-shadow: inset 0 6px 0 0 var(--room-tint, transparent);
}
.tl-root .tl-cell[data-room-id].current {
  box-shadow:
    inset 0 6px 0 0 var(--room-tint, transparent),
    inset 0 0 0 1px var(--border-mid);
}
/* Empty (no-photo) cells in a known room paint the diagonal-stripe
   placeholder OVER a room-tinted base, so the whole cell visibly carries
   the room's color — much stronger signal than just the top stripe. The
   cell border also picks up the room tint (still dashed to read as empty). */
.tl-root .tl-cell[data-room-id]:has(.tl-cell-empty) {
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,.55) 0,
      rgba(255,255,255,.55) 10px,
      transparent 10px,
      transparent 20px),
    color-mix(in srgb, var(--room-tint) 22%, var(--bg-2));
  border-color: color-mix(in srgb, var(--room-tint) 50%, var(--border-mid));
  border-style: dashed;
  box-shadow: inset 0 6px 0 0 var(--room-tint, transparent);
}
/* "No group photo" cells (Kitchen group overview etc.) intentionally show a
   meaningful "No group photo · See task photos" message — no top stripe
   here so the message reads on a clean colored background. */
.tl-root .tl-cell[data-room-id]:has(.tl-cell-empty-nogrp) {
  box-shadow: none !important;
}
/* Grouped (boxed) cells already paint a thick charcoal border that conflicts
   with the top stripe — drop the room stripe inside the boxed run so the
   black box stays clean. The room is still implied by the surrounding cells. */
.tl-root .tl-cell.tl-cell-grp { box-shadow:none; }
.tl-root .tl-cell.tl-cell-grp.current { box-shadow:inset 0 0 0 1px var(--charcoal); }

/* Vertical dashed divider in the band gap, drawn off the left edge of the
   cell that begins a new room. The cell is overflow:visible so the divider
   pseudo can spill into the gutter; the img picks up its own border-radius
   so the photo's corners stay rounded after losing the parent's clipping. */
.tl-root .tl-cell.tl-cell-room-bnd { overflow:visible; }
.tl-root .tl-cell.tl-cell-room-bnd .tl-cell-img { border-radius:calc(var(--rm) - 1px); }
.tl-root .tl-cell.tl-cell-room-bnd::after {
  content:'';
  position:absolute;
  left:-7px; top:-4px; bottom:-4px; width:2px;
  background-image: linear-gradient(to bottom, var(--charcoal) 60%, transparent 60%);
  background-size: 2px 9px;
  opacity:1;
  pointer-events:none;
  z-index:1;
}
/* Grouped cells own ::after for the bridge bar — boundary divider would
   collide. In practice this can't happen (grouped cells share a task and
   therefore a room) but we suppress it defensively. */
.tl-root .tl-cell.tl-cell-grp-r.tl-cell-room-bnd::after,
.tl-root .tl-cell.tl-cell-grp-l.tl-cell-room-bnd::after {
  background-image: none;
}
.tl-root .tl-cell-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
.tl-root .tl-cell-label { position:absolute; left:0; right:0; bottom:0; padding:6px 8px 7px; background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.58) 100%); color:#fff; font-size:11px; line-height:1.25; display:flex; flex-direction:column; gap:1px; pointer-events:none; }
.tl-root .tl-cell-task { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tl-root .tl-cell-walk { font-family:var(--mono); font-size:9.5px; opacity:.85; letter-spacing:.04em; text-transform:uppercase; }
.tl-root .tl-cell-room { position:absolute; top:6px; left:6px; font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; text-transform:uppercase; background:rgba(255,255,255,.85); color:var(--t1); padding:2px 6px; border-radius:999px; box-shadow:0 1px 2px rgba(0,0,0,.15); }
/* v5: per-photo overlay badges driven by the layer toggles in the top bar.
   Icon-only by default, expanding to show the label on hover so they fit
   comfortably inside smaller photo cells without clipping the border. */
.tl-root .tl-cell-badges { position:absolute; top:6px; right:6px; display:flex; flex-direction:column; gap:4px; align-items:flex-end; pointer-events:auto; max-width:80%; z-index:1; }
.tl-root .tl-cell-badge {
  font-family:var(--mono); font-size:9.5px; font-weight:600; letter-spacing:.04em;
  text-transform:uppercase; line-height:1.2;
  height:18px; min-width:18px; padding:0;
  border-radius:999px; box-shadow:0 1px 2px rgba(0,0,0,.18);
  display:inline-flex; align-items:center; justify-content:center; gap:0;
  white-space:nowrap; overflow:hidden; cursor:help;
  transition:padding .18s ease, gap .18s ease, box-shadow .12s ease;
}
.tl-root .tl-cell-badge.issue      { background:rgba(177,69,65,.92);  color:#fff; }
.tl-root .tl-cell-badge.note       { background:rgba(139,93,212,.92); color:#fff; }
.tl-root .tl-cell-badge.unassigned { background:rgba(179,100,62,.92); color:#fff; }
.tl-root .tl-cell-badge svg { width:10px; height:10px; flex-shrink:0; }
.tl-root .tl-cell-badge .tl-cell-badge-text {
  display:inline-block; max-width:0; opacity:0;
  transition:max-width .2s ease, opacity .15s ease, margin-left .2s ease;
  margin-left:0;
}
.tl-root .tl-cell-badge:hover {
  padding:0 8px 0 6px; gap:4px;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
}
.tl-root .tl-cell-badge:hover .tl-cell-badge-text {
  max-width:160px; opacity:1; margin-left:2px;
}

/* v5: rich tooltip revealed when hovering a note badge on a Compare-walks
   photo. Shows the actual note content (plus the task name it belongs to,
   or a stacked list when the badge is on a group overview). Uses
   position:fixed so it can spill outside the cell's overflow:hidden. */
.tl-root .tl-cell-note-tooltip {
  position:fixed; left:0; top:0;
  width:240px; max-width:240px;
  padding:9px 11px;
  background:#2a2a2a; color:#fff;
  border-radius:var(--rm);
  box-shadow:0 6px 18px rgba(0,0,0,.32);
  font-family:var(--font); font-size:11.5px; line-height:1.4;
  font-weight:400; letter-spacing:0; text-transform:none; text-align:left;
  white-space:normal;
  opacity:0; visibility:hidden; transform:translateY(-4px);
  transition:opacity .12s ease, transform .15s ease, visibility 0s linear .15s;
  pointer-events:none;
  z-index:9999;
}
.tl-root .tl-cell-badge.note:hover .tl-cell-note-tooltip {
  opacity:1; visibility:visible; transform:translateY(0);
  transition:opacity .15s ease, transform .15s ease, visibility 0s linear 0s;
}
.tl-root .tl-note-tip-title {
  font-family:var(--mono); font-size:9px; font-weight:600;
  text-transform:uppercase; letter-spacing:.08em;
  color:rgba(255,255,255,.6); margin-bottom:5px;
}
.tl-root .tl-note-tip-body { color:#fff; font-size:11.5px; line-height:1.4; }
.tl-root .tl-note-tip-item + .tl-note-tip-item {
  margin-top:7px; padding-top:7px;
  border-top:1px solid rgba(255,255,255,.14);
}
.tl-root .tl-note-tip-sub {
  font-family:var(--mono); font-size:9px; font-weight:600;
  color:rgba(255,255,255,.6);
  text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px;
}
.tl-root .tl-note-tip-empty {
  color:rgba(255,255,255,.5); font-style:italic;
}

/* Timeline row — spacer (left) + tracks column (right). Scrubber spans tracks. */
.tl-root .tl-timeline { display:grid; grid-template-columns:180px 1fr; gap:10px; align-items:stretch; }
.tl-root .tl-timeline-spacer { font-size:10px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.08em; display:flex; align-items:center; padding:0 10px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--rm); }
.tl-root .tl-tracks { position:relative; display:flex; flex-direction:column; gap:4px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--rm); padding:6px; overflow:hidden; cursor:pointer; touch-action:none; }

/* A track: flex row of zones, one zone per room */
.tl-root .tl-track { display:flex; height:22px; gap:2px; position:relative; user-select:none; }
.tl-root .tl-zone { flex:1 1 auto; min-width:0; display:flex; align-items:center; justify-content:space-around; padding:0 6px; border-radius:var(--r); border-left:2px solid transparent; position:relative; }

/* Dots */
.tl-root .tl-dot { width:10px; height:10px; background:var(--charcoal); flex-shrink:0; cursor:pointer; position:relative; transition:transform .12s, box-shadow .12s; }
.tl-root .tl-dot-task { border-radius:50%; }
.tl-root .tl-dot-group { border-radius:1.5px; }
.tl-root .tl-dot:hover { transform:scale(1.25); box-shadow:0 0 0 2px rgba(255,255,255,.9); z-index:3; }
.tl-root .tl-dot.selected { box-shadow:0 0 0 2px #fff, 0 0 0 3.5px var(--charcoal); z-index:4; }
.tl-root .tl-dot.no-photo { background:var(--t3); opacity:.55; }
/* Hide dots whose walk has no photo for that slot — keeps zone spacing intact
   so the two tracks stay visually aligned while producing an asymmetric
   dot pattern between the Left and Right timelines. */
.tl-root .tl-dot.tl-hidden { visibility:hidden; pointer-events:none; }

/* Scrubber — one vertical line crossing BOTH tracks */
.tl-root .tl-scrubber { position:absolute; top:2px; bottom:2px; width:2px; background:var(--charcoal); opacity:.7; left:0; transform:translateX(-50%); cursor:pointer; z-index:5; }
.tl-root .tl-scrubber::before, .tl-root .tl-scrubber::after { content:''; position:absolute; left:50%; transform:translateX(-50%); width:9px; height:9px; background:var(--charcoal); border-radius:50%; }
.tl-root .tl-scrubber::before { top:-5px; }
.tl-root .tl-scrubber::after { bottom:-5px; }
.tl-root .tl-scrubber-hit { position:absolute; top:-8px; bottom:-8px; left:-20px; right:-20px; cursor:inherit; }

/* Hover popover — photo preview for a dot */
.tl-popover { position:fixed; z-index:9999; background:var(--bg-card); border:1px solid var(--border-mid); border-radius:var(--rm); box-shadow:0 6px 24px rgba(0,0,0,.18); padding:6px; width:180px; pointer-events:none; font-family:var(--font); }
.tl-popover img { width:100%; height:110px; object-fit:cover; border-radius:var(--r); display:block; background:var(--bg-2); }
.tl-popover .tl-pop-empty { width:100%; height:110px; border-radius:var(--r); background:var(--bg-2); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:10px; color:var(--t3); opacity:.65; text-transform:uppercase; letter-spacing:.1em; }
.tl-popover .tl-pop-meta { padding:5px 4px 2px; display:flex; flex-direction:column; gap:1px; }
.tl-popover .tl-pop-task { font-size:11.5px; font-weight:600; color:var(--t1); line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tl-popover .tl-pop-room { font-family:var(--mono); font-size:9.5px; color:var(--t3); text-transform:uppercase; letter-spacing:.06em; }
.tl-popover .tl-pop-walk { font-family:var(--mono); font-size:9.5px; color:var(--t2); letter-spacing:.06em; }

/* Filter strip — shown at top when compare view is filtered to a single room */
.tl-root .tl-filter-strip { display:flex; align-items:center; gap:10px; padding:8px 18px; background:var(--bg-2); border-bottom:1px solid var(--border); flex-shrink:0; }
.tl-root .tl-filter-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; border:1px solid rgba(0,0,0,.12); }
.tl-root .tl-filter-text { font-size:12px; color:var(--t2); line-height:1.3; }
.tl-root .tl-filter-text strong { color:var(--t1); font-weight:600; }
.tl-root .tl-filter-meta { font-family:var(--mono); font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.06em; margin-left:4px; }
.tl-root .tl-filter-clear { margin-left:auto; font:inherit; font-size:11.5px; color:var(--t1); background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:4px 10px; cursor:pointer; transition:background .12s, border-color .12s; }
.tl-root .tl-filter-clear:hover { background:var(--bg-2); border-color:var(--border-mid); }

/* ── TASK 5: DETAIL MODAL ───────────────────────────────────────────────
   Modal lives at document.body level (outside .tl-root) so it overlays
   the whole app. Prefixed .tl-modal* to stay within the compare-view
   namespace. Uses Kai design tokens only. */
.tl-root .tl-cell { cursor: default; }
.tl-root .tl-cell[data-clickable="1"] { cursor: pointer; }
.tl-root .tl-cell[data-clickable="1"]:hover .tl-cell-img { transform: scale(1.02); }
.tl-root .tl-cell-img { transition: transform .18s ease; }
.tl-modal-overlay { position:fixed; inset:0; z-index:10000; background:rgba(18,18,20,.58); display:flex; align-items:center; justify-content:center; padding:4vh 4vw; font-family:var(--font); color:var(--t1); animation:tl-fade .16s ease-out; }
@keyframes tl-fade { from { opacity:0; } to { opacity:1; } }
.tl-modal { background:var(--bg-card); display:flex; flex-direction:column; width:100%; height:100%; max-width:min(1200px, 92vw); max-height:min(780px, 92vh); border-radius:14px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.45); border:1px solid var(--border); }
.tl-modal-topbar { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
.tl-modal-room-pill { font-family:var(--mono); font-size:10px; color:#fff; background:var(--charcoal); padding:3px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:.06em; }
.tl-modal-taskid { font-family:var(--mono); font-size:11px; color:var(--t3); }
.tl-modal-nav { margin-left:auto; display:flex; gap:6px; }
.tl-modal-nav button { font:inherit; font-size:12px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r); padding:5px 12px; cursor:pointer; color:var(--t1); transition:background .12s, border-color .12s; }
.tl-modal-nav button:hover:not(:disabled) { background:var(--bg-card); border-color:var(--border-mid); }
.tl-modal-nav button:disabled { opacity:.4; cursor:not-allowed; }
.tl-modal-close { font:inherit; font-size:20px; line-height:1; background:transparent; border:none; color:var(--t2); cursor:pointer; padding:4px 10px; border-radius:var(--r); margin-left:6px; }
.tl-modal-close:hover { background:var(--bg-2); color:var(--t1); }
.tl-modal-body { flex:1; display:grid; grid-template-columns:minmax(0,1.35fr) minmax(340px,1fr); min-height:0; overflow:hidden; }
.tl-modal-media { display:flex; flex-direction:column; background:var(--bg-2); border-right:1px solid var(--border); min-height:0; }
.tl-modal-hero-wrap { flex:1; position:relative; overflow:hidden; background:#111; display:flex; align-items:center; justify-content:center; min-height:0; }
.tl-modal-hero { max-width:100%; max-height:100%; object-fit:contain; display:block; }
.tl-modal-hero-empty { color:rgba(255,255,255,.55); font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
.tl-modal-hero-caption { position:absolute; left:0; right:0; bottom:0; padding:14px 18px; background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.72) 100%); color:#fff; display:flex; align-items:flex-end; gap:14px; pointer-events:none; }
.tl-modal-hero-caption strong { font-size:15px; font-weight:600; }
.tl-modal-hero-caption span.walk { font-family:var(--mono); font-size:10.5px; opacity:.85; letter-spacing:.06em; text-transform:uppercase; margin-left:auto; }
.tl-modal-gallery { flex-shrink:0; padding:10px 14px; display:flex; gap:8px; overflow-x:auto; border-top:1px solid var(--border); background:var(--bg-card); }
.tl-modal-thumb { border:2px solid transparent; border-radius:var(--r); background:var(--bg-2); padding:0; cursor:pointer; width:92px; flex-shrink:0; display:flex; flex-direction:column; overflow:hidden; transition:border-color .12s; }
.tl-modal-thumb.active { border-color:var(--charcoal); }
.tl-modal-thumb:hover { border-color:var(--border-mid); }
.tl-modal-thumb.active:hover { border-color:var(--charcoal); }
.tl-modal-thumb img { width:100%; height:58px; object-fit:cover; display:block; background:var(--bg-2); }
.tl-modal-thumb .thumb-empty { width:100%; height:58px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:9px; color:var(--t3); opacity:.55; text-transform:uppercase; letter-spacing:.08em; background:var(--bg-2); }
.tl-modal-thumb .thumb-walk { font-family:var(--mono); font-size:9.5px; color:var(--t2); padding:3px 6px 4px; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-top:1px solid var(--border); background:var(--bg-card); text-transform:uppercase; letter-spacing:.04em; }
.tl-modal-thumb.active .thumb-walk { color:var(--t1); font-weight:500; }
.tl-modal-info { overflow-y:auto; padding:18px 22px 24px; display:flex; flex-direction:column; gap:18px; min-height:0; }
.tl-modal-info h2 { margin:0 0 6px; font-size:18px; font-weight:600; color:var(--t1); letter-spacing:-.01em; }
.tl-modal-info h3 { margin:0 0 8px; font-size:11px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.08em; font-weight:500; }
.tl-modal-head { display:flex; flex-direction:column; gap:2px; }
.tl-modal-head .sub { font-size:12px; color:var(--t3); }
.tl-modal-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.tl-modal-badge { font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:999px; background:var(--bg-2); color:var(--t2); border:1px solid var(--border); text-transform:uppercase; letter-spacing:.04em; }
.tl-modal-badge.done { background:#ecf6ef; color:var(--green); border-color:rgba(96,146,108,.3); }
.tl-modal-badge.issue { background:#fdecec; color:var(--red); border-color:rgba(200,60,60,.3); }
.tl-modal-badge.modifier { background:#fff4e6; color:var(--orange); border-color:rgba(179,100,62,.3); }
.tl-modal-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px 20px; }
.tl-modal-grid .cell { display:flex; flex-direction:column; gap:2px; }
.tl-modal-grid .cell .lbl { font-size:10px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.06em; }
.tl-modal-grid .cell .val { font-size:13px; color:var(--t1); font-weight:500; }
.tl-modal-grid .cell .val.mono { font-family:var(--mono); font-weight:400; font-size:12.5px; }
.tl-modal-notes { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--rm); padding:10px 12px; font-size:12.5px; color:var(--t2); line-height:1.45; }
.tl-modal-notes.issue { background:#fdecec; border-color:rgba(200,60,60,.3); color:var(--red); }
.tl-modal-materials { display:flex; flex-direction:column; gap:0; border:1px solid var(--border); border-radius:var(--rm); overflow:hidden; }
.tl-modal-materials .row { display:grid; grid-template-columns:1fr 80px 90px 100px; gap:10px; padding:8px 12px; align-items:center; border-bottom:1px solid var(--border); font-size:12px; }
.tl-modal-materials .row:last-child { border-bottom:none; }
.tl-modal-materials .row.header { background:var(--bg-2); font-family:var(--mono); font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.06em; }
.tl-modal-materials .row.labor { background:rgba(86,125,163,.06); }
.tl-modal-materials .name { color:var(--t1); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tl-modal-materials .name .vendor { display:block; font-size:10.5px; color:var(--t3); font-weight:400; margin-top:1px; }
.tl-modal-materials .qty, .tl-modal-materials .price { font-family:var(--mono); color:var(--t2); }
.tl-modal-materials .price.total { color:var(--t1); font-weight:500; }
.tl-modal-materials .status { font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:999px; text-align:center; background:var(--bg-2); color:var(--t2); text-transform:uppercase; letter-spacing:.04em; border:1px solid var(--border); }
.tl-modal-materials .status[data-s="Completed"], .tl-modal-materials .status[data-s="Delivered"] { background:#ecf6ef; color:var(--green); border-color:rgba(96,146,108,.25); }
.tl-modal-materials .status[data-s="Ordered"], .tl-modal-materials .status[data-s="Scheduled"] { background:#eaf3fb; color:var(--blue); border-color:rgba(86,125,163,.25); }
.tl-modal-materials .status[data-s="Pending"], .tl-modal-materials .status[data-s="Deferred"] { background:#fff4e6; color:var(--orange); border-color:rgba(179,100,62,.25); }
.tl-modal-materials .status[data-s="On hold"] { background:#fdecec; color:var(--red); border-color:rgba(200,60,60,.25); }
.tl-modal-empty-section { font-size:12px; color:var(--t3); font-style:italic; padding:6px 0; }
.tl-modal-activity { display:flex; flex-direction:column; gap:8px; }
.tl-modal-activity .item { display:flex; gap:10px; align-items:flex-start; }
.tl-modal-activity .avatar { width:26px; height:26px; border-radius:50%; background:var(--charcoal); color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; flex-shrink:0; font-family:var(--font); }
.tl-modal-activity .item-body { flex:1; min-width:0; font-size:12.5px; color:var(--t1); line-height:1.4; }
.tl-modal-activity .item-body .who { font-weight:500; }
.tl-modal-activity .item-body .what { color:var(--t2); }
.tl-modal-activity .item-body .when { display:block; font-family:var(--mono); font-size:10px; color:var(--t3); margin-top:2px; letter-spacing:.04em; }

/* ── SCOPE REVIEW (SR-2 shell) ──────────────────────────────────────────
   Side-by-side walks view. All styles scoped under .sr-root so nothing
   leaks into Kai's other views. Uses only Kai's design tokens. DM Sans
   via var(--font); no Inter. */
.sr-root { display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; font-family:var(--font); color:var(--t1); background:var(--bg-card); }

/* Shared mini-timeline strip at top — shows every walk as a dot with its
   date; currently-selected Left / Right walks get visible chips above. */
.sr-timeline { flex-shrink:0; display:flex; align-items:center; gap:12px; padding:8px 14px; border-bottom:1px solid var(--border); background:var(--bg-2); }
.sr-timeline-label { font-size:10px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.08em; flex-shrink:0; }
.sr-timeline-track { flex:1; position:relative; height:56px; }
.sr-timeline-line { position:absolute; left:0; right:0; top:22px; height:2px; background:var(--border-mid); border-radius:1px; }
.sr-tl-stops { position:absolute; inset:0; display:flex; justify-content:space-between; align-items:stretch; }
.sr-tl-stop { position:relative; width:82px; height:100%; cursor:pointer; user-select:none; }
.sr-tl-chip-row { display:none; }
/* Date above the horizontal line, dot ON the line, name below the line. */
.sr-tl-date { position:absolute; top:2px; left:-6px; right:-6px; text-align:center; font-family:var(--mono); font-size:11px; color:var(--t2); letter-spacing:.04em; line-height:1.15; pointer-events:none; font-weight:500; }
.sr-tl-dot  { position:absolute; top:19px; left:50%; transform:translateX(-50%); width:9px; height:9px; border-radius:50%; border:2px solid var(--bg-2); box-shadow:0 0 0 1px var(--border-mid); transition:transform .15s, box-shadow .15s; pointer-events:none; }
.sr-tl-name { position:absolute; top:34px; left:-6px; right:-6px; text-align:center; font-size:10.5px; color:var(--t2); line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; pointer-events:none; }
.sr-tl-stop:hover .sr-tl-dot { transform:translateX(-50%) scale(1.2); box-shadow:0 0 0 1px var(--t3); }
.sr-tl-stop.is-l  .sr-tl-dot { box-shadow:0 0 0 2px var(--charcoal); }
.sr-tl-stop.is-r  .sr-tl-dot { box-shadow:0 0 0 2px var(--blue, #3b82f6); }
.sr-tl-stop.is-lr .sr-tl-dot { box-shadow:0 0 0 2px var(--charcoal), 0 0 0 4px var(--blue, #3b82f6); }
.sr-tl-hint { font-family:var(--mono); font-size:9.5px; color:var(--t3); letter-spacing:.05em; flex-shrink:0; }
.sr-tl-hint kbd { font-family:inherit; font-size:inherit; border:1px solid var(--border); background:var(--bg-card); padding:0 4px; border-radius:3px; color:var(--t2); }
/* Selection indicator is the ring around the dot (see .is-l / .is-r /
   .is-lr box-shadow rules above). No separate scrubber elements. */

/* Body = canvas (two columns) + right sidebar */
.sr-body { flex:1; display:grid; grid-template-columns:minmax(0,1fr) 340px; min-height:0; }
.sr-body.no-sidebar { grid-template-columns: minmax(0,1fr); }
.sr-canvas { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:14px 16px; overflow:auto; min-height:0; border-right:1px solid var(--border); background:var(--bg); }
.sr-body.no-sidebar .sr-canvas { border-right:none; }

/* One date column */
.sr-col { display:flex; flex-direction:column; gap:10px; min-width:0; }
.sr-col-hdr { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--rm); flex-shrink:0; }
.sr-col-hdr-tag { font-family:var(--mono); font-size:9.5px; color:#fff; background:var(--charcoal); padding:2px 8px; border-radius:999px; text-transform:uppercase; letter-spacing:.06em; }
.sr-col-hdr-walk { font-size:13px; font-weight:600; color:var(--t1); }
.sr-col-hdr-date { font-family:var(--mono); font-size:11px; color:var(--t3); margin-left:auto; }
.sr-col-hdr-select { font:inherit; font-size:12px; color:var(--t1); background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:4px 26px 4px 10px; cursor:pointer; appearance:none; -webkit-appearance:none; background-image:linear-gradient(45deg, transparent 50%, var(--t3) 50%), linear-gradient(135deg, var(--t3) 50%, transparent 50%); background-position: calc(100% - 12px) 50%, calc(100% - 8px) 50%; background-size:4px 4px, 4px 4px; background-repeat:no-repeat; }
.sr-col-hdr-select:hover { border-color:var(--border-mid); }

/* Combined header row — shown once above both columns. Replaces the per-column
   walk dropdowns with a single strip: (earlier date) Group name (later date).
   The three elements sit tight-together and are centered as a unit inside the
   card-style strip. Dates read as subtle mono pills flanking the group name. */
.sr-combined-hdr { display:flex; align-items:center; justify-content:center; gap:14px; padding:11px 16px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--rm); flex-shrink:0; margin:0 14px 10px 14px; }
.sr-combined-date { display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10.5px; color:var(--t2); text-transform:uppercase; letter-spacing:.08em; padding:4px 10px; background:var(--bg-card); border:1px solid var(--border); border-radius:999px; flex-shrink:0; white-space:nowrap; }
.sr-combined-date::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--border-mid); flex-shrink:0; }
.sr-combined-date-l::before { background:var(--t3); }
.sr-combined-date-r::before { background:var(--blue, var(--t1)); }
.sr-combined-group { font-size:15px; font-weight:600; color:var(--t1); letter-spacing:-.005em; padding:0 4px; max-width:460px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; }

/* Hero photo — big blown-up image per column, driven by the selected task
   (falling back to the first photo in the focused group for this walk). */
.sr-hero { position:relative; aspect-ratio:4/3; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--rm); overflow:hidden; display:flex; align-items:center; justify-content:center; }
.sr-hero img { width:100%; height:100%; object-fit:cover; display:block; }
.sr-hero-caption { position:absolute; left:0; right:0; bottom:0; padding:10px 12px; display:flex; align-items:center; gap:8px; background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.6) 100%); color:#fff; pointer-events:none; }
.sr-hero-caption .sr-hero-title { font-size:13px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sr-hero-caption .sr-hero-room { font-family:var(--mono); font-size:10px; opacity:.85; text-transform:uppercase; letter-spacing:.06em; }
.sr-hero-caption .sr-hero-badge { font-family:var(--mono); font-size:9px; padding:2px 7px; border-radius:999px; background:rgba(255,255,255,.18); color:#fff; text-transform:uppercase; letter-spacing:.05em; border:1px solid rgba(255,255,255,.25); }
.sr-hero-empty { font-family:var(--mono); font-size:10.5px; color:var(--t3); text-transform:uppercase; letter-spacing:.1em; opacity:.7; padding:12px; text-align:center; }

/* Task-hotspot markers overlaid on the hero photo — one pulsing dashed blue
   circle per task with at least one photo in the focused group/walk. Mirrors
   the pattern from scope-review-floorplan.html (the .marker class there). */
.sr-hero-markers { position:absolute; inset:0; pointer-events:none; z-index:2; }
.sr-hero-marker {
  position:absolute; transform:translate(-50%, -50%);
  width:22px; height:22px; border-radius:999px;
  border:2.5px dashed #64bbff;
  background:rgba(216, 236, 255, 0.42);
  padding:0; cursor:pointer; pointer-events:auto;
  animation: sr-hero-marker-pulse 2.2s ease-in-out infinite;
  transition: transform .15s, background .15s, border-color .15s;
}
.sr-hero-marker:hover { background:rgba(216, 236, 255, 0.72); border-color:#3b82f6; transform:translate(-50%, -50%) scale(1.08); }
.sr-hero-marker.active { background:rgba(216, 236, 255, 0.85); border-style:solid; border-color:#3b82f6; }
@keyframes sr-hero-marker-pulse {
  0%,100% { box-shadow:0 0 0 0 rgba(100, 187, 255, .55); }
  50%     { box-shadow:0 0 0 7px rgba(100, 187, 255, 0); }
}
.sr-hero-marker-label {
  position:absolute; top:calc(100% + 7px); left:50%; transform:translateX(-50%);
  background:rgba(24, 28, 38, .92); color:#fff;
  font-family:var(--mono); font-size:10.5px; letter-spacing:.02em;
  padding:4px 8px; border-radius:6px; white-space:nowrap; pointer-events:none;
  opacity:0; transition:opacity .15s;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
}
.sr-hero-marker:hover .sr-hero-marker-label,
.sr-hero-marker.active .sr-hero-marker-label { opacity:1; }

/* sr-top-row wraps the hero + task-photos section. Default: transparent —
   hero / group photos / task photos appear in their original stacked order
   in the .sr-col flex column (flex `order` re-sequences them since
   `display:contents` promotes children to direct children of .sr-col).
   When the left sidebar collapses, .sr-body gets .sr-compact and this
   row flips into a real flex row so the hero and vertical task thumbs
   sit side-by-side. */
.sr-top-row { display:contents; }
.sr-top-row > .sr-hero { order:1; }
.sr-gp-section          { order:2; }
.sr-top-row > .sr-tp-section { order:3; }

.sr-body.sr-compact .sr-top-row {
  display:flex;
  flex-direction:row;
  gap:12px;
  align-items:stretch;
  min-width:0;
}
.sr-body.sr-compact .sr-top-row > .sr-hero {
  flex:1 1 auto;
  min-width:0;
  aspect-ratio:4/3;
}
.sr-body.sr-compact .sr-top-row > .sr-tp-section {
  flex:0 0 132px;
  min-width:0;
  align-self:stretch;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.sr-body.sr-compact .sr-tp-section .sr-photos-row { flex:1; min-height:0; align-items:stretch; }
.sr-body.sr-compact .sr-tp-section .sr-photos-scroll {
  overflow-x:hidden;
  overflow-y:auto;
  flex:1;
  min-height:0;
  cursor:auto;
}
.sr-body.sr-compact .sr-tp-section .sr-photos-scroll::-webkit-scrollbar { width:6px; height:auto; }
.sr-body.sr-compact .sr-tp-section .sr-photos-grid {
  flex-direction:column;
  gap:6px;
  padding-bottom:0;
  padding-right:4px;
}
.sr-body.sr-compact .sr-tp-section .sr-photo-card {
  width:100%;
  max-width:100%;
  flex-shrink:0;
}
/* Hide the side carousel arrows when the rail is vertical — they only make
   sense for the horizontal layout. */
.sr-body.sr-compact .sr-tp-section .sr-carousel-btn { display:none; }

/* Photo sections (group photos + task photos) */
.sr-photos-section { display:flex; flex-direction:column; gap:6px; }
.sr-photos-hdr { display:flex; align-items:center; gap:8px; padding:2px 4px; }
.sr-photos-label { font-size:11.5px; font-weight:600; color:var(--t1); }
.sr-photos-count { font-family:var(--mono); font-size:10px; color:var(--t3); }
.sr-photos-row { display:flex; align-items:center; gap:6px; }
.sr-carousel-btn { flex-shrink:0; width:26px; height:26px; border-radius:50%; background:var(--bg-card); border:1px solid var(--border); color:var(--t2); font-size:16px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:var(--font); transition:background .12s, color .12s, border-color .12s; }
.sr-carousel-btn:hover:not(:disabled) { background:var(--bg-2); color:var(--t1); border-color:var(--border-mid); }
.sr-carousel-btn:disabled { opacity:.35; cursor:not-allowed; }
.sr-photos-scroll { flex:1; min-width:0; overflow-x:auto; overflow-y:hidden; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; cursor:grab; }
.sr-photos-scroll.is-dragging { cursor:grabbing; scroll-behavior:auto; }
.sr-photos-scroll.is-dragging img { pointer-events:none; }
.sr-photos-scroll::-webkit-scrollbar { height:6px; }
.sr-photos-scroll::-webkit-scrollbar-track { background:transparent; }
.sr-photos-scroll::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:999px; }
.sr-photos-grid { display:flex; gap:6px; padding-bottom:4px; }

/* Unassigned / group photo thumb */
.sr-unassigned-photo { flex-shrink:0; width:92px; height:68px; border-radius:var(--r); overflow:hidden; background:var(--bg-2); border:1px solid var(--border); cursor:pointer; transition:border-color .12s, transform .12s; }
.sr-unassigned-photo:hover { border-color:var(--border-mid); transform:scale(1.02); }
.sr-unassigned-photo.active { border-color:var(--charcoal); box-shadow:0 0 0 1px var(--charcoal); }
.sr-unassigned-photo img { width:100%; height:100%; object-fit:cover; display:block; }

/* Task photo card (with status badge + label) */
.sr-photo-card { flex-shrink:0; width:120px; display:flex; flex-direction:column; gap:0; cursor:pointer; border-radius:var(--r); overflow:hidden; border:1px solid var(--border); background:var(--bg-card); transition:border-color .12s, transform .12s; }
.sr-photo-card:hover { border-color:var(--border-mid); transform:translateY(-1px); }
.sr-photo-card.active { border-color:var(--charcoal); box-shadow:0 0 0 1px var(--charcoal); }
.sr-photo-thumb { position:relative; width:100%; aspect-ratio:4/3; background:var(--bg-2); overflow:hidden; }
.sr-photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.sr-photo-badge { position:absolute; top:4px; right:4px; font-family:var(--mono); font-size:8.5px; padding:1px 6px; border-radius:999px; text-transform:uppercase; letter-spacing:.05em; background:var(--bg-card); color:var(--t2); border:1px solid var(--border); }
.sr-photo-badge.completed { background:#ecf6ef; color:var(--green); border-color:rgba(96,146,108,.3); }
.sr-photo-badge.in-progress { background:#eaf3fb; color:var(--blue); border-color:rgba(86,125,163,.3); }
.sr-photo-badge.not-started { background:var(--bg-2); color:var(--t3); border-color:var(--border); }
.sr-photo-badge.on-hold { background:#fdecec; color:var(--red); border-color:rgba(177,69,65,.3); }
.sr-photo-label { font-size:10.5px; padding:5px 8px 6px; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-top:1px solid var(--border); background:var(--bg-card); }

/* Section empty state (used by all sub-sections during SR-2) */
.sr-section-empty { padding:18px 12px; border:1px dashed var(--border-mid); border-radius:var(--rm); text-align:center; font-family:var(--mono); font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.08em; background:var(--bg-2); }

/* ── Right sidebar: group card + task list ─────────────────────────── */
.sr-sidebar { display:flex; flex-direction:column; gap:10px; padding:14px 14px 18px; overflow-y:auto; background:var(--bg-card); min-height:0; }
.sr-sidebar-select { font:inherit; font-size:12px; color:var(--t1); background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r); padding:6px 28px 6px 10px; cursor:pointer; width:100%; appearance:none; -webkit-appearance:none; background-image:linear-gradient(45deg, transparent 50%, var(--t3) 50%), linear-gradient(135deg, var(--t3) 50%, transparent 50%); background-position:calc(100% - 14px) 50%, calc(100% - 10px) 50%; background-size:5px 5px, 5px 5px; background-repeat:no-repeat; }

.sr-group-card { display:flex; flex-direction:column; gap:0; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--rm); overflow:hidden; }
.sr-group-head { display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--bg-2); border-bottom:1px solid var(--border); }
.sr-group-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; background:var(--charcoal); border:1px solid rgba(0,0,0,.12); }
.sr-group-title { font-size:13px; font-weight:600; color:var(--t1); flex:1; min-width:0; }
.sr-group-count { font-family:var(--mono); font-size:10px; color:var(--t3); }
.sr-group-feed { padding:0; display:flex; flex-direction:column; }
.sr-feed-item { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border-bottom:1px solid var(--border); }
.sr-feed-item:last-child { border-bottom:none; }
.sr-feed-avatar { width:22px; height:22px; border-radius:50%; background:var(--charcoal); color:#fff; font-size:9.5px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sr-feed-body { flex:1; min-width:0; font-size:12px; color:var(--t1); line-height:1.4; }
.sr-feed-body .who { font-weight:500; }
.sr-feed-body .what { color:var(--t2); }
.sr-feed-body .when { font-family:var(--mono); font-size:9.5px; color:var(--t3); display:block; margin-top:2px; letter-spacing:.04em; }

.sr-section-title { font-size:10.5px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.08em; padding:0 2px 2px; margin-top:4px; }
.sr-section-title-row { display:flex; align-items:center; justify-content:space-between; padding:4px 2px 2px; margin-top:4px; }
.sr-section-title-row .sr-section-title { padding:0; margin-top:0; }
.sr-section-clear { font:inherit; font-family:var(--mono); font-size:9.5px; color:var(--blue); background:none; border:none; cursor:pointer; text-transform:uppercase; letter-spacing:.06em; padding:2px 4px; border-radius:var(--r); }
.sr-section-clear:hover { background:rgba(86,125,163,.1); }

.sr-task-list { display:flex; flex-direction:column; gap:4px; }
.sr-task-row { display:flex; align-items:flex-start; gap:10px; padding:8px 10px; border-radius:var(--r); cursor:pointer; transition:background .12s; border:1px solid transparent; }
.sr-task-row:hover { background:var(--bg-2); }
.sr-task-row.active { background:var(--bg-2); border-color:var(--border-mid); }
.sr-task-bullet { width:8px; height:8px; border-radius:50%; background:var(--border-mid); flex-shrink:0; margin-top:5px; }
.sr-task-row.done .sr-task-bullet { background:var(--green); }
.sr-task-row.issue .sr-task-bullet { background:var(--red); }
.sr-task-body { flex:1; min-width:0; }
.sr-task-name { font-size:12.5px; color:var(--t1); font-weight:500; line-height:1.3; }
.sr-task-meta { font-family:var(--mono); font-size:10px; color:var(--t3); margin-top:2px; letter-spacing:.02em; }

</style>
</head>

// Derive a workflow status label for a task. An explicit `status` field on
// the task wins so demos can pin specific distributions per group; otherwise
// fall back to deriving from existing fields. Order: Rework > Completed >
// Not started > In progress.
const __STATUS_LABELS = {
  rework:     { label:'Rework',      key:'rework'    },
  completed:  { label:'Completed',   key:'completed' },
  notstarted: { label:'Not started', key:'notstarted' },
  progress:   { label:'In progress', key:'progress'  },
};
function getTaskStatus(task){
  if(!task) return __STATUS_LABELS.progress;
  if(task.status && __STATUS_LABELS[task.status]) return __STATUS_LABELS[task.status];
  if(task.issue)              return __STATUS_LABELS.rework;
  if(task.done)               return __STATUS_LABELS.completed;
  if(task.assign === 'Unassigned') return __STATUS_LABELS.notstarted;
  return __STATUS_LABELS.progress;
}
function statusBadgeClass(key){
  // Map status key → existing badge class for consistent palette.
  return ({
    rework:     'b-status-rework',
    completed:  'b-status-completed',
    notstarted: 'b-status-notstarted',
    progress:   'b-status-progress',
  })[key] || 'b-status-progress';
}

// Walk-aware variant — used by Compare walks where each cell represents a
// task's state at a specific walk. Initial walk happens before any work
// begins, so every task is "Not started". Final walk (close_out) is the
// project completion checkpoint, so every task reads "Completed". Every
// other walk falls through to getTaskStatus(task) — its current overall
// state.
function getTaskStatusForWalk(task, walkId){
  if(walkId === 'initial_scope') return { label:'Not started', key:'notstarted' };
  if(walkId === 'close_out')     return { label:'Completed',   key:'completed'  };
  return getTaskStatus(task);
}

function getAttentionItems(roomId, taskId) {
  // Returns { unassigned: [{taskName}], outOfStock: [{name, taskName}] }
  const unassigned = [], outOfStock = [];
  const rooms = roomId ? { [roomId]: ROOMS[roomId] } : ROOMS;
  Object.entries(rooms).forEach(([rid, room]) => {
    if(!room) return;
    const tasks = taskId ? room.taskList.filter(t=>t.id===taskId) : room.taskList;
    tasks.forEach(t => {
      if(t.assign === 'Unassigned') unassigned.push({ taskName: t.name, roomName: room.name });
      (TASK_MATERIALS[t.id]||[]).filter(m=>m.status==='On hold'&&m.type==='material')
        .forEach(m => outOfStock.push({ name: m.name, taskName: t.name, roomName: room.name }));
    });
  });
  return { unassigned, outOfStock };
}

function updateAttentionBadge() {

// nav arrows (prev/next) can flip through every photo in this group's pool.
let gpOverlayState = null;

// Walk key (initial/p1/p2/final) ↔ walk id (initial_scope/...) translation,
// used to look up walk metadata + group attribution.
const _GP_KEY_TO_WALK_ID = { initial:'initial_scope', p1:'progress_1', p2:'progress_2', final:'close_out' };
const _GP_KEY_LABEL      = { initial:'Initial walk', p1:'Progress 1', p2:'Progress 2', final:'Final walk' };

// Build a flat ordered list of every group photo (across walks) for a room.
// Returns array of { url, walkKey, walkLabel, walkId, idxInWalk }.
function _gpFlatList(roomId){
  const out = [];
  const data = (typeof GROUP_PHOTOS !== 'undefined' && GROUP_PHOTOS[roomId]) || null;
  if(!data) return out;
  ['initial','p1','p2','final'].forEach(k => {
    (data[k] || []).forEach((url, j) => {
      out.push({ url, walkKey:k, walkLabel:_GP_KEY_LABEL[k]||k, walkId:_GP_KEY_TO_WALK_ID[k]||null, idxInWalk:j });
    });
  });
  return out;
}

function openGroupPhotoDetail(roomId, walkKey, photoIdx){
  const room = ROOMS[roomId];
  if(!room) return;
  const flat = _gpFlatList(roomId);
  if(!flat.length) return;
  // Resolve which photo in the flat list this click maps to. The strip
  // passes the index it has in the rendered tile order (which mirrors the
  // walk order in _gpFlatList), so use it directly when valid; otherwise
  // fall back to first matching walkKey.
  let flatIdx = (typeof photoIdx === 'number' && photoIdx >= 0 && photoIdx < flat.length)
    ? photoIdx
    : flat.findIndex(p => p.walkKey === walkKey);
  if(flatIdx < 0) flatIdx = 0;

  gpOverlayState = { roomId, flat, flatIdx };
  _renderGpOverlay();
  const el = document.getElementById('gp-overlay');
  if(el){ el.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
}

function navPhoto(dir) {
  if (!overlayState) return;

  // Group mode — navigate group photos only
  if(overlayState.navMode === 'group'){
    const newIdx = overlayState.groupIdx + dir;
    if(newIdx >= 0 && newIdx < overlayState.groupPhotos.length){
      overlayState.groupIdx = newIdx;
      renderOverlay();
    }
    return;
  }

  // Task mode — navigate task photos, cross into adjacent task at boundary
  const { roomId, photos, photoIdx, room } = overlayState;
  const newIdx = photoIdx + dir;

  if (newIdx >= 0 && newIdx < photos.length) {
    overlayState.photoIdx = newIdx;
    renderOverlay();
    return;
  }

  // At boundary — navigate to adjacent task
  const tasks = room.taskList;
  const taskIdx = tasks.findIndex(t => t.id === overlayState.taskId);
  const nextTaskIdx = taskIdx + dir;
  if (nextTaskIdx < 0 || nextTaskIdx >= tasks.length) return;

  const nextTask = tasks[nextTaskIdx];
  const walks = dir > 0 ? WALKS : [...WALKS].reverse();
  for (const w of walks) {
    const ps = getWalkPhotos(roomId, nextTask.id, w.id);
    if (ps.length) {
      showTaskFlash(nextTask.name, dir);
      setTimeout(() => {
        openPhotoDetail(roomId, nextTask.id, w.id, dir > 0 ? 0 : ps.length - 1);
      }, 180);
      return;
    }
  }
}

function showTaskFlash(taskName, dir) {
  // Remove any existing flash
  const existing = document.getElementById('po-flash');
  if (existing) existing.remove();
  const flash = document.createElement('div');
  flash.id = 'po-flash';
  flash.className = 'po-task-flash';
  flash.innerHTML = `
    <div class="po-task-flash-label">${dir > 0 ? 'Next task' : 'Previous task'}</div>
    <div class="po-task-flash-name">${taskName}</div>
  `;
  document.querySelector('.po-photo-side').appendChild(flash);
  setTimeout(() => flash.remove(), 1700);
}

function renderOverlay() {
  const { roomId, taskId, task, room, photos, walkId, walk, photoIdx } = overlayState;
  const color = RC[roomId];
  const walkColor = WALK_PALETTE[walkId] || '#C4B8A8';
  const attr = getAttr(roomId, taskId, walkId);

  // Determine what to show in main image based on navMode
  const isGroupMode = overlayState.navMode === 'group';
  const mainUrl = isGroupMode
    ? (overlayState.groupPhotos[overlayState.groupIdx] || null)
    : (photos[photoIdx] || null);

  // Main photo — use walk color as bg placeholder
  const imgEl = document.getElementById('po-img');
  imgEl.style.backgroundColor = mainUrl ? walkColor : '#1a1a1a';
  imgEl.style.backgroundImage = mainUrl ? `url(${mainUrl})` : 'none';

  // Nav buttons
  const prevBtn = document.getElementById('po-prev');
  const nextBtn = document.getElementById('po-next');
  if(isGroupMode){
    prevBtn.disabled = overlayState.groupIdx === 0;
    nextBtn.disabled = overlayState.groupIdx >= overlayState.groupPhotos.length - 1;
    prevBtn.className = 'po-nav prev';
    nextBtn.className = 'po-nav next';
    prevBtn.innerHTML = '&#8249;';
    nextBtn.innerHTML = '&#8250;';
  } else {
    const tasks = room.taskList;
    const taskIdx = tasks.findIndex(t => t.id === taskId);
    const atStart = photoIdx === 0;
    const atEnd   = photoIdx === photos.length - 1;
    const prevTask = atStart && taskIdx > 0 ? tasks[taskIdx - 1] : null;
    const nextTask = atEnd   && taskIdx < tasks.length - 1 ? tasks[taskIdx + 1] : null;
    if(prevTask){ prevBtn.disabled=false; prevBtn.className='po-nav prev boundary'; prevBtn.innerHTML='‹'; }
    else { prevBtn.disabled=photoIdx===0; prevBtn.className='po-nav prev'; prevBtn.innerHTML='&#8249;'; }

function appTaskById(roomId, taskId) {
  const room = ROOMS[roomId];
  if (!room) return;
  const task = room.taskList.find(t => t.id === taskId);
  if (task) { task.done = true; }
  if (overlayState) overlayState.task = task;
  renderOverlay();
  render();
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!overlayState) return;
  if (e.key === 'Escape') closeOverlay();
  if (e.key === 'ArrowLeft') navPhoto(-1);
  if (e.key === 'ArrowRight') navPhoto(1);
});

function approveGroup(id){
  ROOMS[id].taskList.forEach(t=>t.done=true);
  ROOMS[id].progress=100;
  render();
}

function togLayer(name, btn){
  LAYERS[name] = !LAYERS[name];
  btn.classList.toggle('on', LAYERS[name]);
  render();
}

function enableLayer(name){
  if(LAYERS[name]) return; // already on
  LAYERS[name] = true;
  const btn = document.querySelector(`.sb-layer-btn[data-l="${name}"]`);
  if(btn) btn.classList.add('on');
  render();
}

function chZoom(d){ setZoom(Math.max(0,Math.min(2,zoom+d))); }
function setZoom(i){
  zoom=i;
  if(i>0&&!selRoomId){ selRoomId='kitchen'; hlRoom('kitchen'); }
  if(i===2&&!selTask&&selRoomId&&selRoomId!=='unassigned') selTask=ROOMS[selRoomId].taskList[0];
  render();
}

// When Scope Review is open, the left/right columns mirror whichever group
// the main nav (floor plan click, breadcrumb, prev/next) currently has
// selected. This keeps srColGroup in lockstep with selRoomId so there's no
// separate dropdown inside the SR column header.
function __syncSrGroupFromNav(id){
  if(typeof scopeReviewMode === 'undefined' || !scopeReviewMode) return;
  if(!id || !ROOMS[id]) return;
  srColGroup.L = id;
  srColGroup.R = id;
  srHeroSel = { L:null, R:null };
  if(srTaskId){
    const g = ROOMS[id];
    const stillVisible = g && g.taskList.some(t => t.id === srTaskId);
    if(!stillVisible) srTaskId = null;
  }
}

// Mirror selTask → srTaskId when Scope Review is open, so picking a task in
// the left sidebar's Scope mode (or the Home/Group/Task breadcrumb) updates
// the SR hero to that task's photos. Clears any prior per-column hero pins
// so the task selection wins.
function __syncSrTaskFromNav(taskId){
  if(typeof scopeReviewMode === 'undefined' || !scopeReviewMode) return;
  srTaskId = taskId || null;
  srHeroSel = { L:null, R:null };
}

function selRoom(id){
  selRoomId=id; selTask=null; hlRoom(id);
  __syncSrGroupFromNav(id);
  __syncSrTaskFromNav(null);
  if(id==='unassigned'){ if(zoom===0) setZoom(1); else render(); return; }
  if(zoom===0) setZoom(1); else { if(zoom===2) selTask=ROOMS[id].taskList[0]; render(); }
}
function pickTask(rid,t){ selRoomId=rid; selTask=t; hlRoom(rid); __syncSrGroupFromNav(rid); __syncSrTaskFromNav(t && t.id); setZoom(2); }
function appTask(){ if(selTask){ selTask.done=true; render(); } }

function hlRoom(id){
  document.querySelectorAll('.room').forEach(r=>{
    r.classList.remove('selected');
    const rect=r.querySelector('rect');
    rect.style.fill=''; rect.style.stroke=''; rect.style.strokeWidth='';
  });
  if(id && id!=='unassigned'){
    const el=document.getElementById('room-'+id);
    if(el){
      el.classList.add('selected');
      const rect=el.querySelector('rect');
      rect.style.fill=RC[id]+'33';
      rect.style.stroke=RC[id];
      rect.style.strokeWidth='2.5';
    }
  }
  // v5: keep the "All groups" pill's active state in sync with the current
  // selection — active iff no specific room/group is selected.
  const agBtn = document.getElementById('bp-allgroups-btn');
  if(agBtn) agBtn.classList.toggle('active', !id);
}

// v5: clear any room/task selection and return the right panel to the
// full-scope Home view. Wired to the "All groups" pill at the top-left of
// the floor plan body.
function selectAllGroups(){
  selRoomId = null;
  selTask = null;
  if(typeof hlRoom === 'function') hlRoom(null);
  if(typeof setZoom === 'function') setZoom(0);
  else if(typeof render === 'function') render();
  const agBtn = document.getElementById('bp-allgroups-btn');
  if(agBtn) agBtn.classList.add('active');
}
