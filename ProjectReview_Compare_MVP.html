<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kai — Renovation Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#60926C; --charcoal:#1D1D1D; --red:#B14541;
  --blue:#567DA3; --orange:#B3643E; --purple:#8B5DD4;
  --bg:#F8F5F0; --bg-card:#FFFFFF; --bg-2:#EFEAE3;
  --border:rgba(0,0,0,0.08); --border-mid:rgba(0,0,0,0.14);
  --t1:#1D1D1D; --t2:#5a5751; --t3:#9a9590;
  --bp-bg:#F8F5F0; --bp-wall:#9a9a9a; --bp-room:#FFFFFF; --bp-room-h:#FFFFFF; --bp-text:#6b6b6b;
  --sidebar:400px; --toolbar:50px;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:4px; --rm:8px; --rl:12px;
}
html,body { width:100%; height:100%; overflow:hidden; font-family:var(--font); background:var(--bg); color:var(--t1); -webkit-font-smoothing:antialiased; }
.app { display:flex; flex-direction:column; width:100%; height:100vh; }

/* ── TOP NAV BAR (dark theme) ── */
:root {
  --tb-bg:#1D1D1D;
  --tb-text:#FFFFFF;
  --tb-text-mute:rgba(255,255,255,.55);
  --tb-text-soft:rgba(255,255,255,.7);
  --tb-divider:rgba(255,255,255,.16);
  --tb-hover:rgba(255,255,255,.08);
  --tb-accent:#E8C24A;
}
.toolbar {
  height:52px; display:flex; align-items:center; padding:0 20px;
  background:var(--tb-bg); flex-shrink:0; gap:0;
  border-bottom:1px solid rgba(255,255,255,.04);
  /* Scoped overrides so any descendant using var(--t1/--t2/--t3/--bg-2)
     (including inline styles set by JS, which can't be reached by class
     selectors) resolves to a white-on-dark shade instead of dark-on-dark. */
  --t1:#FFFFFF;
  --t2:rgba(255,255,255,.72);
  --t3:rgba(255,255,255,.5);
  --bg-2:rgba(255,255,255,.08);
}
.t-back {
  display:flex; align-items:center; gap:5px;
  font-size:13px; color:var(--tb-text-mute); cursor:pointer;
  margin-right:20px; flex-shrink:0; border:none; background:none;
  font-family:var(--font); transition:color .12s;
}
.t-back:hover { color:var(--tb-text); }
.t-back svg { opacity:.6; }
.t-address {
  font-size:15px; font-weight:600; color:var(--tb-text);
  letter-spacing:-.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  cursor:pointer; transition:color .12s;
}
.t-address:hover { color:var(--tb-text-soft); }
.t-divider { width:1px; height:22px; background:var(--tb-divider); margin:0 20px; flex-shrink:0; }
.t-tabs { display:flex; align-items:center; height:100%; }
.t-tab {
  display:flex; align-items:center; padding:0 14px 6px;
  font-size:12px; font-weight:500; color:var(--tb-text-mute);
  border:none; background:none; cursor:pointer; font-family:var(--font);
  position:relative; white-space:nowrap; letter-spacing:.02em; text-transform:uppercase;
  transition:color .12s; height:100%;
}
.t-tab:hover { color:var(--tb-text); }
.t-tab.active { color:var(--tb-accent); font-weight:700; }
.t-tab.active::after {
  content:''; position:absolute; bottom:0; left:14px; right:14px;
  height:3.5px; background:var(--tb-accent); border-radius:1px 1px 0 0;
  margin-bottom:-2px;
}
.t-space { flex:1; }
.t-icon-btn {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border:none; background:transparent; cursor:pointer; color:var(--tb-text-mute);
  border-radius:var(--rm); transition:background .12s; flex-shrink:0;
}
.t-icon-btn:hover { background:var(--tb-hover); color:var(--tb-text); }
.t-cta {
  padding:8px 18px; border-radius:var(--rm);
  background:var(--green); border:none; color:#fff;
  font-size:13px; font-weight:600; font-family:var(--font);
  cursor:pointer; white-space:nowrap; margin-left:10px;
  transition:opacity .12s;
}
.t-cta:hover { opacity:.88; }
/* Dark-toolbar overrides for controls that live inside .toolbar but share
   classes with light-themed surfaces elsewhere on the page. */
.toolbar .sb-layer-btn:hover { background:var(--tb-hover); }
.toolbar .sb-layer-ico { opacity:.45; }
.toolbar .sb-layer-btn.on .sb-layer-ico { opacity:1; }
.toolbar .sb-sep { background:var(--tb-divider); }
.toolbar .sb-layer-btn-filter { color:var(--tb-text); }
.toolbar .sb-layer-btn-filter:hover { background:var(--tb-hover); color:var(--tb-text); }
.toolbar .sb-layer-btn-filter.is-filtered { background:#fff; color:#1D1D1D; }
.toolbar .sb-layer-btn-filter.is-filtered:hover { background:#fff; color:#1D1D1D; }
.toolbar .rp-add-btn { color:var(--tb-text-soft); border-color:var(--tb-divider); }
.toolbar .rp-add-btn:hover { background:#fff; border-color:#fff; color:#1D1D1D; }
.toolbar .rp-hdr-vsep { background:var(--tb-divider); }
.toolbar #rp-breadcrumb,
.toolbar #rp-breadcrumb * { color:var(--tb-text); }
.toolbar #rp-breadcrumb a,
.toolbar #rp-breadcrumb button { color:var(--tb-text-soft); }
.toolbar #rp-breadcrumb a:hover,
.toolbar #rp-breadcrumb button:hover { color:var(--tb-text); }
.toolbar .g-approve-btn { color:var(--tb-text); border-color:var(--tb-divider); }
.toolbar .g-approve-btn:hover { border-color:var(--green); color:var(--green); background:rgba(96,146,108,.12); }
.toolbar .g-approve-btn.g-approve-done { border-color:var(--green); color:var(--green); background:rgba(96,146,108,.18); }
/* Dropdowns rendered inside the dark toolbar (e.g., contractor filter,
   breadcrumb nav dropdown) sit on a white surface, so their descendants
   need to revert to the dark-on-light text tokens. */
.toolbar #ctor-sel-dd,
.toolbar #nav-dd,
.toolbar .nav-dropdown {
  --t1:#1D1D1D;
  --t2:#5a5751;
  --t3:#9a9590;
  --bg-2:#EFEAE3;
  color:var(--t1);
}

/* zoom-pill-bar lives in rp-hdr */
.zoom-pill-bar {
  display:flex; align-items:center;
  background:var(--bg); border:1px solid var(--border-mid);
  border-radius:20px; overflow:hidden; flex-shrink:0; height:28px;
  padding:2px; gap:1px;
}
.zpb-step {
  padding:0 13px; height:100%; display:flex; align-items:center;
  font-size:12px; font-weight:500; color:var(--t3);
  border:none; background:transparent; cursor:pointer; font-family:var(--font);
  transition:all .15s; white-space:nowrap; border-radius:14px;
}
.zpb-step:hover { color:var(--t1); background:rgba(0,0,0,.05); }
.zpb-step.active { background:var(--charcoal); color:#fff; font-weight:600; }
.sb-sep { width:1px; height:20px; background:var(--border-mid); margin:0 2px; flex-shrink:0; }
.sb-layer-btn {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border:none; background:transparent; cursor:pointer;
  border-radius:var(--rm); transition:background .12s;
  position:relative; flex-shrink:0;
}
.sb-layer-btn:hover { background:var(--bg-2); }
.sb-layer-btn.on { background:transparent; }
.sb-layer-ico { width:20px; height:20px; display:flex; align-items:center; justify-content:center; opacity:.3; transition:opacity .15s; }
.sb-layer-btn.on .sb-layer-ico { opacity:1; }
/* Active dot — tiny colored pip below the icon */
.sb-layer-pip {
  position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%; opacity:0; transition:opacity .15s;
}
.sb-layer-btn.on .sb-layer-pip { opacity:1; }
/* Tooltip */
.sb-layer-btn-filter {
  width:36px; height:36px; color:var(--t1);
}
.sb-layer-btn-filter:hover { background:var(--bg-2); color:var(--t1); }
/* Active state — applied only while the dropdown is open. */
.sb-layer-btn-filter.is-filtered {
  background:var(--charcoal); color:#fff;
}
.sb-layer-btn-filter.is-filtered:hover { background:var(--charcoal); color:#fff; }
.sb-layer-btn::after {
  content: attr(data-tip);
  position:absolute; top:calc(100% + 6px); left:50%; transform:translateX(-50%);
  background:var(--charcoal); color:#fff;
  font-size:10px; font-weight:500; font-family:var(--font);
  padding:3px 7px; border-radius:4px; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity .12s;
  letter-spacing:.01em; z-index:200;
}
.sb-layer-btn:hover::after { opacity:1; }
.ib-chip-green { background:#e8f5e9; color:#2e7d32; }
.ib-chip-blue  { background:#e3f2fd; color:#1565c0; }

/* ── MAIN ── */
.main { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }

/* ── RESIZER ── */
.resizer {
  width:6px; flex-shrink:0; cursor:col-resize;
  background:rgba(0,0,0,.13); position:relative; z-index:10;
  transition:background .15s; display:flex; align-items:center; justify-content:center;
}
.resizer:hover { background:rgba(0,0,0,.25); }
.resizer.dragging { background:rgba(0,0,0,.25); }
.resizer::after {
  content:'';
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:3px; height:56px;
  background:rgba(0,0,0,.36);
  border-radius:2px;
  transition:width .15s, height .15s, background .15s;
}
.resizer:hover::after, .resizer.dragging::after {
  width:4px; height:64px;
  background:rgba(0,0,0,.56);
}

/* Expand tab shown when floor plan is collapsed — sits at the same vertical
   position and height as the tab strip so it feels like a continuation of it. */
.bp-expand-btn {
  display:none; position:absolute; left:0; top:0;
  width:28px; height:44px; padding:0; z-index:20;
  gap:0;
  font:inherit; font-size:12px; font-weight:500; color:var(--t2);
  letter-spacing:.01em;
  background:var(--bg-card); border:1px solid var(--border-mid);
  border-left:none; border-top:none; border-radius:0 0 8px 0;
  cursor:pointer; align-items:center; justify-content:center;
  transition:color .12s, background .12s;
  box-shadow:2px 0 10px rgba(0,0,0,.09);
  white-space:nowrap;
}
.bp-expand-btn svg { flex-shrink:0; }
.bp-expand-btn:hover { color:var(--t1); background:var(--bg-2); }
.bp-expand-btn.visible { display:flex; }

/* Collapse tab shown inside the floor plan's top-right — hides the panel */
.bp-collapse-btn {
  position:absolute; top:10px; right:10px; z-index:15;
  width:26px; height:26px; padding:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.75); border:1px solid var(--border);
  border-radius:var(--r); cursor:pointer; color:var(--t2);
  transition:background .12s, color .12s, border-color .12s;
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
}
.bp-collapse-btn:hover { background:#fff; color:var(--t1); border-color:var(--border-mid); }

/* v5: "All groups" pill sits at the top-left of the floor plan body. Clicking
   it clears the current room selection and sends the right panel back to the
   full-scope Home view. Only visible while the floor plan tab is active. */
.bp-allgroups-btn {
  /* Centered above the floor plan SVG so it reads as a clear "reset to all"
     control rather than a corner pill. translateX(-50%) handles the
     horizontal centering without needing flexbox on the parent. */
  position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:15;
  display:inline-flex; align-items:center; gap:6px;
  height:28px; padding:0 12px 0 10px;
  background:rgba(255,255,255,0.75); border:1px solid var(--border);
  border-radius:999px; cursor:pointer; color:var(--t2);
  font:inherit; font-size:11.5px; font-weight:500;
  letter-spacing:.01em; white-space:nowrap;
  transition:background .12s, color .12s, border-color .12s;
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
}
.bp-allgroups-btn:hover { background:#fff; color:var(--t1); border-color:var(--border-mid); }
.bp-allgroups-btn.active { background:var(--charcoal); border-color:var(--charcoal); color:#fff; }
.bp-allgroups-btn.active:hover { background:var(--charcoal); color:#fff; }
.bp-allgroups-dot { width:8px; height:8px; border-radius:50%; background:var(--charcoal); flex-shrink:0; }
.bp-allgroups-btn.active .bp-allgroups-dot { background:#fff; }

/* ══ BLUEPRINT ══ */
.bp { width:var(--sidebar); flex-shrink:0; display:flex; flex-direction:column; background:var(--bp-bg); border-right:none; overflow:hidden; position:relative; min-width:0; max-width:60%; }
.bp-hdr {
  padding:0 14px; height:52px;
  display:flex; align-items:center; gap:0;
  border-bottom:1px solid rgba(0,0,0,0.08);
  background:rgba(255,255,255,0.28); flex-shrink:0;
}
.bp-hdr-lbl { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--bp-text); font-weight:500; flex:1; }

/* Zoom control in blueprint header */
.bp-zoom {
  display:flex; align-items:stretch;
  background:#fff; border-radius:20px;
  box-shadow:0 1px 6px rgba(0,0,0,.14),0 0 0 1px rgba(0,0,0,.07);
  overflow:hidden;
}
.bp-z-end {
  width:28px; display:flex; align-items:center; justify-content:center;
  background:transparent; border:none; cursor:pointer;
  font-size:16px; font-weight:300; color:var(--t2); font-family:var(--font);
  transition:background .1s;
}
.bp-z-end:hover { background:var(--bg-2); }
.bp-z-track { display:flex; align-items:stretch; border-left:1px solid var(--border); border-right:1px solid var(--border); }
.bp-z-step {
  padding:0 10px; height:28px;
  display:flex; align-items:center;
  font-size:11px; font-weight:500; color:var(--t3);
  cursor:pointer; border:none; background:transparent;
  border-right:1px solid var(--border);
  transition:all .12s; position:relative; font-family:var(--font);
  white-space:nowrap;
}
.bp-z-step:last-child { border-right:none; }
.bp-z-step:hover { color:var(--t1); background:var(--bg-2); }
.bp-z-step.active { color:var(--charcoal); background:var(--bg); font-weight:600; }
.bp-z-step.active::after {
  content:''; position:absolute; bottom:0; left:8px; right:8px;
  height:2px; background:var(--green); border-radius:1px;
}
.bp-body { flex:1; display:flex; align-items:center; justify-content:center; padding:14px; position:relative; overflow:hidden; }

/* SVG room styles */
.room { cursor:pointer; }
.room rect { fill:var(--bp-room); stroke:var(--bp-wall); stroke-width:1.5; transition:fill .15s,stroke .15s,stroke-width .15s; rx:1; }
.room:hover rect { fill:var(--bp-room-h); }
.room.selected rect { stroke-width:0; }
.room-lbl { font-size:8.5px; fill:var(--bp-text); font-family:var(--font); text-anchor:middle; pointer-events:none; font-weight:500; letter-spacing:.06em; text-transform:uppercase; }
.room-sub { font-size:7px; fill:var(--bp-text); font-family:var(--mono); text-anchor:middle; pointer-events:none; opacity:.6; }
.room.selected .room-lbl { fill:#fff; }
.room.selected .room-sub { fill:rgba(255,255,255,.75); }

/* zoom moved to blueprint header */

/* ── RIGHT PANEL HEADER — full width, sits between top nav and main ── */
.rp-hdr {
  height:52px; display:flex; align-items:center;
  padding:0 14px 0 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg-card); flex-shrink:0;
  gap:12px; overflow:visible; position:relative; z-index:10;
}
.rp-hdr-left {
  /* Fixed width matching the floor-plan sidebar below — subtract the .rp-hdr
     left padding (16px) so the rp-hdr-center block begins exactly at the
     left edge of the right content pane, not pushed to the viewport center. */
  flex:0 0 calc(var(--sidebar) - 16px); min-width:0;
  display:flex; align-items:center; gap:14px;
  justify-content:flex-start;
}
.rp-hdr-center {
  /* Page title ("Photo grid") + view toggles, left-aligned to sit at the
     very start of the right content pane. */
  flex:0 0 auto;
  display:flex; align-items:center; gap:14px;
}
.rp-hdr-right {
  flex:1 1 0; min-width:0;
  display:flex; align-items:center; gap:8px;
  justify-content:flex-end;
}
.rp-hdr-vsep {
  width:1px; height:20px; background:var(--border-mid); flex-shrink:0;
}
.rp-add-btn {
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  border:1.5px solid var(--border-mid); border-radius:var(--rm);
  background:transparent; cursor:pointer; color:var(--t2);
  transition:all .14s; flex-shrink:0;
}
.rp-add-btn:hover { background:var(--charcoal); border-color:var(--charcoal); color:#fff; }
.rp-zoom-lbl {
  font-size:14px; font-weight:600; color:var(--t1);
  letter-spacing:-.01em; flex-shrink:0; white-space:nowrap;
}

/* ── NAV TITLE — title + prev/next + dropdown ── */
.nav-title-wrap { display:flex; align-items:center; gap:0; position:relative; }
.nav-title-lbl {
  font-size:15px; font-weight:600; color:var(--t1);
  letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:220px; cursor:pointer; padding:4px 6px 4px 0;
}
.nav-title-lbl:hover { color:var(--green); }
.nav-arrow {
  width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  border:none; background:transparent; cursor:pointer; color:var(--t3);
  border-radius:var(--rm); transition:background .12s, color .12s; flex-shrink:0;
}
.nav-arrow:hover { background:var(--bg-2); color:var(--t1); }
.nav-arrow:disabled { opacity:.25; cursor:default; background:transparent; }
.nav-pos {
  font-size:11px; color:var(--t3); font-family:var(--mono);
  white-space:nowrap; padding:0 4px;
}
/* Dropdown */
.nav-dropdown {
  position:absolute; top:calc(100% + 6px); left:0;
  min-width:260px; max-width:320px;
  background:var(--bg-card); border:1px solid var(--border-mid);
  border-radius:var(--rl); box-shadow:0 8px 24px rgba(0,0,0,.12);
  z-index:300; overflow:hidden;
  max-height:360px; overflow-y:auto;
}
.nav-dropdown::-webkit-scrollbar { width:4px; }
.nav-dropdown::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:2px; }
.nav-dd-header {
  padding:8px 14px 6px; font-size:10px; font-weight:600;
  letter-spacing:.08em; text-transform:uppercase; color:var(--t3);
  border-bottom:1px solid var(--border); background:var(--bg-2);
  position:sticky; top:0;
}
.nav-dd-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 14px; cursor:pointer; border-bottom:1px solid var(--border);
  transition:background .1s; font-size:13px; color:var(--t1);
  border:none; background:transparent; width:100%; text-align:left;
  font-family:var(--font);
}
.nav-dd-item:last-child { border-bottom:none; }
.nav-dd-item:hover { background:var(--bg-2); }
.nav-dd-item.active { background:#f0faf5; }
.nav-dd-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.nav-dd-name { flex:1; font-weight:500; }
.nav-dd-meta { font-size:11px; color:var(--t3); font-family:var(--mono); }
.nav-dd-badge {
  font-size:9px; font-weight:700; padding:1px 5px; border-radius:8px;
  white-space:nowrap; flex-shrink:0; display:inline-flex; align-items:center; gap:3px;
}
.nav-dd-badge.issue { background:#fde8e8; color:#a03030; }
.nav-dd-badge.done  { background:#e8f5e9; color:#2e7d32; }
.rp-chips {
  display:flex; align-items:center; gap:6px; flex:1;
  overflow:hidden; min-width:0;
}
.rp-chip {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:20px;
  border:1px solid var(--border-mid); background:var(--bg-card);
  font-size:11px; font-weight:500; color:var(--t2);
  white-space:nowrap; flex-shrink:0;
}
.rp-chip .rc-dot { width:6px; height:6px; border-radius:50%; }
.rp-chip.rc-alert { border-color:rgba(177,69,65,.3); background:#fef5f5; color:var(--red); }
.rp-chip.rc-green { border-color:rgba(96,146,108,.3); background:#f0faf5; color:var(--green); }
.rp-meta { font-size:12px; color:var(--t3); font-family:var(--mono); white-space:nowrap; }
.rp-tag { display:none; }

/* Icon group — far right */
.rp-icon-group {
  display:flex; align-items:center; gap:4px; flex-shrink:0;
}
.rp-ico-btn {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border:1px solid var(--border-mid); border-radius:var(--rm);
  background:var(--bg-card); cursor:pointer; color:var(--t2);
  transition:background .12s, color .12s;
}
.rp-ico-btn:hover { background:var(--bg-2); color:var(--t1); }
.rp-icon-sep { width:1px; height:20px; background:var(--border-mid); margin:0 2px; }

/* View toggle */
.view-toggle {
  display:flex; align-items:center;
  border:1px solid var(--border-mid); border-radius:var(--rm);
  overflow:hidden;
}
.vt-btn {
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:none; cursor:pointer;
  color:var(--t3); transition:background .12s, color .12s;
  border-right:1px solid var(--border-mid);
}
.vt-btn:last-child { border-right:none; }
.vt-btn:hover { background:var(--bg-2); color:var(--t1); }
.vt-btn.active { background:var(--charcoal); color:#fff; }

/* Walk dropdown */
.rp-walk-dropdown-wrap { position:relative; }
.walk-dropdown {
  position:absolute; top:calc(100% + 8px); right:0;
  width:220px; background:var(--bg-card);

}
.wd-label {
  padding:8px 14px 6px;
  font-size:10px; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--t3);
  border-bottom:1px solid var(--border);
}
.wd-item {
  display:flex; align-items:center; gap:8px;
  width:100%; padding:9px 14px;
  border:none; background:transparent;
  font-size:13px; color:var(--t1); font-family:var(--font);
  cursor:pointer; text-align:left;
  border-bottom:1px solid var(--border);
  transition:background .1s;
}
.wd-item:last-child { border-bottom:none; }
.wd-item:hover { background:var(--bg-2); }
.wd-item.active { font-weight:600; }
.wd-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.wd-date { font-size:11px; color:var(--t3); font-family:var(--mono); margin-left:auto; }

/* ── GROUP HEADER ROW (wireframe style) ── */
/* Compact single line: dot • name • task count • progress bar • change orders */
.g-hdr {
  display:flex; align-items:center; gap:10px;
  padding:10px 0 10px; border-bottom:2px solid transparent;
}
.g-swatch { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.g-name { font-size:14px; font-weight:600; color:var(--t1); }
.g-tasks-count { font-size:12px; color:var(--t3); font-family:var(--mono); flex-shrink:0; }
.g-prog-inline { display:flex; align-items:center; gap:6px; flex:1; }
.g-bar { flex:1; max-width:120px; height:4px; border-radius:2px; background:rgba(0,0,0,.1); overflow:hidden; }
.g-bar-fill { height:100%; border-radius:2px; }
.g-pct { font-size:11px; color:var(--t3); font-family:var(--mono); }
.g-approve-btn {
  padding:4px 12px; border-radius:var(--rm);
  border:1.5px solid var(--border-mid); background:transparent;
  font-size:11px; font-weight:500; color:var(--t1);
  font-family:var(--font); cursor:pointer; flex-shrink:0;
  transition:border-color .12s, background .12s, color .12s;
  white-space:nowrap;
}
.g-approve-btn:hover { border-color:var(--green); color:var(--green); }
.g-approve-btn.g-approve-done {
  border-color:var(--green); color:var(--green);
  background:#f0faf5; cursor:default;
}
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:20px;
  font-size:11px; font-weight:600;
  background:#fde8e8; color:var(--red);
  flex-shrink:0;
}
.g-co-chip::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--red); }
.g-meta { font-size:11px; color:var(--t3); font-family:var(--mono); flex-shrink:0; }
.g-space { flex:1; }

/* Responsive */
@media (max-width:1024px) {
  .t-address { font-size:13px; }
  .info-bar { display:none; }
  .rp-hdr-row1 { padding:8px 14px 6px; }
  .rp-chips { padding:0 14px 8px; }
}
@media (max-width:767px) {
  .toolbar { padding:0 12px; }
  .t-address { font-size:13px; max-width:200px; }
  .t-divider { display:none; }
  .rp-chips { display:none; }
}


/* ── LAYER DOCK — pinned bottom ── */
.layer-dock {
  height:64px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; gap:1px;
  background:rgba(255,255,255,0.96);
  border-top:1px solid rgba(0,0,0,.07); padding:0 8px;
}
.d-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:5px 8px; border-radius:9px; border:none; background:transparent; cursor:pointer; font-family:var(--font); transition:background .12s; position:relative; flex:1; max-width:52px; }
.d-btn:hover { background:var(--bg-2); }
.d-btn.on { background:rgba(0,0,0,.05); }
.d-ico { width:20px; height:20px; display:flex; align-items:center; justify-content:center; opacity:.3; transition:opacity .15s; }
.d-btn.on .d-ico { opacity:1; }
.d-lbl { font-size:8px; font-weight:500; letter-spacing:.02em; color:var(--t3); white-space:nowrap; transition:color .12s; }
.d-btn.on .d-lbl { color:var(--t1); }
.d-pip { position:absolute; top:4px; right:7px; width:5px; height:5px; border-radius:50%; opacity:0; transition:opacity .15s; }
.d-btn.on .d-pip { opacity:1; }
.d-sep { width:1px; height:28px; background:var(--border-mid); margin:0 3px; flex-shrink:0; }

/* ══ RIGHT PANEL ══ */
.rp { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); min-height:0; }

/* ── Task scrubber (Photo grid) ─────────────────────────────────────────────
   Vertical strip that lives between the left sidebar and the right panel.
   Each task is a small tick; the first task of every group is a thicker,
   labeled separator so the user clearly sees when scrolling crosses into a
   new room/group. The thumb is draggable and snaps to the nearest task. */
.rp-scrub { width:38px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; padding:14px 0; background:var(--bg); border-left:1px solid var(--border); border-right:1px solid var(--border); }
.rp-scrub-track { position:relative; width:14px; flex:1; min-height:0; cursor:pointer; }
.rp-scrub-track::before {
  content:''; position:absolute; left:50%; top:0; bottom:0; width:2px;
  transform:translateX(-50%); background:var(--border-mid); border-radius:1px;
}
.rp-scrub-ticks { position:absolute; inset:0; pointer-events:none; }
.rp-scrub-tick {
  position:absolute; left:50%; transform:translateX(-50%);
  width:8px; height:1.5px; background:var(--border-mid); border-radius:1px;
  pointer-events:auto; cursor:pointer; transition:background .12s, width .12s;
}
.rp-scrub-tick:hover { background:var(--t2); width:14px; }
.rp-scrub-tick.is-active { background:var(--t1); width:14px; height:2px; }
/* Group separator — thicker, longer mark + labeled left of the track. The
   label rotates 270° so it reads bottom-up alongside the strip. */
.rp-scrub-tick.is-group {
  width:18px; height:3px; background:var(--charcoal); border-radius:2px;
  box-shadow:0 0 0 2px var(--bg);
}
.rp-scrub-tick.is-group:hover { width:22px; background:var(--t1); }
/* Floating tooltip — appears next to the cursor on hover/drag and shows
   the group + task name. Mirrors the Compare-walks horizontal scrubber's
   float-label affordance; far cleaner than labelling every group notch
   inline (which would stack up on a tall list of rooms). */
.rp-scrub { position:relative; }
.rp-scrub-tip {
  position:absolute; right:calc(100% + 8px); top:0;
  transform:translateY(-50%);
  background:var(--charcoal); color:#fff;
  padding:6px 10px; border-radius:var(--rm);
  font-family:var(--font); white-space:nowrap;
  pointer-events:none; z-index:10;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
  max-width:260px;
}
.rp-scrub-tip::after {
  /* Arrow pointing right toward the track */
  content:''; position:absolute; left:100%; top:50%; transform:translateY(-50%);
  border:5px solid transparent; border-left-color:var(--charcoal);
}
.rp-scrub-tip-grp {
  font-size:11px; font-weight:700; letter-spacing:-.005em; line-height:1.3;
}
.rp-scrub-tip-task {
  font-size:10.5px; font-weight:400; color:rgba(255,255,255,.78);
  margin-top:2px; line-height:1.3;
  overflow:hidden; text-overflow:ellipsis; max-width:240px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; white-space:normal;
}
.rp-scrub-thumb {
  position:absolute; left:50%; transform:translate(-50%, -50%);
  width:24px; height:24px; border-radius:50%;
  background:var(--bg-card); border:2px solid var(--charcoal);
  box-shadow:0 1px 4px rgba(0,0,0,.18);
  cursor:grab; transition:box-shadow .15s, transform .05s;
  display:flex; align-items:center; justify-content:center;
}
.rp-scrub-thumb::after {
  content:''; width:6px; height:6px; border-radius:50%; background:var(--charcoal);
}
.rp-scrub-thumb:hover { box-shadow:0 2px 8px rgba(0,0,0,.25); }
.rp-scrub-thumb.is-dragging { cursor:grabbing; box-shadow:0 4px 12px rgba(0,0,0,.3); }
.rp-body { flex:1; overflow-y:auto; display:flex; flex-direction:column; min-height:0; }
.rp-hdr { padding:13px 26px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--bg-card); flex-shrink:0; }
.rp-title { font-size:17px; font-weight:500; color:var(--t1); flex:1; letter-spacing:-.01em; }
.rp-tag { padding:3px 9px; border-radius:var(--r); font-size:10px; font-weight:500; letter-spacing:.06em; text-transform:uppercase; background:var(--bg-2); color:var(--t2); border:1px solid var(--border); border-left-width:3px; }
.rp-meta { font-size:12px; color:var(--t3); font-family:var(--mono); }
.btn-approve { padding:7px 18px; border-radius:var(--rm); background:var(--green); border:none; color:#fff; font-size:13px; font-weight:600; font-family:var(--font); cursor:pointer; transition:opacity .12s; white-space:nowrap; }
.btn-approve:hover { opacity:.88; }
.btn-approve.done { background:var(--bg-2); color:var(--t3); border:1px solid var(--border); cursor:default; }
.btn-edit { padding:7px 14px; border-radius:var(--rm); background:transparent; border:1.5px solid var(--border-mid); color:var(--t1); font-size:13px; font-weight:500; font-family:var(--font); cursor:pointer; }
.btn-edit:hover { background:var(--bg-2); }

/* ── APPROVAL FOOTER ── */
/* Hidden across all modes per v5 request — the Scope-of-work /
   Approve-all-tasks bar no longer appears at the bottom of the right pane. */
.appr-footer {
  flex-shrink:0; background:var(--bg-card);
  border-top:1px solid var(--border);
  padding:0 20px; height:56px;
  display:none; align-items:center; gap:12px;
}
.appr-footer-info { flex:1; min-width:0; }
.appr-footer-title { font-size:13px; font-weight:600; color:var(--t1); }
.appr-footer-sub { font-size:11px; color:var(--t3); margin-top:1px; }
.appr-footer-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.af-approve {
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 16px; border-radius:var(--rm);
  background:transparent; border:1.5px solid var(--green); color:var(--green);
  font-size:13px; font-weight:600; font-family:var(--font);
  cursor:pointer; transition:all .12s; white-space:nowrap;
}
.af-approve:hover { background:rgba(96,146,108,.08); }
.af-approve.approved {
  background:#e8f5e9; border-color:var(--green); color:#1a6e3a;

}
.af-edit {
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 16px; border-radius:var(--rm);
  background:transparent; border:1.5px solid var(--border-mid);
  color:var(--t1); font-size:13px; font-weight:500; font-family:var(--font);
  cursor:pointer; transition:all .12s; white-space:nowrap;
}
.af-edit:hover { border-color:var(--orange); color:var(--orange); background:#fff8f5; }
/* Task card approval toggle */
.task-appr-toggle {
  width:26px; height:26px; border-radius:50%;
  border:1.5px solid var(--border-mid); background:transparent;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:all .14s; color:var(--t3);
}
.task-appr-toggle:hover { border-color:var(--green); color:var(--green); background:#f0faf5; }
.task-appr-toggle.approved { background:var(--green); border-color:var(--green); color:#fff; }
.approval-pair { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.appr-btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:var(--rm);
  font-size:12px; font-weight:500; font-family:var(--font);
  cursor:pointer; white-space:nowrap; transition:all .14s;
  border:1.5px solid var(--border-mid); background:transparent; color:var(--t2);
}
.appr-btn:hover { border-color:var(--t2); color:var(--t1); background:var(--bg-2); }
.appr-btn.appr-approve { border-color:rgba(96,146,108,.5); color:var(--green); }
.appr-btn.appr-approve:hover { background:#f0faf5; border-color:var(--green); }
.appr-btn.appr-approved { border-color:var(--green); background:#f0faf5; color:var(--green); cursor:default; }
.appr-btn.appr-edit { border-color:var(--border-mid); color:var(--t2); }
.appr-btn.appr-edit:hover { border-color:var(--orange); color:var(--orange); background:#fff8f5; }
.rp-body { flex:1; overflow-y:auto; display:flex; flex-direction:column; min-height:0; }
.rp-body::-webkit-scrollbar { width:4px; }
.rp-body::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:2px; }



/* ══ HOUSE ZOOM — GALLERY ══ */
.gallery { flex:1; overflow-y:auto; padding:22px 24px; display:flex; flex-direction:column; gap:0; }
.gallery::-webkit-scrollbar { width:4px; }

.t-card { border-radius:var(--rl); overflow:hidden; border:2.5px solid transparent; cursor:pointer; position:relative; background:#1a1a1a; transition:transform .18s,box-shadow .18s; aspect-ratio:4/3; }
.t-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.2); }

.t-card:hover .t-img { filter:brightness(.92); }

.t-chip { font-size:10px; font-weight:600; color:#fff; line-height:1.35; letter-spacing:.01em; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.t-count { font-size:9px; color:rgba(255,255,255,.6); font-family:var(--mono); margin-top:1px; }

.photo-badges { position:absolute; top:7px; left:7px; right:7px; display:flex; flex-wrap:wrap; gap:3px; pointer-events:none; }
.badge { display:inline-flex; align-items:center; gap:2px; padding:2px 6px; border-radius:10px; font-size:9px; font-weight:600; letter-spacing:.03em; backdrop-filter:blur(4px); white-space:nowrap; }
.b-budget { background:rgba(96,146,108,.9); color:#fff; }
.b-contractor { background:rgba(86,125,163,.9); color:#fff; }
.b-modifier { background:rgba(232,192,48,.95); color:#3a2e00; }
.b-materials { background:rgba(179,100,62,.9); color:#fff; }
.b-notes { background:rgba(139,93,212,.9); color:#fff; }
.b-activity { background:rgba(255,255,255,.88); color:#1D1D1D; }
.b-issue { background:rgba(177,69,65,.92); color:#fff; }
.b-status-progress   { background:rgba(46,125,143,.92); color:#fff; }
.b-status-completed  { background:rgba(96,146,108,.92); color:#fff; }
.b-status-rework     { background:rgba(212,90,40,.92);  color:#fff; }
.b-status-notstarted { background:rgba(140,140,140,.92); color:#fff; }

.issue-corner { position:absolute; top:0; right:0; width:0; height:0; border-style:solid; border-width:0 26px 26px 0; border-color:transparent var(--red) transparent transparent; }
.issue-corner-x { position:absolute; top:3px; right:3px; font-size:9px; color:#fff; font-weight:700; pointer-events:none; }

/* ══ GROUP ZOOM ══ */
.gh { width:100%; height:210px; flex-shrink:0; position:relative; overflow:hidden; background:#111; }
.gh-grid { display:grid; grid-template-columns:2fr 1fr; grid-template-rows:1fr 1fr; gap:2px; height:100%; }
.gh-thumb { overflow:hidden; }
.gh-inner { width:100%; height:100%; background-size:cover; background-position:center; filter:brightness(.76); transition:filter .2s; }
.gh-thumb:hover .gh-inner { filter:brightness(.95); }

.gh-overlay { position:absolute; bottom:0; left:0; right:0; padding:28px 20px 12px; background:linear-gradient(transparent,rgba(0,0,0,.65)); display:flex; align-items:flex-end; gap:8px; }
.gh-pill { display:flex; align-items:center; gap:5px; padding:4px 11px; border-radius:20px; background:rgba(0,0,0,.38); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.18); font-size:11px; color:rgba(255,255,255,.9); font-family:var(--font); cursor:pointer; }
.gh-space { flex:1; }
.gh-add { padding:4px 12px; border-radius:20px; background:rgba(0,0,0,.38); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.22); font-size:11px; color:rgba(255,255,255,.85); cursor:pointer; font-family:var(--font); }
.gh-accent { position:absolute; top:0; left:0; right:0; height:3px; }

.g-tasks { padding:18px 22px; display:flex; flex-direction:column; gap:8px; }
.t-row { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--rl); overflow:hidden; display:flex; align-items:stretch; cursor:pointer; transition:border-color .15s,box-shadow .15s; border-left:4px solid transparent; }
.t-row:hover { border-color:var(--border-mid); box-shadow:0 2px 8px rgba(0,0,0,.06); }
.t-row-thumb { width:76px; flex-shrink:0; background-size:cover; background-position:center; filter:brightness(.83); }
.t-row-body { flex:1; padding:11px 14px; display:flex; flex-direction:column; justify-content:center; gap:3px; }

.m-sub { font-size:11px; color:var(--t3); margin-top:3px; }
.m-wrap { padding:14px 22px 0; }

/* ══ TASK ZOOM ══ */
.task-strip { display:flex; gap:2px; height:230px; flex-shrink:0; background:#111; overflow:hidden; position:relative; }
.ts-main { flex:2; background-size:cover; background-position:center; filter:brightness(.8); cursor:pointer; transition:filter .2s; }

.task-body { padding:20px 26px 18px; display:flex; flex-direction:column; gap:16px; }

.task-meta-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--rl); overflow:hidden; }
.tmc-title { padding:13px 16px 11px; font-size:14px; font-weight:600; color:var(--t1); line-height:1.4; border-bottom:1px solid var(--border); }
.tmc-rows { padding:6px 16px 10px; display:grid; grid-template-columns:96px 1fr; row-gap:7px; align-items:baseline; }
.ml { font-size:12px; color:var(--t3); }
.mv { font-size:12px; color:var(--t1); }
.mv.green { color:var(--green); font-weight:500; }
.mv.mono { font-family:var(--mono); }
.mod-chip { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:var(--r); border:1px solid var(--border-mid); background:var(--bg-2); font-size:11px; color:var(--t2); cursor:pointer; font-family:var(--font); }
.tmc-footer { padding:9px 16px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.f-pill { display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:20px; border:1px solid var(--border-mid); background:transparent; font-size:12px; color:var(--t2); cursor:pointer; font-family:var(--font); transition:background .1s; }
.f-pill:hover { background:var(--bg-2); }
.f-space { flex:1; }

.data-block { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--rl); overflow:hidden; }
.db-head { padding:9px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:7px; font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--t3); }
.db-dot { width:7px; height:7px; border-radius:50%; }
.db-body { padding:11px 16px; display:flex; flex-direction:column; gap:6px; }
.issue-row { display:flex; align-items:flex-start; gap:10px; padding:9px 12px; border-radius:var(--rm); background:#fef2f2; border-left:3px solid var(--red); }
.issue-txt { font-size:13px; color:var(--t1); flex:1; line-height:1.5; }
.issue-sev { font-size:10px; font-weight:600; padding:2px 7px; border-radius:10px; background:#fde8e8; color:#a03030; flex-shrink:0; }
.note-row { padding:9px 12px; border-radius:var(--rm); background:var(--bg-2); font-size:13px; color:var(--t1); line-height:1.5; border-left:3px solid var(--purple); }
.note-meta { font-size:11px; color:var(--t3); margin-top:3px; }
.act-item { display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-bottom:1px solid var(--border); }
.act-item:last-child { border-bottom:none; }
.act-av { width:26px; height:26px; border-radius:50%; background:var(--bg-2); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:var(--t2); flex-shrink:0; }
.act-txt { font-size:12px; color:var(--t2); flex:1; line-height:1.5; }
.act-txt strong { color:var(--t1); font-weight:500; }
.act-time { font-size:11px; color:var(--t3); font-family:var(--mono); }

/* ── GROUP ZOOM: per-task layer data rows ── */
.t-layer-rows { display:flex; flex-direction:column; gap:0; border-top:1px solid var(--border); }
.t-layer-row { display:flex; align-items:center; gap:8px; padding:6px 14px; border-bottom:1px solid var(--border); font-size:11px; }
.t-layer-row:last-child { border-bottom:none; }
.t-lr-icon { width:14px; height:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; opacity:.7; }
.t-lr-label { color:var(--t3); min-width:70px; flex-shrink:0; }
.t-lr-value { color:var(--t1); flex:1; }
.t-lr-value.green { color:var(--green); font-weight:500; font-family:var(--mono); }
.t-lr-value.red { color:var(--red); }
.t-lr-chip { display:inline-flex; align-items:center; gap:3px; padding:1px 6px; border-radius:8px; font-size:10px; font-weight:600; }
.t-lr-bar-wrap { flex:1; display:flex; align-items:center; gap:6px; }
.t-lr-bar { flex:1; height:3px; border-radius:2px; background:rgba(0,0,0,.1); overflow:hidden; max-width:80px; }
.t-lr-bar-fill { height:100%; border-radius:2px; }

/* ── GROUP ZOOM: layer summary panels (above task list) ── */
.layer-panel { border-radius:var(--rl); border:1px solid var(--border); background:var(--bg-card); overflow:hidden; margin:0 22px; }
.lp-head { padding:9px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:7px; font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--t3); }
.lp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.lp-body { padding:10px 14px; }

/* Contractor grid */
.contractor-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; }
.contractor-card { padding:10px 12px; border-radius:var(--rm); background:var(--bg-2); border:1px solid var(--border); }
.cc-name { font-size:13px; font-weight:500; color:var(--t1); }
.cc-tasks { font-size:11px; color:var(--t3); margin-top:2px; }
.cc-cost { font-size:12px; color:var(--green); font-family:var(--mono); font-weight:500; margin-top:4px; }

/* Budget spend bar */
.budget-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.budget-bar-label { font-size:12px; color:var(--t2); min-width:60px; }
.budget-bar-track { flex:1; height:6px; border-radius:3px; background:var(--bg-2); overflow:hidden; }
.budget-bar-fill { height:100%; border-radius:3px; }
.budget-bar-val { font-size:12px; font-family:var(--mono); color:var(--t2); min-width:52px; text-align:right; }

/* Issue list in group */
.issue-list { display:flex; flex-direction:column; gap:6px; }
.issue-compact { display:flex; align-items:flex-start; gap:8px; padding:8px 10px; border-radius:var(--rm); background:#fef2f2; border-left:3px solid var(--red); }
.ic-task { font-size:10px; font-weight:600; color:var(--red); text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
.ic-text { font-size:12px; color:var(--t1); line-height:1.4; }
.ic-sev { font-size:9px; font-weight:700; padding:2px 6px; border-radius:8px; background:#fde8e8; color:#a03030; flex-shrink:0; margin-top:1px; }

/* Modifier list */
.modifier-list { display:flex; flex-direction:column; gap:5px; }
.mod-row { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:var(--rm); background:var(--bg-2); }
.mod-task-name { font-size:12px; color:var(--t1); flex:1; }
.mod-type { font-size:10px; font-weight:600; padding:2px 7px; border-radius:8px; background:rgba(212,160,23,.15); color:#7a5a00; }
.mod-set-by { font-size:11px; color:var(--t3); }

/* Note previews */
.note-previews { display:flex; flex-direction:column; gap:6px; }
.note-preview { padding:8px 10px; border-radius:var(--rm); background:var(--bg-2); border-left:3px solid var(--purple); }
.np-task { font-size:10px; font-weight:600; color:var(--purple); text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
.np-text { font-size:12px; color:var(--t1); line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.np-meta { font-size:10px; color:var(--t3); margin-top:2px; }

/* Activity compact */
.act-compact { display:flex; flex-direction:column; gap:0; }
.ac-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; color:var(--t2); }
.ac-row:last-child { border-bottom:none; }
.ac-av { width:22px; height:22px; border-radius:50%; background:var(--bg-2); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:600; color:var(--t2); flex-shrink:0; }
.ac-txt { flex:1; }
.ac-txt strong { color:var(--t1); font-weight:500; }
.ac-time { font-size:11px; color:var(--t3); font-family:var(--mono); }

/* Materials compact */
.mat-grid { display:grid; grid-template-columns:1fr auto auto; gap:6px 12px; font-size:12px; align-items:center; }
.mat-hdr { font-size:10px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--t3); }
.mat-name { color:var(--t1); }
.mat-qty { font-family:var(--mono); color:var(--t2); text-align:right; }

/* Home zoom: group-level layer summary strip on each group header */
.g-layer-strip { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.g-layer-item { display:flex; align-items:center; gap:5px; padding:3px 8px; border-radius:8px; background:var(--bg-card); border:1px solid var(--border); font-size:11px; color:var(--t2); }
.g-layer-item .gli-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.g-layer-item .gli-val { font-weight:500; color:var(--t1); }

/* ── HOME: group-level layer rollup strips ── */
.h-rollup-row { display:flex; gap:6px; flex-wrap:wrap; width:100%; margin-top:7px; }
.h-rollup { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:8px; background:var(--bg-card); border:1px solid var(--border); font-size:11px; color:var(--t2); }
.h-rollup-alert { border-color:rgba(177,69,65,.25); background:#fef5f5; color:var(--red); }
.h-rollup-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.h-rollup-val { font-weight:500; color:var(--t1); }
.h-rollup-alert .h-rollup-val { color:var(--red); }
.h-rollup-bar-wrap { display:flex; align-items:center; }
.h-rollup-bar-track { width:48px; height:3px; border-radius:2px; background:rgba(0,0,0,.1); overflow:hidden; }
.h-rollup-bar-fill { height:100%; border-radius:2px; }

/* ── HOME: per-photo status dot cluster ── */
.dot-cluster { position:absolute; top:7px; right:7px; display:flex; gap:3px; align-items:center; }
.status-dot { width:8px; height:8px; border-radius:50%; box-shadow:0 0 0 1.5px rgba(255,255,255,.7); flex-shrink:0; }
.status-dot-alert { animation:pulse-dot 1.8s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.5} }

/* Sec header */
.s-hdr { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
.s-title { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); }
.s-count { font-size:10px; font-family:var(--mono); color:var(--t3); background:var(--bg-2); padding:1px 6px; border-radius:10px; }
.s-line { flex:1; height:1px; background:var(--border); }

/* ── RESPONSIVE BREAKPOINTS ── */

/* Large desktop (1200px+): full two-column layout, sidebar fixed */
@media (max-width: 1199px) {
  :root { --sidebar: 320px; }
  .task-grid { grid-template-columns: repeat(2,1fr); }
  .m-row { grid-template-columns: repeat(2,1fr); }
  .rp-hdr { padding: 11px 18px; gap: 8px; }
  .rp-title { font-size: 15px; }
  .task-body { padding: 14px 18px; }
  .gallery { padding: 16px 16px; }
  .g-tasks { padding: 14px 16px; }
  .layer-panel { margin: 0 16px; }
}

/* Tablet (768px–1024px): narrower sidebar, tighter everything */
@media (max-width: 1024px) {
  :root { --sidebar: 280px; }
  .t-crumb { display: none; }
  .t-sep { display: none; }
  .d-lbl { display: none; }
  .d-btn { max-width: 40px; padding: 6px 6px; }
  .layer-dock { gap: 0; }
  .zoom-pill { bottom: 60px; }
  .task-grid { grid-template-columns: repeat(2,1fr); }
  .contractor-grid { grid-template-columns: 1fr; }
  .m-row { grid-template-columns: repeat(2,1fr); }
  .gh { height: 180px; }
  .task-strip { height: 180px; }
  .rp-meta { display: none; }
  .btn-edit { display: none; }
}

/* Mobile (< 768px): stacked layout, blueprint becomes top nav strip */
@media (max-width: 767px) {
  :root { --sidebar: 100%; --toolbar: 44px; }

  .app { height: 100dvh; }

  /* Stack blueprint above right panel on mobile */
  .main { flex-direction: column; }

  .bp {
    width: 100%;
    height: 220px;
    flex-shrink: 0;
    border-right: none;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }
  .bp-body { padding: 8px; }
  .bp-hdr-addr { display: none; }

  /* Zoom pill repositions */
  .zoom-pill { bottom: 68px; }

  /* Layer dock spans full width */
  .layer-dock { height: 56px; padding:0 4px; }
  .d-btn { max-width: none; flex: 1; padding: 4px 2px; }
  .d-lbl { display: block; font-size: 7.5px; }
  .d-sep { display: none; }

  /* Right panel fills remaining height */
  .rp { flex: 1; min-height: 0; }
  .rp-hdr { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
  .rp-title { font-size: 14px; min-width: 0; }
  .btn-approve { font-size: 12px; padding: 6px 12px; }
  .btn-edit { display: none; }
  .rp-meta { width: 100%; order: 3; font-size: 11px; }
  .rp-tag { order: 2; }

  /* Gallery */
  .gallery { padding: 12px; gap: 18px; }
  .task-grid { grid-template-columns: repeat(2,1fr); gap: 6px; }
  .g-hdr { flex-wrap: wrap; gap: 6px; }
  .g-prog { display: none; }
  .g-space { display: none; }
  .h-rollup-row { display: none; }

  /* Group view */
  .gh { height: 150px; }
  .g-tasks { padding: 12px; gap: 7px; }
  .t-row-thumb { width: 60px; }
  .layer-panel { margin: 0 12px; }
  .m-row { grid-template-columns: 1fr; gap: 8px; }
  .m-wrap { padding: 12px 12px 0; }
  .contractor-grid { grid-template-columns: 1fr; }

  /* Task view */
  .task-strip { height: 160px; }
  .ts-side { display: none; }
  .task-body { padding: 12px 14px; gap: 12px; }
  .tmc-rows { grid-template-columns: 80px 1fr; }
}

/* Very small screens */
@media (max-width: 380px) {
  .task-grid { grid-template-columns: 1fr 1fr; gap: 5px; }
  .d-lbl { display: none; }
  .d-btn { max-width: 36px; }
}


/* ── VIEW TOGGLE ── */
.view-toggle {
  display:flex; align-items:center;
  border:1px solid var(--border-mid); border-radius:var(--rm);
  overflow:hidden; flex-shrink:0;
}
.vt-btn {
  width:30px; height:28px;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:none; cursor:pointer;
  color:var(--t3); transition:background .12s, color .12s;
  border-right:1px solid var(--border-mid);
}
.vt-btn:last-child { border-right:none; }
.vt-btn:hover { background:var(--bg-2); color:var(--t1); }
.vt-btn.active { background:var(--charcoal); color:#fff; }

/* Mode title — page-level heading in the menu bar. Reads as the title of
   whichever view the user is in (Photo grid / Table view / Compare walks /
   Scope review), sized + weighted to stand out. */
.vt-mode-label {
  display:inline-flex; align-items:center;
  font:inherit; font-size:17px; font-weight:600; color:var(--t1);
  letter-spacing:-.01em; white-space:nowrap; flex-shrink:0;
}

/* ── DATA TABLE ── */
.dt-wrap {
  flex:1; overflow-y:auto; padding:20px 24px;
  display:flex; flex-direction:column; gap:20px;
}
.dt-wrap::-webkit-scrollbar { width:4px; }
.dt-wrap::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:2px; }

.dt-section { display:flex; flex-direction:column; gap:0; }
.dt-section-head {
  display:flex; align-items:center; gap:8px;
  padding-bottom:8px; margin-bottom:0;
}
.dt-section-name { font-size:12px; font-weight:600; color:var(--t1); }
.dt-section-meta { font-size:11px; color:var(--t3); font-family:var(--mono); }

table.dt {
  width:100%; border-collapse:collapse;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--rl);
  overflow:hidden;
  font-size:12px;
}
table.dt thead tr {
  background:var(--bg-2);
  border-bottom:1px solid var(--border-mid);
}
table.dt th {
  padding:8px 12px;
  text-align:left;
  font-size:10px; font-weight:600;
  letter-spacing:.07em; text-transform:uppercase;
  color:var(--t3); white-space:nowrap;
}
table.dt th.sortable {
  cursor:pointer; user-select:none;
}
table.dt th.sortable:hover { color:var(--t1); }
table.dt th.sort-asc::after  { content:' ↑'; color:var(--t1); }
table.dt th.sort-desc::after { content:' ↓'; color:var(--t1); }
table.dt th.sort-asc,
table.dt th.sort-desc { color:var(--t1); }

/* Filter bar */
.dt-filter-bar {
  display:flex; align-items:center; gap:6px;
  padding:10px 0 2px; flex-wrap:wrap;
}
.dt-filter-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px;
  border:1px solid var(--border-mid);
  background:var(--bg-card);
  font-size:11px; color:var(--t2); cursor:pointer;
  transition:all .12s; white-space:nowrap;
}
.dt-filter-chip:hover { border-color:var(--t2); color:var(--t1); }
.dt-filter-chip.active { background:var(--charcoal); color:#fff; border-color:var(--charcoal); }
.dt-filter-chip svg { opacity:.5; }
.dt-filter-chip.active svg { opacity:.8; }
.dt-filter-label { font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--t3); padding:0 4px; align-self:center; }
table.dt th:first-child { border-radius:var(--rl) 0 0 0; }
table.dt th:last-child  { border-radius:0 var(--rl) 0 0; }
table.dt td {
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  color:var(--t1); vertical-align:middle;
}
table.dt tr:last-child td { border-bottom:none; }
table.dt tr:hover td { background:var(--bg-2); }
.dt-name { font-weight:500; }
.dt-mono { font-family:var(--mono); color:var(--t2); }
.dt-green { font-family:var(--mono); color:var(--green); font-weight:500; }
.dt-red   { color:var(--red); }
.dt-bar-wrap { display:flex; align-items:center; gap:8px; min-width:100px; }
.dt-bar { flex:1; height:4px; border-radius:2px; background:var(--bg-2); overflow:hidden; }
.dt-bar-fill { height:100%; border-radius:2px; }
.dt-chip { display:inline-flex; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:600; letter-spacing:.04em; white-space:nowrap; }
.dt-left-border { border-left:3px solid transparent; }

/* House table: one section per group, collapsible */
.dt-group-row {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--rl);
  cursor:pointer;
  transition:box-shadow .12s, border-color .12s;
}
.dt-group-row:hover { border-color:var(--border-mid); box-shadow:0 2px 8px rgba(0,0,0,.05); }
.dt-group-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dt-group-name { font-size:13px; font-weight:600; color:var(--t1); min-width:130px; }
.dt-group-phase { font-size:11px; color:var(--t3); font-family:var(--mono); min-width:80px; }
.dt-group-tasks { font-size:11px; color:var(--t3); min-width:60px; }
.dt-spacer { flex:1; }

/* Task table full detail layout */
.dt-detail { display:grid; grid-template-columns:140px 1fr; row-gap:10px; align-items:start; padding:16px 20px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--rl); }
.dt-detail-label { font-size:12px; color:var(--t3); padding-top:1px; }
.dt-detail-value { font-size:12px; color:var(--t1); }
.dt-detail-divider { grid-column:1/-1; height:1px; background:var(--border); margin:4px 0; }

/* Wider aspect, room-color top bar, no scrim text */
.group-photo-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 9px;
  margin-bottom: 9px;
}
.g-photo-card {
  position: relative;
  border-radius: var(--rl);
  overflow: hidden;
  aspect-ratio: 16/9;
  background: #1a1a1a;
  cursor: pointer;
  transition: transform .18s, box-shadow .18s;
  border-top: 3px solid transparent;
}
.g-photo-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.18); }
.g-photo-img {
  width: 100%; height: 100%;
  background-size: cover; background-position: center;
  filter: brightness(.82);
  transition: filter .2s;
}
.g-photo-card:hover .g-photo-img { filter: brightness(.96); }
/* Group photos */
.g-photo-walk-badge {
  position: absolute;
  bottom: 7px; right: 7px;
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 10px;
  font-size: 9px; font-weight: 700; letter-spacing: .04em;
  backdrop-filter: blur(6px);
  pointer-events: none;
}

/* ── Walk dot styles ── */
.walk-badge { position:absolute; top:7px; left:7px; display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:10px; font-size:9px; font-weight:700; letter-spacing:.04em; backdrop-filter:blur(6px); pointer-events:none; }
.wb-initial   { background:rgba(30,30,30,.78);   color:#fff; }
.wb-progress  { background:rgba(86,125,163,.88);  color:#fff; }
.wb-closeout  { background:rgba(96,146,108,.88);  color:#fff; }
.wb-co        { background:rgba(179,100,62,.88);  color:#fff; }
.wdot-initial   { background:#555; }
.wdot-p1        { background:var(--blue); }
.wdot-p2        { background:#5BAED4; }
.wdot-closeout  { background:var(--green); }
.wdot-co        { background:var(--orange); }
.walk-tab .wt-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.walk-tab .wt-date { font-size:10px; color:var(--t3); font-family:var(--mono); margin-left:2px; }

/* ── PHOTO DETAIL OVERLAY ── */
.photo-overlay {
  position:fixed; inset:0; z-index:1000;
  display:flex; align-items:center; justify-content:center;
  padding:7vh 7vw;
  background:rgba(0,0,0,.55);
  animation:overlayIn .18s ease;
}
@keyframes overlayIn { from{opacity:0} to{opacity:1} }

/* Inner modal wrapper — bounds the photo + detail panes so the backdrop
   around them stays visible, letting the page peek through. */
.po-modal {
  display:flex; flex-direction:row;
  width:100%; height:100%;
  max-width:min(1200px, 86vw);
  max-height:min(780px, 86vh);
  background:#000;
  border-radius:16px; overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.po-photo-side {
  flex:1.4; display:flex; flex-direction:column;
  position:relative; min-width:0;
}
.po-img {
  flex:1; background-size:contain; background-repeat:no-repeat;
  background-position:center; background-color:#000;
  transition:background-image .15s;
}
.po-nav {
  position:absolute; top:50%; transform:translateY(-50%);
  display:flex; align-items:center; justify-content:center;
  width:40px; height:40px; border-radius:50%;
  background:rgba(255,255,255,.12); border:none; cursor:pointer;
  color:#fff; font-size:20px; transition:all .15s;
  flex-direction:column; gap:0;
}
.po-nav:hover { background:rgba(255,255,255,.24); }
.po-nav.prev { left:16px; }
.po-nav.next { right:16px; }
.po-nav:disabled { opacity:.25; cursor:default; }
/* At-boundary state — same circle but visually distinct */
.po-nav.boundary {
  background:rgba(255,255,255,.22);
  border:1.5px solid rgba(255,255,255,.4);
}
/* Task transition flash */
.po-task-flash {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(29,29,29,.82); backdrop-filter:blur(12px);
  color:#fff; border-radius:10px; padding:12px 20px;
  text-align:center; pointer-events:none;
  animation:flashIn .2s ease, flashOut .4s ease 1.2s forwards;
  z-index:20;
}
.po-task-flash-label { font-size:10px; color:rgba(255,255,255,.5); margin-bottom:4px; letter-spacing:.06em; text-transform:uppercase; }
.po-task-flash-name { font-size:14px; font-weight:600; }
@keyframes flashIn  { from{opacity:0;transform:translate(-50%,-54%)} to{opacity:1;transform:translate(-50%,-50%)} }
@keyframes flashOut { from{opacity:1} to{opacity:0;pointer-events:none} }

.po-photo-meta {
  padding:10px 20px 12px; display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.po-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; transition:background .12s; }
.po-dot.active { background:#fff; }
.po-stage-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px; border-radius:10px;
  font-size:11px; font-weight:600; color:#fff;
  backdrop-filter:blur(4px);
}
.po-attr {
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:rgba(255,255,255,.55);
  margin-left:auto;
}
.po-attr svg { opacity:.7; }

.po-detail-side {
  width:340px; flex-shrink:0;
  background:var(--bg-card); display:flex; flex-direction:column;
  overflow-y:auto; position:relative;
}
.po-detail-side::-webkit-scrollbar { width:4px; }
.po-detail-side::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:2px; }

.po-close {
  position:absolute; top:14px; right:14px; z-index:10;
  width:30px; height:30px; border-radius:50%;
  background:var(--bg-2); border:1px solid var(--border-mid);
  cursor:pointer; color:var(--t2); font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:background .12s, color .12s; line-height:1;
}
.po-close:hover { background:var(--bg-2); color:var(--t1); border-color:var(--t2); }

.po-actions {
  display:flex; align-items:center; gap:8px;
  padding:10px 16px; flex-shrink:0;
  background:rgba(0,0,0,.55); backdrop-filter:blur(8px);
  border-top:1px solid rgba(255,255,255,.08);
}

/* ── DETAIL PANEL SECTIONS ── */
.po-section {
  padding:0 18px;
  border-bottom:1px solid var(--border);
}
.po-section:last-of-type { border-bottom:none; }
.po-section-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--t3);
  padding:12px 0 8px; margin-bottom:0;
}
.po-grid {
  display:grid; grid-template-columns:100px 1fr;
  row-gap:8px; align-items:start;
}
.po-grid-lbl { font-size:12px; color:var(--t3); padding-top:1px; }
.po-grid-val { font-size:12px; color:var(--t1); }
.po-grid-val.green { color:var(--green); font-weight:600; font-family:var(--mono); }
.po-grid-val.mono  { font-family:var(--mono); }
/* Materials table */
.po-mat-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:6px; }
.po-mat-table th {
  font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
  color:var(--t3); padding:0 8px 6px; text-align:left; border-bottom:1px solid var(--border);
}
.po-mat-table th:last-child,.po-mat-table td:last-child { text-align:right; }
.po-mat-table td {
  padding:8px 8px; border-bottom:1px solid var(--border);
  color:var(--t1); vertical-align:middle;
}
.po-mat-table tr:last-child td { border-bottom:none; }
.po-mat-table .labor-hdr td {
  background:var(--bg-2); font-size:10px; font-weight:600;
  letter-spacing:.07em; text-transform:uppercase; color:var(--t3);
  padding:5px 8px;
}
.po-mat-thumb {
  width:36px; height:36px; border-radius:var(--r);
  background:var(--bg-2); overflow:hidden; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.po-mat-thumb img { width:100%; height:100%; object-fit:cover; }
/* Activity timeline */
.po-timeline { display:flex; flex-direction:column; gap:0; position:relative; padding-left:26px; }
.po-timeline::before {
  content:''; position:absolute; left:7px; top:8px; bottom:8px;
  width:1.5px; background:var(--border-mid); border-radius:1px;
}
.po-tl-item { position:relative; padding-bottom:14px; }
.po-tl-item:last-child { padding-bottom:0; }
.po-tl-dot {
  position:absolute; left:-22px; top:3px;
  width:10px; height:10px; border-radius:50%;
  background:var(--bg-card); border:2px solid var(--border-mid);
  flex-shrink:0;
}
.po-tl-dot.green { border-color:var(--green); background:var(--green); }
.po-tl-dot.blue  { border-color:var(--blue); }
.po-tl-dot.red   { border-color:var(--red); }
.po-tl-dot.purple{ border-color:var(--purple); }
.po-tl-who { font-size:12px; font-weight:600; color:var(--t1); }
.po-tl-action { font-size:12px; color:var(--t2); }
.po-tl-time { font-size:10px; color:var(--t3); font-family:var(--mono); margin-top:2px; }
  padding:16px 18px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.po-task-name { font-size:15px; font-weight:600; color:var(--t1); line-height:1.4; margin-bottom:2px; }
.po-group-tag {
  display:inline-flex; align-items:center; gap:5px;
  font-size:12px; color:var(--t3);
}
.po-group-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

.po-rows {
  padding:12px 18px; display:grid;
  grid-template-columns:100px 1fr; row-gap:9px; align-items:start;
}
.po-lbl { font-size:12px; color:var(--t3); padding-top:1px; }
.po-val { font-size:12px; color:var(--t1); }
.po-val.green { color:var(--green); font-weight:500; font-family:var(--mono); }
.po-val.red   { color:var(--red); }
.po-val.mono  { font-family:var(--mono); }
.po-divider { grid-column:1/-1; height:1px; background:var(--border); margin:3px 0; }

.po-note { padding:0 18px 14px; }
.po-note-box {
  padding:9px 12px; border-radius:var(--rm);
  background:var(--bg-2); font-size:12px; color:var(--t1); line-height:1.55;
  border-left:3px solid var(--purple);
}
.po-issue-box {
  padding:9px 12px; border-radius:var(--rm);
  background:#fef2f2; font-size:12px; color:var(--red); line-height:1.55;
  border-left:3px solid var(--red); margin-top:8px;
}

.po-footer {
  margin-top:auto; padding:10px 16px;
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  flex-shrink:0; background:var(--bg-card);
  position:sticky; bottom:0;
}
.po-btn-approve {
  flex:1; padding:9px; border-radius:var(--rm);
  background:var(--green); border:none; color:#fff;
  font-size:13px; font-weight:600; font-family:var(--font); cursor:pointer;
  transition:opacity .12s;
}
.po-btn-approve:hover { opacity:.88; }
.po-btn-approve.done { background:var(--bg-2); color:var(--t3); cursor:default; }
.po-btn-edit {
  padding:9px 14px; border-radius:var(--rm);
  background:transparent; border:1.5px solid var(--border-mid);
  font-size:13px; font-weight:500; color:var(--t1);
  font-family:var(--font); cursor:pointer;
}
.po-btn-edit:hover { background:var(--bg-2); }

/* Attribution badges — on photo cards */
.attr-badge {
  position:absolute; bottom:5px; right:5px;
  display:inline-flex; align-items:center; justify-content:center;
  border-radius:4px; font-size:9px; font-weight:700;
  padding:2px 5px; backdrop-filter:blur(6px);
  pointer-events:none; z-index:2; letter-spacing:.02em;
  white-space:nowrap; gap:2px;
}
.attr-field {
  background:rgba(0,0,0,.45); color:rgba(255,255,255,.85);
}
.attr-office {
  background:rgba(255,255,255,.88); color:var(--t2);
  border:1px solid rgba(0,0,0,.12);
}
.attr-ai {
  background:var(--purple); color:#fff;
  letter-spacing:.05em;
}

@media (max-width:767px) {
  .photo-overlay { padding:2vh 2vw; }
  .po-modal { flex-direction:column; max-width:96vw; max-height:94vh; }
  .po-detail-side { width:100%; max-height:45%; }
  .po-nav.prev { left:8px; }
  .po-nav.next { right:8px; }
}


/* ══ DATA LAYER DISPLAY SYSTEM ══ */

/* HOME zoom: dot cluster on photo cards */
.dot-cluster {
  position:absolute; top:7px; right:7px;
  display:flex; gap:3px; align-items:center; z-index:3;
}
.status-dot {
  width:9px; height:9px; border-radius:50%;
  box-shadow:0 0 0 1.5px rgba(255,255,255,.7);
  flex-shrink:0;
}
.status-dot-alert { animation:pulse-dot 1.8s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.45} }

/* HOME zoom: group header layer summary strip */
.h-rollup-row {
  display:flex; gap:5px; flex-wrap:wrap;
  width:100%; margin-top:6px;
}
.g-layer-item {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:10px;
  background:var(--bg-card); border:1px solid var(--border);
  font-size:11px; color:var(--t2); white-space:nowrap;
}
.gli-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.gli-val { font-weight:500; color:var(--t1); }

/* HOME zoom: photo card badge (task name bottom, layer badges top-left) */
.photo-badges {
  position:absolute; top:7px; left:7px; right:28px;
  display:flex; flex-wrap:wrap; gap:3px; pointer-events:none; z-index:3;
}
.badge {
  display:inline-flex; align-items:center; gap:2px;
  padding:2px 6px; border-radius:10px;
  font-size:9px; font-weight:600; letter-spacing:.03em;
  backdrop-filter:blur(4px); white-space:nowrap;
}
.b-budget     { background:rgba(96,146,108,.9);  color:#fff; }
.b-contractor { background:rgba(86,125,163,.9);  color:#fff; }
.b-modifier   { background:rgba(212,160,23,.92); color:#3a2e00; }
.b-materials  { background:rgba(179,100,62,.9);  color:#fff; }
.b-notes      { background:rgba(139,93,212,.9);  color:#fff; }
.b-activity   { background:rgba(255,255,255,.88);color:#1D1D1D; }
.b-issue      { background:rgba(177,69,65,.92);  color:#fff; }
.b-status-progress   { background:rgba(46,125,143,.92); color:#fff; }
.b-status-completed  { background:rgba(96,146,108,.92); color:#fff; }
.b-status-rework     { background:rgba(212,90,40,.92);  color:#fff; }
.b-status-notstarted { background:rgba(140,140,140,.92); color:#fff; }

/* GROUP zoom: per-task layer rows */
.task-layer-rows {
  padding:0 12px 8px;
  display:flex; flex-direction:column; gap:4px;
  border-top:1px solid var(--border);
}
.task-layer-row {
  display:flex; align-items:baseline; gap:6px;
  padding:5px 0; border-bottom:1px solid var(--border);
  font-size:11px;
}
.task-layer-row:last-child { border-bottom:none; }
.tlr-label { color:var(--t3); min-width:72px; flex-shrink:0; }
.tlr-value { color:var(--t1); flex:1; }
.tlr-value.green { color:var(--green); font-weight:500; font-family:var(--mono); }
.tlr-value.red   { color:var(--red); }
.tlr-chip {
  display:inline-flex; padding:1px 6px; border-radius:8px;
  font-size:10px; font-weight:600;
}

/* GROUP zoom: layer summary panel above task list */
.layer-summary-panel {
  border-bottom:1px solid var(--border);
  padding:10px 14px; background:var(--bg-2); flex-shrink:0;
}
.lsp-row {
  display:flex; align-items:center; gap:8px;
  font-size:12px; padding:4px 0;
  border-bottom:1px solid var(--border);
}
.lsp-row:last-child { border-bottom:none; }
.lsp-icon { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.lsp-label { color:var(--t3); min-width:80px; }
.lsp-val   { color:var(--t1); font-weight:500; }
.lsp-val.green { color:var(--green); font-family:var(--mono); }
.lsp-val.red   { color:var(--red); }

/* TASK zoom: layer data blocks in detail panel */
.po-layer-block {
  padding:0 18px 12px; border-bottom:1px solid var(--border);
}
.po-layer-head {
  font-size:10px; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--t3);
  padding:10px 0 6px; display:flex; align-items:center; gap:6px;
}
.po-layer-head .plh-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.po-layer-rows { display:flex; flex-direction:column; gap:5px; }
.po-layer-row { display:flex; align-items:baseline; gap:8px; font-size:12px; }
.plr-label { color:var(--t3); min-width:90px; flex-shrink:0; }
.plr-val   { color:var(--t1); }
.plr-val.green { color:var(--green); font-weight:500; font-family:var(--mono); }

/* ── BLUEPRINT VIEW TABS — lives above the floor plan body ── */
.bp-view-tabs {
  display:flex; align-items:stretch; flex-shrink:0;
  border-bottom:1px solid rgba(0,0,0,.08);
  background:rgba(255,255,255,.28); overflow-x:auto;
  scrollbar-width:none;
}
.bp-view-tabs::-webkit-scrollbar { display:none; }
.bp-view-tab {
  display:inline-flex; align-items:center; gap:5px;
  padding:0 12px; height:44px; flex-shrink:0;
  font-size:11px; font-weight:500; color:var(--bp-text);
  background:none; border:none; cursor:pointer;
  font-family:var(--font); border-top:2px solid transparent;
  transition:color .12s, border-color .12s; white-space:nowrap;
  letter-spacing:.01em;
}
.bp-view-tab:hover { color:var(--t1); }
.bp-view-tab.active { color:var(--charcoal); font-weight:600; border-top-color:transparent; border-bottom:2px solid var(--green); }

/* Close/hide button inside the top tab strip — sticky at the right edge so it
   stays visible while the tab row scrolls horizontally. */
.bp-view-close {
  position:sticky; right:0;
  margin-left:auto;
  width:34px; height:44px;
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--bp-bg); border:none; cursor:pointer;
  color:var(--t3); flex-shrink:0;
  border-top:2px solid transparent;
  box-shadow:-8px 0 10px -6px rgba(0,0,0,.12);
  transition:color .12s, background .12s;
}
.bp-view-close:hover { color:var(--t1); background:#fff; }
.bp-alt-view {
  position:absolute; inset:0; overflow-y:auto;
  display:flex; align-items:center; justify-content:center;
  padding:14px;
}
.bp-alt-inner {
  display:flex; flex-direction:column; align-items:center;
  gap:14px; width:100%;
}
.bp-alt-badge {
  font-size:9px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--bp-text);
  background:rgba(0,0,0,.07); padding:2px 8px;
  border-radius:10px; opacity:.7;
}

/* ── GROUPS VIEW — expandable group/task cards on the left panel ── */
/* Override the centered layout so long card lists scroll from the top. */
#bp-view-groups, #bp-view-contractors { align-items:flex-start; justify-content:flex-start; }
.bp-groups-inner {
  align-items:stretch; gap:10px; padding:4px 2px 8px;
}
.gf-card {
  border:1px solid var(--border);
  border-radius:10px; background:var(--bg-card);
  overflow:hidden; width:100%;
  transition:border-color .12s;
}
.gf-card:hover { border-color:var(--border-mid); }
.gf-card.selected { border-color:var(--charcoal); box-shadow:0 0 0 1px var(--charcoal) inset; }
/* Scroll/scrub-driven highlight — fired by __syncScopeHighlight as the user
   scrubs through tasks in the Compare timeline. Visually distinct from the
   .selected click state so the user can tell "this is what I'm currently
   looking at" vs "this is what I've actively selected". */
.gf-card.scope-sync-active { border-color:var(--charcoal); box-shadow:0 0 0 1px var(--charcoal) inset, 0 1px 6px rgba(0,0,0,.08); }
.gf-task.scope-sync-active { background:var(--bg-2); box-shadow:inset 3px 0 0 0 var(--charcoal); }

/* "All groups" summary card — sits above the per-group list and lets the user
   zoom back out to the full-scope Home view. No expand/collapse behaviour. */
.gf-card-all { background:var(--bg-2); border-color:var(--border-mid); }
.gf-card-all .gf-head { background:transparent; cursor:pointer; }
.gf-card-all .gf-head:hover { background:rgba(0,0,0,.03); }
.gf-card-all .gf-title { font-weight:600; color:var(--t1); }
.gf-card-all .gf-chev { display:none; }
.gf-card-all.selected { border-color:var(--charcoal); box-shadow:0 0 0 1px var(--charcoal) inset; }

.gf-head {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px;
  background:var(--bg-card);
  cursor:pointer;
  border-bottom:1px solid transparent;
  transition:background .12s;
}
.gf-head:hover { background:var(--bg-2); }
.gf-card.expanded .gf-head { border-bottom-color:var(--border); }
.gf-dot {
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0;
}
.gf-title {
  font-size:13px; font-weight:600; color:var(--t1);
  line-height:1.2; flex:1; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.gf-sqft {
  font-size:11px; font-weight:500; color:var(--t3);
  font-family:var(--mono); letter-spacing:.02em;
  margin-left:2px;
}
.gf-group-note {
  font-size:11.5px; line-height:1.4; color:var(--t2);
  background:var(--bg-2);
  padding:7px 12px;
  border-bottom:1px solid var(--border);
}
.gf-group-note-label {
  font-weight:600; color:var(--t1); margin-right:4px;
}
.gf-task-category {
  font-size:10px; font-weight:600; color:var(--t2);
  text-transform:none; letter-spacing:.01em;
  line-height:1.25; margin-bottom:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.gf-task.done .gf-task-category { color:var(--t3); }
.gf-count {
  font-size:11px; color:var(--t3); font-weight:500;
  white-space:nowrap; flex-shrink:0;
}
.gf-total {
  font-size:12px; font-weight:600; color:var(--t2);
  font-family:var(--mono); letter-spacing:-.01em;
  white-space:nowrap; flex-shrink:0;
}
.gf-chev {
  width:20px; height:20px; border-radius:4px;
  display:inline-flex; align-items:center; justify-content:center;
  color:var(--t3); flex-shrink:0;
  transition:transform .18s, background .12s, color .12s;
}
.gf-head:hover .gf-chev { color:var(--t1); }
.gf-card.expanded .gf-chev { transform:rotate(180deg); }
.gf-body { display:none; }
.gf-card.expanded .gf-body { display:block; }
.gf-task {
  padding:9px 12px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .12s;
}
.gf-task:hover { background:var(--bg-2); }
.gf-task:last-child { border-bottom:none; }
.gf-task-name {
  font-size:12.5px; font-weight:500; color:var(--t1);
  line-height:1.3; margin-bottom:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.gf-task.done .gf-task-name {
  color:var(--t3);
}
.gf-task-meta {
  display:flex; align-items:center; gap:8px;
  flex-wrap:wrap;
}
.gf-task-cost {
  font-size:11px; font-weight:600; color:var(--green);
  font-family:var(--mono); white-space:nowrap;
}
.gf-task-ctor {
  font-size:11px; color:var(--t3); font-weight:500;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:140px;
}
.gf-task-mod {
  font-size:10px; font-weight:600; color:var(--t2);
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:10px; padding:1px 7px;
  white-space:nowrap;
}
.gf-task-issue {
  font-size:10px; font-weight:600; color:var(--red);
  background:rgba(177,69,65,.08); border:1px solid rgba(177,69,65,.3);
  border-radius:10px; padding:1px 7px;
  display:inline-flex; align-items:center; gap:3px;
  white-space:nowrap;
}
/* v5: expandable task rows (Scope sidebar). Collapsed by default; clicking
   the chevron reveals a details grid mirroring scope-review-floorplan.html. */
.gf-task { position:relative; }
.gf-task-summary {
  display:flex; align-items:flex-start; gap:8px; min-width:0;
}
.gf-task-summary-main {
  flex:1; min-width:0;
}
.gf-task-summary-main .gf-task-name {
  white-space:normal; overflow:visible; text-overflow:clip;
}
.gf-task-toggle {
  flex-shrink:0; width:22px; height:22px; border-radius:50%;
  background:transparent; border:1px solid transparent;
  color:var(--t3); cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center;
  padding:0;
  transition:transform .18s ease, background .12s, color .12s, border-color .12s;
}
.gf-task-toggle:hover { background:var(--bg-2); border-color:var(--border); color:var(--t1); }
.gf-task.expanded > .gf-task-summary .gf-task-toggle { transform:rotate(180deg); }
.gf-task-details {
  display:none;
  margin-top:8px; padding:10px 10px 8px; border-radius:var(--rm);
  background:var(--bg); border:1px solid var(--border);
}
.gf-task.expanded > .gf-task-details { display:block; }
.gf-td-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:8px 10px;
}
.gf-td-item { min-width:0; display:flex; flex-direction:column; gap:2px; }
.gf-td-item.full-row { grid-column:1 / -1; }
.gf-td-label {
  font-family:var(--mono); font-size:9px; font-weight:600;
  color:var(--t3); text-transform:uppercase; letter-spacing:.06em;
}
.gf-td-value {
  font-size:12px; color:var(--t1); line-height:1.35;
  word-break:break-word;
}
.gf-td-value.mono { font-family:var(--mono); font-size:11.5px; }
.gf-td-value.muted { color:var(--t3); font-style:italic; }
.gf-td-modifier-row {
  display:flex; flex-wrap:wrap; align-items:center; gap:6px;
  min-height:22px;
}
.gf-td-pill {
  display:inline-flex; align-items:center; gap:4px;
  font-size:10.5px; font-weight:600; color:var(--t2);
  background:var(--bg-2); border:1px solid var(--border-mid);
  border-radius:10px; padding:2px 8px; line-height:1.3;
  white-space:nowrap;
}
.gf-td-pill.deferred  { color:#7a5a00; background:rgba(212,160,23,.12); border-color:rgba(212,160,23,.35); }
.gf-td-pill.resident  { color:#5a3ea3; background:rgba(139,93,212,.10); border-color:rgba(139,93,212,.30); }
.gf-td-pill.future    { color:#2f6d4a; background:rgba(96,146,108,.10); border-color:rgba(96,146,108,.30); }
.gf-td-add {
  font-size:10.5px; font-weight:600; color:var(--t3);
  background:transparent; border:1px dashed var(--border-mid);
  border-radius:10px; padding:2px 8px; cursor:pointer; line-height:1.3;
}
